/* Opens a print-ready tab. No automatic window.print() call - triggering
   the native print dialog immediately made the main app tab unresponsive
   until the dialog was dismissed (some browsers treat the print dialog
   as blocking the whole browser, not just the new tab). The person now
   clicks "Print" inside the new tab whenever they're ready, so the app
   tab stays fully usable in the meantime. */
function printHtmlDoc(title, bodyHtml, pageSize, orientation){
  pageSize = pageSize || 'A4';
  orientation = orientation || 'portrait';
  const w = window.open('', '_blank');
  if(!w){ showAlert('The browser blocked the print window - please allow pop-ups for this page and try again.'); return; }
  const landscape = orientation==='landscape';
  /* Printable-area height in mm, used for .page-frame instead of the
     vh unit. 100vh is unreliable inside a print stylesheet - Chrome
     computes it against a default page size before @page is fully
     applied, so it doesn't match the real A5/A4 page. That inflated a
     single short voucher to look "full page" only by accident; the
     moment real content grew even slightly (a 2nd/3rd section whose
     description wraps to two lines), the inflated frame height plus
     that extra content together exceeded the true one-page height and
     spilled onto a second, mostly-blank page. Sizing the frame to the
     exact printable area (page size minus margin) fixes both: the
     frame still visually fills the page, but never adds phantom height
     on top of whatever the content actually needs. */
  const pageDims = {A5:{w:148,h:210}, A4:{w:210,h:297}}[pageSize] || {w:210,h:297};
  const marginMm = pageSize==='A5' ? 6 : 10;
  const pageW = landscape ? pageDims.h : pageDims.w;
  const pageH = landscape ? pageDims.w : pageDims.h;
  const frameH = pageH - marginMm*2;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escapeHtml(title)}</title>
  <style>
    @page{ size:${pageSize} ${orientation}; margin:${marginMm}mm; }
    body{ font-family:'Times New Roman', Georgia, serif; color:#111; margin:0; }
    h1,h2,h3{ text-align:center; margin:2px 0; }
    h1{ font-size:16px; } h2{ font-size:13px;font-weight:600; } h3{ font-size:12px;font-weight:400;color:#333; }
    table{ width:100%; border-collapse:collapse; margin-top:6px; table-layout:fixed; }
    table.no-outer td{ border:none !important; }
    td, th{ border:1px solid #000; padding:${pageSize==='A5'?'1px 5px':'4px 7px'}; font-size:${pageSize==='A5'?'10':(landscape?'11':'12.5')}px; line-height:1.15; vertical-align:top; word-wrap:break-word; }
    th{ background:#f0f0ea; font-weight:700; text-align:center; }
    .amt{ text-align:right; white-space:pre-line; font-variant-numeric:tabular-nums; }
    .desc{ white-space:pre-line; }
    .mono{ font-variant-numeric:tabular-nums; }
    .no-border{ border:none; }
    .right{ text-align:right; }
    .center{ text-align:center; }
    .bold{ font-weight:700; }
    .meta{ font-size:12.5px; margin:2px 0; }
    .voucher-header{ text-align:center; margin-bottom:4px; }
    .inst-name{ color:#0B6E2A; font-weight:700; font-size:14px; }
    .inst-line{ font-size:9px; color:#222; }
    .voucher-title-box{ border:1px solid #000; text-align:center; color:#1352B0; font-weight:700; font-size:12.5px; width:150px; margin:4px auto; padding:2px; }
    .boxed{ border:1px solid #000; display:inline-block; padding:1px 8px; min-width:110px; }
    .page-frame{ border:2px solid #000; padding:${pageSize==='A5'?'8px':'14px'}; box-sizing:border-box; height:${frameH}mm; overflow:hidden; page-break-inside:avoid; }
    .sig-row{ display:flex; justify-content:space-between; margin-top:${pageSize==='A5'?'14px':'40px'}; }
    .sig-row.four .sig-box{ flex:1; }
    .sig-box{ text-align:center; font-size:10.5px; }
    .sig-line{ border-top:1px solid #000; width:80%; margin:0 auto 4px; }
    .print-bar{ text-align:center; margin:10px 0; }
    @media print{ .print-bar{ display:none; } }
  </style></head><body>
  <div class="print-bar"><button onclick="window.print()" style="padding:6px 16px;">Print</button></div>
  ${bodyHtml}
  </body></html>`);
  w.document.close();
}
function showConfirm(message, onConfirm, confirmText='Delete'){ showModal({message, confirmText, cancelText:'Cancel', danger:true, onConfirm}); }

/* Password-gated confirmation, used for unlocking a finalized/locked day.
   Checks the entered password against the screen-lock password hash before
   calling onConfirm. If no screen-lock password has been set at all, this
   falls back to a plain confirm so the feature doesn't dead-end users who
   never set one. */
/* Settle (fully or partially) an outstanding IOU in one step: this
   creates the actual expense voucher under the category chosen AND
   adjusts the IOU, so nothing has to be entered twice.
   Deliberately manual/explicit about WHICH IOU and WHICH category -
   IOU descriptions are often thin or worded differently at the time
   they're taken, so we don't try to auto-match by text.
   History-safe: if the IOU has already carried forward from an earlier
   day, the original record is closed as of yesterday (so past days keep
   showing the original amount for audit purposes) and, if a balance
   remains, a new record opens from today with the reduced amount. */
function showSettleIouModal(day, item){
  const catOptions = COA.map(c=>`<option value="${c.key}">${escapeHtml(c.label)}</option>`).join('');
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal-box">
        <p><strong>Settle IOU</strong>${item.desc?` &mdash; ${escapeHtml(item.desc)}`:''}<br>
        <span style="color:var(--ink-soft);font-size:12.5px;">Outstanding: ${money(item.amount)}, since ${escapeHtml(dayLabel(item.fromDate))}</span></p>

        <label style="font-size:12.5px;color:var(--ink-soft);">Expense category</label>
        <select id="settle-cat-select" style="margin:2px 0 10px;">
          <option value="" selected>-- Select a category --</option>
          ${catOptions}
        </select>

        <label style="font-size:12.5px;color:var(--ink-soft);">Description</label>
        <input type="text" id="settle-desc-input" list="settle-desc-suggest" value="${escapeHtml(item.desc||'')}" style="margin:2px 0 10px;">
        <datalist id="settle-desc-suggest"></datalist>
        <label style="font-size:12.5px;color:var(--ink-soft);">Receipt / amount actually spent</label>
        <input type="text" inputmode="decimal" id="settle-amt-input" placeholder="e.g. 930 or 1000-70" style="margin:2px 0 4px;">
        <div id="settle-error" style="color:var(--danger); font-size:12.5px; margin:-2px 0 8px; min-height:1em;"></div>

        <div id="settle-return-wrap" style="display:none;">
          <label style="font-size:12.5px;color:var(--ink-soft);">Cash handed back now, if any (leave blank if the rest is still owed)</label>
          <input type="text" inputmode="decimal" id="settle-return-input" placeholder="e.g. 70" style="margin:2px 0 10px;">
        </div>

        <div id="settle-preview" style="font-size:12.5px;color:var(--ink-soft);margin:-2px 0 10px;min-height:1em;"></div>
        <div class="modal-actions">
          <button class="secondary" type="button">Cancel</button>
          <button class="danger" type="button">Settle</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  const catSelect = overlay.querySelector('#settle-cat-select');
  const descInput = overlay.querySelector('#settle-desc-input');
  wireLockableTextInput(descInput);
  const input = overlay.querySelector('#settle-amt-input');
  const returnWrap = overlay.querySelector('#settle-return-wrap');
  const returnInput = overlay.querySelector('#settle-return-input');
  const errBox = overlay.querySelector('#settle-error');
  const preview = overlay.querySelector('#settle-preview');
  const descSuggestList = overlay.querySelector('#settle-desc-suggest');
  const refreshDescSuggestions = ()=>{
    const opts = catSelect.value ? descriptionSuggestions(catSelect.value) : [];
    descSuggestList.innerHTML = opts.map(s=>`<option value="${escapeHtml(s)}"></option>`).join('');
  };
  refreshDescSuggestions();
  catSelect.addEventListener('change', refreshDescSuggestions);
  const buttons = overlay.querySelectorAll('.modal-actions button');
  const cancelBtn = buttons[0], confirmBtn = buttons[1];

  /* Calculator-style amount boxes, same as everywhere else in the app:
     you can type "1500-500" and it resolves to 1000 on blur/Enter. */
  let spentVal = 0, returnedVal = 0;
  wireAmountInput(input, (num)=>{ spentVal = num; updatePreview(); });
  wireAmountInput(returnInput, (num)=>{ returnedVal = num; updatePreview(); });

  function updatePreview(){
    const spent = spentVal;
    const returned = returnedVal;
    if(!spent || spent<=0){ preview.textContent=''; returnWrap.style.display='none'; return; }
    if(!catSelect.value){ preview.textContent = 'Pick a category to see what this will record.'; returnWrap.style.display='none'; return; }
    const catLabel = COA.find(c=>c.key===catSelect.value).label;
    const balanceAfterSpend = item.amount - spent;
    if(balanceAfterSpend<=0){
      returnWrap.style.display='none';
      preview.textContent = spent>item.amount
        ? `Records ${money(spent)} under ${catLabel} and fully closes this IOU. The extra ${money(spent-item.amount)} is more than the IOU covered &mdash; it'll be tracked as an amount owed back to them until it's paid out.`
        : `Records ${money(spent)} under ${catLabel} and fully closes this IOU.`;
      return;
    }
    returnWrap.style.display='block';
    const remaining = balanceAfterSpend - returned;
    if(returned>0 && remaining<=0){
      preview.textContent = `Records ${money(spent)} under ${catLabel}, plus ${money(returned)} received back in cash. Fully closes this IOU.`;
    } else if(returned>0){
      preview.textContent = `Records ${money(spent)} under ${catLabel}, plus ${money(returned)} received back in cash. Remaining ${money(remaining)} still carries forward.`;
    } else {
      preview.textContent = `Records ${money(spent)} under ${catLabel}. Remaining ${money(balanceAfterSpend)} still owed and carries forward from ${dayLabel(day.date)}.`;
    }
  }
  catSelect.addEventListener('change', updatePreview);

  const reduceIou = (settledAmount)=>{
    const remaining = Math.max(0, item.amount - settledAmount);
    if(item.fromDate===day.date){
      /* Never carried forward yet - safe to edit the record in place. */
      if(remaining<=0){
        const idx = state.iouRegistry.findIndex(x=>x.id===item.id);
        state.iouRegistry = state.iouRegistry.filter(x=>x.id!==item.id);
        return ()=>{ state.iouRegistry.splice(idx,0,item); };
      } else {
        const prevAmount = item.amount;
        item.amount = remaining;
        return ()=>{ item.amount = prevAmount; };
      }
    } else {
      /* Has carried-forward history - close the original as of yesterday
         so earlier days keep showing the original amount, and open a
         fresh record from today for any remaining balance. */
      const prevToDate = item.toDate;
      item.toDate = addDaysStr(day.date, -1);
      let newItem = null;
      if(remaining>0){
        newItem = {id:uid(), desc:item.desc, amount:remaining, fromDate:day.date, toDate:null};
        state.iouRegistry.push(newItem);
      }
      return ()=>{
        item.toDate = prevToDate;
        if(newItem) state.iouRegistry = state.iouRegistry.filter(x=>x.id!==newItem.id);
      };
    }
  };

  const doSettle = ()=>{
    const catKey = catSelect.value;
    if(!catKey){ errBox.textContent = 'Select an expense category first - settling needs to know where this money was actually spent.'; catSelect.focus(); return; }
    const spent = spentVal;
    if(!spent || spent<=0){ errBox.textContent = 'Enter a positive amount.'; return; }
    const returned = Math.max(0, returnedVal);
    const desc = descInput.value.trim();
    const overage = Math.max(0, spent - item.amount);

    const voucher = addCoaVoucher(day, catKey);
    voucher.desc = desc;
    voucher.amount = spent;
    const prevRevenue = day.serviceRevenue;
    if(returned>0) day.serviceRevenue = (Number(day.serviceRevenue)||0) + returned;
    const undoIou = reduceIou(spent + returned);

    let newPayable = null;
    if(overage>0){
      newPayable = {id:uid(), desc, amount:overage, fromDate:day.date, toDate:null};
      state.payableRegistry.push(newPayable);
    }

    pushUndo('IOU settlement undone.', ()=>{
      day.coa[catKey] = day.coa[catKey].filter(x=>x.id!==voucher.id);
      day.serviceRevenue = prevRevenue;
      undoIou();
      if(newPayable) state.payableRegistry = state.payableRegistry.filter(x=>x.id!==newPayable.id);
    });
    saveState();
    overlay.remove();
    render();
  };
  confirmBtn.onclick = doSettle;
  cancelBtn.onclick = ()=> overlay.remove();
  input.onkeydown = (e)=>{ if(e.key==='Enter'){ e.preventDefault(); returnInput.focus(); } };
  returnInput.onkeydown = (e)=>{ if(e.key==='Enter') doSettle(); };
  wireBackdropClose(overlay);
  setTimeout(()=>input.focus(), 30);
}

function showPasswordPrompt(message, onConfirm, confirmText='Unlock', hashToCheck){
  if(hashToCheck===undefined) hashToCheck = state.lockPasswordHash;
  if(!hashToCheck){ showConfirm(message, onConfirm, confirmText); return; }
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal-box">
        <p>${escapeHtml(message)}</p>
        <input type="password" id="pw-prompt-input" autocomplete="current-password" placeholder="Password" style="margin:2px 0 4px;">
        <div id="pw-prompt-error" style="color:var(--danger); font-size:12.5px; margin:-2px 0 8px; min-height:1em;"></div>
        <div class="modal-actions">
          <button class="secondary" type="button">Cancel</button>
          <button class="danger" type="button">${escapeHtml(confirmText)}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#pw-prompt-input');
  wirePasswordToggle(input);
  const errorEl = overlay.querySelector('#pw-prompt-error');
  const buttons = overlay.querySelectorAll('.modal-actions button');
  const cancelBtn = buttons[0], confirmBtn = buttons[1];
  const attempt = async ()=>{
    const hash = await sha256Hex(input.value||'');
    if(hash === hashToCheck){
      overlay.remove();
      onConfirm();
    } else {
      errorEl.textContent = 'Incorrect password.';
      input.value = '';
      input.focus();
    }
  };
  confirmBtn.onclick = attempt;
  cancelBtn.onclick = ()=> overlay.remove();
  input.onkeydown = (e)=>{ if(e.key==='Enter') attempt(); };
  wireBackdropClose(overlay);
  setTimeout(()=>input.focus(), 30);
}

/* ======================================================================
   Rendering
   ====================================================================== */
function render(){
  const scrollY = window.scrollY;
  renderApp();
  /* Restore scroll position after the rebuild, instantly - the page has
     html{scroll-behavior:smooth}, which would otherwise animate this
     restore into a visible slide. behavior:'instant' overrides that for
     just this call. Done now (in case the browser already clamped it
     synchronously) and again on the next frame (in case the clamp/
     re-layout happens after paint) - without fighting any deliberate
     scrollIntoView a caller does right after render(). */
  if(window.scrollY !== scrollY) window.scrollTo({top:scrollY, left:0, behavior:'instant'});
  requestAnimationFrame(()=>{ if(window.scrollY !== scrollY) window.scrollTo({top:scrollY, left:0, behavior:'instant'}); });
}
function renderApp(){
  /* Build into a detached fragment and swap it in with ONE DOM mutation
     (replaceChildren) instead of clearing #app (innerHTML='') and then
     re-appending piece by piece. The old clear-then-rebuild approach
     made the page's height collapse to ~0 for a moment, which made the
     browser (or the outer page, if this is running in an auto-sizing
     iframe/artifact preview) clamp scroll to the top; swapping the
     whole subtree in one step avoids that empty in-between state. */
  const app = document.createDocumentFragment();
  if(state.lockPasswordHash && locked){
    app.appendChild(renderLockScreen());
    document.getElementById('app').replaceChildren(app);
    return;
  }
  if(!state.setupDone){
    app.appendChild(renderHeader());
    if(passwordFormOpen && !state.lockPasswordHash) app.appendChild(renderPasswordForm());
    if(dayLockPasswordFormOpen) app.appendChild(renderDayLockPasswordForm());
    app.appendChild(renderSetup());
    document.getElementById('app').replaceChildren(app);
    return;
  }
  app.appendChild(renderHeader());
  if(passwordFormOpen && !state.lockPasswordHash) app.appendChild(renderPasswordForm());
  if(dayLockPasswordFormOpen) app.appendChild(renderDayLockPasswordForm());
  if(dashboardOpen) app.appendChild(renderDashboardCard());
  if(searchOpen) app.appendChild(renderSearchCard());
  if(summaryOpen) app.appendChild(renderCategorySummaryCard());
  if(templatesOpen) app.appendChild(renderTemplatesCard());
  app.appendChild(renderDayTabs());
  const computed = computeAll();
  if(state.days.length===0){
    app.appendChild(el(`<div class="card"><p class="empty">No days added yet. Click "+ Add day" above to start entering the first day of ${state.month} ${state.year}.</p></div>`));
  } else {
    if(!selectedDayId || !findDay(selectedDayId)){
      const todayDay = state.days.find(d=>d.date===todayDateStr());
      selectedDayId = todayDay ? todayDay.id : state.days[state.days.length-1].id;
    }
    app.appendChild(renderDayPanel(selectedDayId, computed));
    app.appendChild(renderNotesheetCard());
    app.appendChild(renderDepositNotesheetCard());
    app.appendChild(el(`
      <div class="card" id="section-monthly-ledger-launch">
        <h3><span class="num">&#128220;</span> Monthly Ledger</h3>
        <p class="subnote">Pulls together this month's Revenue, Expenditure and Balance Sheet in one place — Withdraw Notesheet totals feed the Expenditure columns automatically, and Deposit Notesheet totals feed Revenue, so most of it fills itself in as you generate notesheets above.</p>
        <button type="button" data-action="toggle-monthly-ledger">Open Monthly Ledger</button>
        <button type="button" class="secondary" data-action="toggle-ml-settings" style="margin-left:8px;">&#9881; Data Links &amp; Export Format</button>
      </div>
    `));
    app.appendChild(renderAnnualSummaryCard());
  }
  app.appendChild(renderFooter());
  if(monthlyLedgerOpen) app.appendChild(renderMonthlyLedgerWindow());
  if(mlSettingsOpen) app.appendChild(renderMlSettingsModal());
  if(lastUndo) app.appendChild(renderUndoToast());
  if(duplicateWarning) app.appendChild(renderDuplicateWarningToast());
  document.getElementById('app').replaceChildren(app);
}

          <div class="field" style="flex:2;margin-bottom:0;"><label>Bank name</label><input type="text" value="${escapeHtml(b.name)}" placeholder="e.g. IBBPLC"></div>
          <div class="field" style="flex:1;margin-bottom:0;"><label>Opening balance</label><input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(b.opening)}"></div>
          <button class="danger small" type="button" title="Remove bank">&times;</button>
        </div>
      `);
      const nameInp = row.querySelector('input[type=text]');
      const openInp = row.querySelector('.amt-input');
      nameInp.oninput = ()=>{ b.name = nameInp.value; saveState(); };
      wireAmountInput(openInp, (num)=>{ b.opening = num; saveState(); });
      row.querySelector('button').onclick = ()=>{ state.banks.splice(i,1); drawBankRows(); saveState(); };
      bankRows.appendChild(row);
    });
  }
  drawBankRows();
  card.querySelector('#set-month').onchange = (e)=>{ state.month = e.target.value; saveState(); };
  card.querySelector('#set-year').oninput = (e)=>{ state.year = e.target.value; saveState(); };
  card._drawBankRows = drawBankRows;
  return card;
}

function renderDayTabs(){
  const wrap = el(`<div></div>`);
  const tabs = el(`<div class="day-tabs"></div>`);
  state.days.forEach(d=>{
    tabs.appendChild(el(`<div class="day-tab ${d.id===selectedDayId?'active':''}" data-action="select-day" data-day="${d.id}">${dayLabel(d.date)}</div>`));
  });
  tabs.appendChild(el(`<button class="secondary small" style="flex:none;" data-action="add-day">+ Add day</button>`));
  wrap.appendChild(tabs);
  // Jump straight to the active (current) day tab instead of leaving the
  // strip scrolled to the start of the month - the days you actually need
  // (today and recent) are near the end, older ones rarely matter.
  requestAnimationFrame(()=>{
    const active = tabs.querySelector('.day-tab.active');
    if(active) active.scrollIntoView({behavior:'instant', inline:'center', block:'nearest'});
  });
  return wrap;
}

function refreshComputedOnly(){
  const computed = computeAll();
  const day = findDay(selectedDayId);
  if(!day) return;
  const c = computed[day.id];
  setText('c-openingCash', money(c.openingCash));
  setText('c-cashCollected', money(c.cashCollected));
  setText('c-totalAmountCash', money(c.totalAmountCash));
  setText('c-totalCashDisbursed', money(c.totalCashDisbursed));
  setText('c-closingAmount', money(c.closingAmount));
  setText('c-iouTotal', money(c.iouTotal));
  setText('c-cashInHand', money(c.cashInHand));
  setText('c-grandTotal', money(c.grandTotal));
  state.banks.forEach(b=>{
    const bc = c.banks[b.id]; if(!bc) return;
    setText('bc-opening-'+b.id, money(bc.opening));
    setText('bc-totalIn-'+b.id, money(bc.totalIn));
    setText('bc-totalOut-'+b.id, money(bc.totalOut));
    setText('bc-closing-'+b.id, money(bc.closing));
  });
  COA.forEach(cat=>{ setText('coa-cat-total-'+cat.key, money(c.coaTotals[cat.key]||0)); });
  saveState();
}
function setText(id, text){
  const e=document.getElementById(id);
  if(!e) return;
  const changed = e.textContent !== text;
  e.textContent = text;
  if(changed){
    e.classList.remove('value-pop');
    void e.offsetWidth; // restart the animation
    e.classList.add('value-pop');
  }
}

function renderDayPanel(dayId, computed){
  const day = findDay(dayId);
  const c = computed[dayId];
  const idx = state.days.findIndex(d=>d.id===dayId);
  const wrap = el(`<div class="day-panel${day.locked?' locked':''}"></div>`);

  /* --- Period lock banner --- */
  const lockBar = el(`
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;${day.locked?'border-left-color:var(--danger);':''}">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:15px;">${day.locked?'&#128274;':'&#128275;'}</span>
        <span style="font-size:13px;color:var(--ink-soft);">${day.locked ? ('This day is locked - entries can\'t be edited until it\'s unlocked'+((state.dayLockPasswordHash||state.lockPasswordHash)?' with the password':'')+'.') : 'Once a day is finalized, lock it to prevent accidental edits.'}</span>
      </div>
      <button class="${day.locked?'danger':'secondary'} small" type="button" data-action="${day.locked?'unlock-day':'lock-day'}" data-day="${day.id}">${day.locked?'Unlock this day':'Lock this day'}</button>
      <button class="secondary small" type="button" data-action="print-day-sheet" data-day="${day.id}">&#128424; Print day sheet</button>
      <button class="secondary small" type="button" data-action="print-all-vouchers" data-day="${day.id}">&#128424; Print all vouchers</button>
    </div>
  `);
  wrap.appendChild(lockBar);

  /* --- 01 Cash received --- */
  const cashCard = el(`
    <div class="card" id="section-cash-received">
      <h3><span class="num">01</span> Cash received &mdash; ${dayLabel(day.date)}</h3>
      <div class="row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="day-date" value="${day.date}">
        </div>
        ${idx===0 ? `
        <div class="field">
          <label>Opening cash balance (manual &mdash; first day only)</label>
          <input type="text" inputmode="decimal" id="opening-cash-manual" value="${formatAsianAmount(day.openingCashManual)}">
        </div>` : `
        <div class="field">
          <label>Beginning balance cash <span class="tag">auto</span></label>
          <div class="computed"><span class="lbl">Carried from previous day's Closing amount</span><span id="c-openingCash">${money(c.openingCash)}</span></div>
        </div>`}
      </div>
      ${idx===0 ? '' : `<p class="subnote" style="margin:4px 0 12px;">Tomorrow's opening cash comes from today's <strong>Closing amount</strong>, before IOUs are deducted &mdash; IOUs only affect today's own Cash In Hand.</p>`}
      <div class="field">
        <label>Service revenue collected</label>
        <input type="text" inputmode="decimal" id="service-revenue" value="${formatAsianAmount(day.serviceRevenue)}">
      </div>

      <label style="margin-top:6px;">Miscellaneous collection &mdash; income collected from another head, not service revenue <span class="tag">optional</span></label>
      <div id="misc-collection-list"></div>
      <button class="secondary small" type="button" data-action="add-misc-collection-section" data-day="${day.id}">+ Add ${(day.miscCollectionSections&&day.miscCollectionSections.length)?'section (another receipt, same voucher)':'collection'}</button>

      <label style="margin-top:6px;">Cash withdrawn from a bank (adds to cash, drains that bank) <span class="tag">optional</span></label>
      <div id="withdraw-list"></div>
      <button class="secondary small" data-action="add-withdraw" data-day="${day.id}">+ Add withdrawal</button>

      <div class="computed" style="margin-top:12px;"><span class="lbl">Total cash collected</span><span id="c-cashCollected">${money(c.cashCollected)}</span></div>
      <div class="computed total"><span class="lbl">Total amount cash</span><span id="c-totalAmountCash">${money(c.totalAmountCash)}</span></div>
    </div>
  `);
  if(idx===0){
    wireAmountInput(cashCard.querySelector('#opening-cash-manual'), (num)=>{ day.openingCashManual = num; refreshComputedOnly(); });
  }
  cashCard.querySelector('#day-date').oninput = (e)=>{ day.date = e.target.value; refreshComputedOnly(); render(); };
  wireAmountInput(cashCard.querySelector('#service-revenue'), (num)=>{ day.serviceRevenue = num; refreshComputedOnly(); });
  drawMiscCollectionList(cashCard.querySelector('#misc-collection-list'), day);
  drawTransferList(cashCard.querySelector('#withdraw-list'), day, 'withdrawals', 'No withdrawals today.');
  if(day.locked) cashCard.classList.add('locked-day');
  wrap.appendChild(cashCard);

  /* --- 02 CoA disbursements --- */
  const coaCard = el(`
    <div class="card" id="section-cash-disbursed">
      <h3><span class="num">02</span> Cash disbursed &mdash; by Chart of Accounts</h3>
      <p class="subnote">Every voucher is classified into one CoA category first. The voucher code (short form + running number + month/year, e.g. Trans7/7/26) is generated automatically the moment you add a line.</p>
      <button class="secondary small" type="button" id="toggle-voucher-numbering">${voucherCounterSettingsOpen?'Hide':'Set'} starting voucher numbers</button>
      <div id="voucher-numbering-settings" style="${voucherCounterSettingsOpen?'':'display:none;'}margin-top:12px;"></div>
      <div class="divider"></div>
    </div>
  `);
  function drawVoucherNumberingSettings(){
    const box = coaCard.querySelector('#voucher-numbering-settings');
    box.innerHTML = '';
    box.appendChild(el(`<p class="subnote" style="margin:0 0 8px;">Set the next voucher number for a category &mdash; useful when switching over from vouchers already issued outside this tool (e.g. if Trans6/.. was the last one used, set Transport's next number to 7).</p>`));
    const grid = el(`<div class="row" style="flex-wrap:wrap;"></div>`);
    COA.forEach(cat=>{
      const field = el(`
        <div class="field" style="min-width:170px;flex:1;">
          <label>Next ${coaText(cat,'label')} voucher # <span class="tag">${cat.short}</span></label>
          <input type="number" min="1" value="${(state.voucherCounters[cat.key]||0)+1}">
        </div>
      `);
      field.querySelector('input').oninput = (e)=>{
        const n = parseInt(e.target.value, 10);
        state.voucherCounters[cat.key] = (isNaN(n)||n<1) ? 0 : n-1;
        saveState();
      };
      grid.appendChild(field);
    });
    box.appendChild(grid);
  }
  drawVoucherNumberingSettings();
  coaCard.querySelector('#toggle-voucher-numbering').onclick = ()=>{
    voucherCounterSettingsOpen = !voucherCounterSettingsOpen;
    const box = coaCard.querySelector('#voucher-numbering-settings');
    box.style.display = voucherCounterSettingsOpen ? '' : 'none';
    coaCard.querySelector('#toggle-voucher-numbering').textContent = (voucherCounterSettingsOpen?'Hide':'Set')+' starting voucher numbers';
  };
  COA.forEach((cat, ci)=>{
    const items = day.coa[cat.key];
    const catTemplates = state.templates.filter(t=>t.catKey===cat.key);
    const section = el(`
      <div id="cat-section-${cat.key}" style="margin-bottom:14px;padding-bottom:12px;${ci<COA.length-1?'border-bottom:1px solid var(--line-soft);':''}">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <strong style="font-size:13.5px;">${String(ci+1).padStart(2,'0')} &middot; ${coaText(cat,'label')} <span class="tag">${cat.short}</span></strong>
          <span class="mono" style="font-size:12.5px;color:var(--ink-soft);">Category total: <span id="coa-cat-total-${cat.key}">${money(c.coaTotals[cat.key]||0)}</span></span>
        </div>
        <div class="coa-desc">${coaText(cat,'desc')}</div>
        <div id="coa-list-${cat.key}"></div>
        <button class="secondary small" data-action="add-coa" data-day="${day.id}" data-cat="${cat.key}">+ Add ${coaText(cat,'label')} voucher</button>
        ${catTemplates.map(tpl=>`<button class="secondary small" type="button" data-action="add-coa-from-template" data-day="${day.id}" data-tpl="${tpl.id}" title="${escapeHtml(tpl.desc)}${tpl.amount?' - '+money(tpl.amount):''}">&#128203; ${escapeHtml(tpl.desc)}</button>`).join('')}
      </div>
    `);
    drawCoaList(section.querySelector('#coa-list-'+cat.key), day, cat.key, items);
    coaCard.appendChild(section);
  });
  if(day.locked) coaCard.classList.add('locked-day');
  wrap.appendChild(coaCard);

  /* --- 03 Deposits + IOU --- */
  const depIouCard = el(`
    <div class="card" id="section-deposits-iou">
      <h3><span class="num">03</span> Deposits to bank &amp; IOUs</h3>
      <label>Cash deposited into a bank (drains cash, adds to that bank) <span class="tag">optional</span></label>
      <div id="deposit-list"></div>
      <button class="secondary small" data-action="add-deposit" data-day="${day.id}">+ Add deposit</button>

      <div class="divider"></div>

      <label>IOU / not-yet-cleared cash (subtracted from today's closing cash)</label>
      <p class="subnote" style="margin-top:-4px;">An IOU line keeps carrying forward to every following day automatically, until you remove it &mdash; removing it here only stops it going forward, it stays on the earlier days it already appeared on.</p>
      <div id="iou-list"></div>
      <button class="secondary small" data-action="add-iou" data-day="${day.id}">+ Add IOU line</button>

      <div class="divider"></div>

      <label>Owed back to a person <span class="tag">reverse IOU</span></label>
      <p class="subnote" style="margin-top:-4px;">For when someone fronted more than their advance covered. Not subtracted from cash in hand (it's not cash you're holding) &mdash; just kept visible so it doesn't get forgotten. Mark it Paid once you've actually handed the cash over (and entered that as its own voucher).</p>
      <div id="payable-list"></div>
      <button class="secondary small" data-action="add-payable" data-day="${day.id}">+ Add manually</button>

      <div class="computed" style="margin-top:12px;"><span class="lbl">Total cash disbursed (CoA + deposits)</span><span id="c-totalCashDisbursed">${money(c.totalCashDisbursed)}</span></div>
      <div class="computed"><span class="lbl">Closing amount</span><span id="c-closingAmount">${money(c.closingAmount)}</span></div>
      <div class="computed"><span class="lbl">Total IOU</span><span id="c-iouTotal">${money(c.iouTotal)}</span></div>
      <div class="computed total"><span class="lbl">Cash in hand</span><span id="c-cashInHand">${money(c.cashInHand)}</span></div>
    </div>
  `);
  drawTransferList(depIouCard.querySelector('#deposit-list'), day, 'deposits', 'No deposits today.');
  drawIouList(depIouCard.querySelector('#iou-list'), day);
  drawPayableList(depIouCard.querySelector('#payable-list'), day);
  if(day.locked) depIouCard.classList.add('locked-day');
  wrap.appendChild(depIouCard);

  /* --- 04+ Bank accounts --- */
  state.banks.forEach((b, bi)=>{
    const bd = ensureBankDaily(day, b.id);
    const bc = c.banks[b.id];
    const bankCard = el(`
      <div class="card" id="section-bank-${b.id}">
        <h3><span class="num">0${4+bi}</span> Bank &mdash; ${escapeHtml(b.name)}</h3>
        <div class="computed"><span class="lbl">Beginning balance <span class="tag">auto</span></span><span id="bc-opening-${b.id}">${money(bc.opening)}</span></div>
        <div class="row" style="margin-top:10px;">
          <div class="field">
            <label>Other deposit / SSL Commerz</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.sslDeposit)}" data-field="sslDeposit" data-bank="${b.id}">

          <div class="field">
            <label>Bank fees</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.fees)}" data-field="fees" data-bank="${b.id}">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Salary payment &mdash; by account</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.salaryAccount)}" data-field="salaryAccount" data-bank="${b.id}">
          </div>
          <div class="field">
            <label>Salary payment &mdash; by cash</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.salaryCash)}" data-field="salaryCash" data-bank="${b.id}">
          </div>
        </div>
        <p class="subnote">Both salary lines affect only this bank's balance &mdash; they do not touch today's cash section.</p>
        <div class="divider"></div>
        <label>Bank to Bank Transfer <span class="tag">optional</span></label>
        <p class="subnote" style="margin-top:-4px;">One entry updates both banks: it's deducted (as Cash Disbursed) from the "From" bank and added, right after Beginning Balance, to the "To" bank.</p>
        <div id="bank-xfer-list-${b.id}"></div>
        ${state.banks.length>=2 ? `<button class="secondary small" type="button" data-action="add-bank-transfer" data-day="${day.id}">+ Add transfer</button>` : `<p class="empty">Add a second bank account to enable transfers.</p>`}
        <div class="divider"></div>
        <div class="computed"><span class="lbl">Total in (opening + deposits + transfers in)</span><span id="bc-totalIn-${b.id}">${money(bc.totalIn)}</span></div>
        <div class="computed"><span class="lbl">Total out (fees + salary + transfers out)</span><span id="bc-totalOut-${b.id}">${money(bc.totalOut)}</span></div>
        <div class="computed total"><span class="lbl">Closing balance &mdash; ${escapeHtml(b.name)}</span><span id="bc-closing-${b.id}">${money(bc.closing)}</span></div>
        <div class="divider"></div>
        <label>Bank Reconciliation ${/tbl/i.test(b.name) ? '<span class="tag" style="background:var(--danger-soft);color:var(--danger);">mandatory</span>' : '<span class="tag">optional</span>'}</label>
        <p class="subnote" style="margin-top:-4px;">Enter the bank statement's closing balance for this day to check it against the ledger's own figure.${/tbl/i.test(b.name) ? ' TBL must be reconciled before you can consider the day fully closed.' : ''} Uploading the statement in Monthly Ledger fills this in automatically for every matching date.</p>
        <div class="row">
          <div class="field">
            <label>Bank statement balance</label>
            <input type="text" inputmode="decimal" class="amt-input ${/tbl/i.test(b.name) && bd.reconciledBalance==null ? 'input-missing' : ''}" id="recon-bal-${b.id}" value="${bd.reconciledBalance!=null?formatAsianAmount(bd.reconciledBalance):''}" placeholder="${/tbl/i.test(b.name) ? 'Required \u2014 not checked yet' : 'Not checked yet'}">
          </div>
          <div class="field">
            <label>Note <span class="tag">optional</span></label>
            <input type="text" id="recon-note-${b.id}" value="${escapeHtml(bd.reconcileNote)}" placeholder="e.g. matches statement dated...">
          </div>
        </div>
        ${/tbl/i.test(b.name) && bd.reconciledBalance==null ? `<p class="subnote" style="color:var(--danger);margin-top:-2px;">&#9888; TBL reconciliation is required for this day.</p>` : ''}
        ${bd.reconciledBalance!=null ? (()=>{
          const diff = Math.round((bc.closing - bd.reconciledBalance)*100)/100;
          if(diff===0){
            return `<div class="computed" style="background:#DDEEE3;border-style:solid;border-color:var(--primary);"><span class="lbl">&#9989; Reconciled &mdash; matches the bank statement</span><span>${money(bc.closing)}</span></div>`;
          }
          const rows = [
            ['Opening balance', bc.opening],
            ['+ Other deposit / SSL Commerz', bc.sslDeposit],
            ['+ Deposits transferred into this bank', bc.transferIn],
            ['+ Bank-to-bank transfer in', bc.bankXferIn],
            ['&minus; Bank fees', -bc.fees],
            ['&minus; Salary paid by account', -bc.salaryAccount],
            ['&minus; Salary paid by cash', -bc.salaryCash],
            ['&minus; Withdrawn from this bank (Cash Disbursed)', -bc.transferOut],
            ['&minus; Bank-to-bank transfer out', -bc.bankXferOut],
          ].filter(([,v])=>v);
          return `
            <div class="computed" style="background:var(--danger-soft);border-style:solid;border-color:var(--danger);"><span class="lbl">&#9888; Difference (ledger &minus; statement)</span><span style="color:var(--danger);font-weight:700;">${money(diff)}</span></div>
            <button type="button" class="secondary small" data-action="toggle-recon-detail" data-bank="${b.id}" style="margin-top:6px;">${reconDetailOpen[b.id] ? 'Hide' : 'Show'} details &mdash; where might this mismatch be?</button>
            ${reconDetailOpen[b.id] ? `
              <table style="width:100%; font-size:12.5px; border-collapse:collapse; margin-top:8px;">
                <tbody>
                  ${rows.map(([label,val])=>`
                    <tr style="border-bottom:1px solid var(--line-soft);">
                      <td style="padding:4px 6px;">${label}</td>
                      <td style="padding:4px 6px; text-align:right;" class="mono">${money(val)}</td>
                    </tr>`).join('')}
                  <tr style="border-top:2px solid var(--line);">
                    <td style="padding:4px 6px; font-weight:700;">= Ledger's closing balance</td>
                    <td style="padding:4px 6px; text-align:right; font-weight:700;" class="mono">${money(bc.closing)}</td>
                  </tr>
                  <tr>
                    <td style="padding:4px 6px;">Bank statement balance (what you entered)</td>
                    <td style="padding:4px 6px; text-align:right;" class="mono">${money(bd.reconciledBalance)}</td>
                  </tr>
                </tbody>
              </table>
              <p class="subnote" style="margin-top:4px;">Check each line above against the physical bank statement one at a time &mdash; the first line where they stop matching is where the mismatch is. Common causes: a fee or SSL Commerz credit the bank posted on a different date than the ledger, a transfer recorded on the wrong day, or a transaction missing from one side.</p>
            ` : ''}
          `;
        })() : ''}
      </div>
    `);
    bankCard.querySelectorAll('input[data-field]').forEach(inp=>{
      wireAmountInput(inp, (num)=>{ bd[inp.dataset.field] = num; refreshComputedOnly(); });
    });
    const reconInput = bankCard.querySelector('#recon-bal-'+b.id);
    wireAmountInput(reconInput, (num)=>{ bd.reconciledBalance = (reconInput.value.trim()==='') ? null : num; refreshComputedOnly(); });
    reconInput.addEventListener('blur', ()=>{ saveState(); render(); });
    bankCard.querySelector('#recon-note-'+b.id).oninput = (e)=>{ bd.reconcileNote = e.target.value; saveState(); };
    drawBankTransferList(bankCard.querySelector('#bank-xfer-list-'+b.id), day);
    if(day.locked) bankCard.classList.add('locked-day');
    wrap.appendChild(bankCard);
  });

  /* --- Day summary --- */
  const bankBoxes = state.banks.map(b=>{
    const bc = c.banks[b.id];
    return `<div class="summary-box"><div class="lbl">${escapeHtml(b.name)} closing</div><div class="val">${money(bc.closing)}</div></div>`;
  }).join('');
  const summary = el(`
    <div class="card">
      <h3>Day summary</h3>
      <div class="summary-grid">
        <div class="summary-box"><div class="lbl">Cash in hand</div><div class="val">${money(c.cashInHand)}</div></div>
        ${bankBoxes}
        <div class="summary-box grand"><div class="lbl">Grand total (Closing amount + banks)</div><div class="val" id="c-grandTotal">${money(c.grandTotal)}</div></div>
      </div>
      <div class="divider"></div>
      <button class="danger small" data-action="delete-day" data-day="${day.id}" ${day.locked?'disabled title="Unlock this day first"':''}>Delete this day</button>
    </div>
  `);
  wrap.appendChild(summary);
  wrap.appendChild(renderSectionNav(day));

  return wrap;
}

/* Floating section-jump nav for the day panel. Numbered dots for the
   day's 5(ish) top-level sections (Cash received / Cash disbursed /
   Deposits+IOU / one per bank) stay fixed on screen while scrolling, so
   a long voucher list doesn't mean a long scroll to reach another
   section. The Cash disbursed dot opens a flyout of the 10 CoA
   categories so you can jump straight into e.g. Transport or
   Miscellaneous without scrolling past every category in between. */
function renderSectionNav(day){
  const sections = [
    {id:'section-cash-received', num:'1', label:'Cash received'},
    {id:'section-cash-disbursed', num:'2', label:'Cash disbursed', flyout:COA.map((cat,i)=>({id:'cat-section-'+cat.key, num:String(i+1).padStart(2,'0'), label:coaText(cat,'label')}))},
    {id:'section-deposits-iou', num:'3', label:'Deposits & IOUs'},
    ...state.banks.map((b,bi)=>({id:'section-bank-'+b.id, num:String(4+bi), label:b.name})),
    {id:'section-notesheets', num:String(4+state.banks.length), label:'Notesheets', flyout:[
      {id:'section-notesheets', num:'', label:'Withdraw Notesheets & Summary'},
      {id:'section-deposit-notesheet', num:'', label:'Deposit Notesheet'},
      {id:'__open-monthly-ledger__', num:'', label:'Monthly Ledger'},
    ]},
  ];
  const nav = el(`<nav class="section-nav" aria-label="Jump to section"></nav>`);
  const scrollToId = (id)=>{
    const target = document.getElementById(id);
    if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
  };
  sections.forEach(sec=>{
    const dot = el(`
      <div class="section-nav-item">
        <button type="button" class="section-nav-dot" title="${escapeHtml(sec.label)}"><span class="num">${sec.num}.</span> ${escapeHtml(sec.label)}</button>
        ${sec.flyout ? `<div class="section-nav-flyout"></div>` : ''}
      </div>
    `);
    const dotBtn = dot.querySelector('.section-nav-dot');
    const closeOtherFlyouts = ()=>{
      nav.querySelectorAll('.section-nav-item.open').forEach(d=>{ if(d!==dot) d.classList.remove('open'); });
    };
    if(sec.flyout){
      const flyout = dot.querySelector('.section-nav-flyout');
      flyout.appendChild(el(`<div class="section-nav-flyout-title">${escapeHtml(sec.label)}</div>`));
      sec.flyout.forEach(sub=>{
        const subBtn = el(`<button type="button" class="section-nav-flyout-item">${sub.num} &middot; ${escapeHtml(sub.label)}</button>`);
        subBtn.onclick = ()=>{
          if(sub.id==='__open-monthly-ledger__'){
            monthlyLedgerOpen = true;
            monthlyLedgerMinimized = false;
            if(!monthlyLedgerViewKey) monthlyLedgerViewKey = monthKeyFor(state.month, state.year);
            render();
          } else {
            scrollToId(sub.id);
          }
          dot.classList.remove('open');
        };
        flyout.appendChild(subBtn);
      });
      dotBtn.onclick = ()=>{ closeOtherFlyouts(); dot.classList.toggle('open'); };
    } else {
      dotBtn.onclick = ()=>{ closeOtherFlyouts(); scrollToId(sec.id); };
    }
    nav.appendChild(dot);
  });
  ensureSectionNavGlobalListener();
  return nav;
}
let sectionNavGlobalListenerWired = false;
function ensureSectionNavGlobalListener(){
  if(sectionNavGlobalListenerWired) return;
  sectionNavGlobalListenerWired = true;
  /* One listener for the app's lifetime, not one per render - it always
     looks up whichever .section-nav is currently in the DOM. */
  document.addEventListener('click', (e)=>{
    const nav = document.querySelector('.section-nav');
    if(nav && !nav.contains(e.target)) nav.querySelectorAll('.section-nav-item.open').forEach(d=>d.classList.remove('open'));
  });
}

/* --- Advanced Search: find any Cash Disbursed voucher across every
   recorded day (current month + archived months), by category, year,
   month, a specific date range, description/voucher text, and amount. --- */
/* --- Dashboard: at-a-glance overview - latest Cash in Hand, bank
   balances, this month's spend by category, and outstanding IOUs. --- */
function renderDashboardCard(){
  const computed = computeAll();
  const latestDay = state.days.length ? state.days[state.days.length-1] : null;
  const latestComputed = latestDay ? computed[latestDay.id] : null;

  const catTotals = {};
  COA.forEach(c=>{ catTotals[c.key] = 0; });
  let monthRevenue = 0;
  state.days.forEach(day=>{
    COA.forEach(cat=>{
      (day.coa[cat.key]||[]).forEach(item=>{ catTotals[cat.key] += Number(item.amount)||0; });
    });
    monthRevenue += (Number(day.serviceRevenue)||0) + (Number(day.miscCollection)||0);
  });
  const monthTotal = Object.values(catTotals).reduce((s,v)=>s+v,0);
  const topCats = COA.map(c=>({cat:c, total:catTotals[c.key]})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);

  const today = new Date().toISOString().slice(0,10);
  const outstandingIous = (state.iouRegistry||[]).filter(i=> i.toDate===null || i.toDate>=today);
  const outstandingTotal = outstandingIous.reduce((s,i)=>s+(Number(i.amount)||0),0);
  const outstandingPayables = (state.payableRegistry||[]).filter(i=> i.toDate===null || i.toDate>=today);
  const outstandingPayableTotal = outstandingPayables.reduce((s,i)=>s+(Number(i.amount)||0),0);

  const bankBoxes = latestComputed ? state.banks.map(b=>{
    const bc = latestComputed.banks[b.id];
    return `<div class="summary-box"><div class="lbl">${escapeHtml(b.name)}</div><div class="val">${money(bc.closing)}</div></div>`;
  }).join('') : '';

  const trendDays = state.days.slice(-14);
  const trendValues = trendDays.map(day=>{
    let t = 0;
    COA.forEach(cat=>{ (day.coa[cat.key]||[]).forEach(item=>{ t += Number(item.amount)||0; }); });
    return t;
  });
  const sparkline = trendValues.length>1 ? buildSparklineSvg(trendValues, trendDays.map(d=>dayLabel(d.date))) : '';

  const card = el(`
    <div class="card">
      <h3><span class="num">&#127968;</span> Dashboard</h3>
      <p class="subnote">${latestDay ? `As of ${dayLabelFull(latestDay.date)} ${state.year}` : 'No days recorded yet this month'}</p>
      <div class="summary-grid">
        <div class="summary-box grand"><div class="lbl">Cash in hand</div><div class="val">${latestComputed?money(latestComputed.cashInHand):'&mdash;'}</div></div>
        ${bankBoxes}
        <div class="summary-box" style="border-color:var(--primary);"><div class="lbl">This month's revenue collected</div><div class="val" style="color:var(--primary-dark);">${money(monthRevenue)}</div></div>
        <div class="summary-box"><div class="lbl">This month's total expenditure</div><div class="val">${money(monthTotal)}</div></div>
        <div class="summary-box" style="${outstandingTotal>0?'border-color:var(--danger);':''}"><div class="lbl">Outstanding IOUs</div><div class="val" style="${outstandingTotal>0?'color:var(--danger);':''}">${money(outstandingTotal)}</div></div>
        ${outstandingPayableTotal>0 ? `<div class="summary-box" style="border-color:#B8860B;"><div class="lbl">Owed back to staff</div><div class="val" style="color:#B8860B;">${money(outstandingPayableTotal)}</div></div>` : ''}
      </div>
      ${sparkline ? `
      <div class="divider"></div>
      <h3 style="font-size:14px;">Daily spend trend <span style="font-weight:400;color:var(--ink-soft);">(last ${trendValues.length} recorded days)</span></h3>
      ${sparkline}
      ` : ''}
      <div class="divider"></div>
      <h3 style="font-size:14px;">This month by category</h3>
      ${topCats.length===0 ? '<p class="empty">No expenses recorded yet this month.</p>' : topCats.map(x=>`
        <div class="computed"><span class="lbl">${escapeHtml(x.cat.label)}</span><span>${money(x.total)}</span></div>
      `).join('')}
      ${outstandingIous.length>0 ? `
      <div class="divider"></div>
      <h3 style="font-size:14px;">Outstanding IOUs</h3>
      ${outstandingIous.map(i=>`<div class="computed"><span class="lbl">${escapeHtml(i.desc||'IOU')} &middot; since ${dayLabel(i.fromDate)}</span><span>${money(i.amount)}</span></div>`).join('')}
      ` : ''}
      ${outstandingPayables.length>0 ? `
      <div class="divider"></div>
      <h3 style="font-size:14px;">Owed back to staff</h3>
      ${outstandingPayables.map(i=>`<div class="computed"><span class="lbl">${escapeHtml(i.desc||'Owed')} &middot; since ${dayLabel(i.fromDate)}</span><span>${money(i.amount)}</span></div>`).join('')}
      ` : ''}
    </div>
  `);
  return card;
}

/* Builds a compact inline SVG line-chart of daily spend for the Dashboard.
   Deliberately simple (no library) - just enough to show a trend at a
   glance, with the last point picked out and a light fill under the line. */
function buildSparklineSvg(values, labels){
  const w = 100, h = 34, pad = 3;
  const max = Math.max(...values, 1);
  const min = 0;
  const stepX = values.length>1 ? (w-2*pad)/(values.length-1) : 0;
  const yFor = (v)=> h-pad - ((v-min)/(max-min||1))*(h-2*pad);
  const pts = values.map((v,i)=> [pad+i*stepX, yFor(v)]);
  const line = pts.map(p=>p.join(',')).join(' ');
  const fillPath = `M${pad},${h-pad} L` + line.split(' ').join(' L') + ` L${pad+(values.length-1)*stepX},${h-pad} Z`;
  const last = pts[pts.length-1];
  const titleParts = values.map((v,i)=> `${labels[i]}: ${formatAsianAmount(v)}`);
  return `
    <div style="background:var(--card-alt,#F7F8F4);border-radius:8px;padding:8px 10px;">
      <svg viewBox="0 0 ${w} ${h}" width="100%" height="52" preserveAspectRatio="none" style="display:block;overflow:visible;">
        <title>${escapeHtml(titleParts.join(' | '))}</title>
        <path d="${fillPath}" fill="var(--primary)" opacity="0.08"></path>
        <polyline points="${line}" fill="none" stroke="var(--primary)" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"></polyline>
        <circle cx="${last[0]}" cy="${last[1]}" r="1.8" fill="var(--primary-dark)"></circle>
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-soft);margin-top:2px;">
        <span>${escapeHtml(labels[0])}</span>
        <span>${escapeHtml(labels[labels.length-1])}</span>
      </div>
    </div>
  `;
}

/* ======================================================================
   Monthly Ledger card - Revenue / Expenditure / Balance Sheet workbook,
   replicating the institution's existing manual Excel format so the
   monthly file can be generated straight from data already on hand
   instead of retyped from scratch each month.
   ====================================================================== */
/* All derived figures for one month's ledger, in one place so the
   initial render and the lightweight live-refresh (below) can't drift
   out of sync with each other. */
/* Cash in Hand for the Balance Sheet's Cash in Hand row: the previous
   month's last recorded day's closing cash (not the selected month's own
   days) - runs the same day-to-day chain as the Daily Ledger, across
   every day ever entered, so it works for any selected month. */
function lastDayCashInHandBeforeMonth(monthKey){
  const [y, m] = monthKey.split('-');
  const monthStart = `${y}-${m}-01`;
  const days = state.days.filter(d=>d.date < monthStart).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(days.length===0) return null;
  const computed = computeAll();
  const last = days[days.length-1];
  return computed[last.id] ? computed[last.id].cashInHand : null;
}

function computeMonthlyLedgerFigures(key){
  const rec = getMonthlyLedgerMonth(key);
  const isLiveMonth = key === monthKeyFor(state.month, state.year);

  const revTotals = monthRevenueTotals(rec);
  // Gratuity and Education Assistance Fund are no longer entered by hand:
  // each month, 1/6 of that month's Admission Fee & Form income goes to
  // Gratuity and 1/30 goes to the Education Assistance Fund.
  const admissionRevenueThisMonth = revTotals.admissionFee||0;
  revTotals.gratuity = admissionRevenueThisMonth/6;
  revTotals.eduAssist = admissionRevenueThisMonth/30;
  // Temporary one-time "beginning entry" per revenue category, on top of
  // the above - used to seed a category with a pre-existing balance when
  // switching to this tool mid-year. Off (hidden) unless the person turns
  // it on; the stored numbers stay in effect either way.
  REVENUE_CATS.forEach(c=>{ revTotals[c.key] += Number((rec.beginningRevenue||{})[c.key])||0; });
  const revTotalIncome = REVENUE_CATS.reduce((s,c)=>s+revTotals[c.key],0);
  const yrtBefore = yearlyRunningTotalBefore(key);
  const yrtNew = {};
  REVENUE_CATS.forEach(c=>{ yrtNew[c.key] = yrtBefore[c.key] + revTotals[c.key] + (Number(rec.revenueTransfer[c.key])||0); });
  const totalDueSum = REVENUE_CATS.reduce((s,c)=>s+(Number(rec.revenueTotalDue[c.key])||0),0);
  const totalAmount = (Number(rec.beginningBankBalance)||0) + revTotalIncome;

  const liveCoaTotals = monthWithdrawCoaTotals(key);
  // Same one-time beginning-entry concept, for expenditure categories.
  COA.forEach(c=>{ liveCoaTotals[c.key] = (liveCoaTotals[c.key]||0) + (Number((rec.beginningExpenditure||{})[c.key])||0); });
  let expTotal = 0;
  const expColAmounts = rec.expenditureColumns.map(col=>{
    let amt = 0;
    if(col.source==='coa'){ amt = liveCoaTotals ? (liveCoaTotals[col.coaKey]||0) : 0; }
    else { amt = Number(col.amount)||0; }
    expTotal += amt;
    return amt;
  });
  const totalBalance = revTotalIncome - expTotal; // matches template's Total Income - Total Expenditure

  const expAssistCol = rec.expenditureColumns.find(c=>c.coaKey==='EduAssist');
  const expAssistIdx = expAssistCol ? rec.expenditureColumns.indexOf(expAssistCol) : -1;
  const expAssistAmt = expAssistIdx>=0 ? expColAmounts[expAssistIdx] : 0;

  const latestDay = state.days.length ? state.days[state.days.length-1] : null;
  const computed = isLiveMonth ? computeAll() : null;
  const latestComputed = latestDay && computed ? computed[latestDay.id] : null;
  const autoCashInHand = lastDayCashInHandBeforeMonth(key);
  const autoBankTotal = latestComputed ? state.banks.reduce((s,b)=>s+latestComputed.banks[b.id].closing,0) : null;
  const cashInHandShown = rec.balanceSheet.cashInHandOverride!==null ? rec.balanceSheet.cashInHandOverride : autoCashInHand;

  const debtTotal = rec.balanceSheet.debtItems.reduce((s,d)=>s+(Number(d.amount)||0),0); // legacy, unused going forward
  const gratuityPayable = yrtNew.gratuity;
  const eduAssistPayable = yrtNew.eduAssist - expAssistAmt;

  // "Balance in Bank Account" = the actual bank total on the last day of the
  // selected month (auto-pulled for the live month; typed in for other
  // months, same pattern as Cash in Hand), cross-checked against the
  // Beginning Balance + Income - Expenditure formula so a mismatch can be flagged.
  const bankBalanceShown = rec.balanceSheet.bankBalanceOverride!==null ? rec.balanceSheet.bankBalanceOverride : (isLiveMonth ? autoBankTotal : null);
  const formulaBankTotal = (Number(rec.beginningBankBalance)||0) + totalBalance;
  const bankFormulaMismatch = bankBalanceShown!==null && Math.abs((Number(bankBalanceShown)||0) - formulaBankTotal) > 1;

  const bankBreakdownShown = {};
  state.banks.forEach(b=>{
    const ov = rec.balanceSheet.bankBreakdown[b.id];
    bankBreakdownShown[b.id] = (ov!==undefined && ov!==null) ? ov : (isLiveMonth && latestComputed ? latestComputed.banks[b.id].closing : null);
  });
  const bankBreakdownSum = state.banks.reduce((s,b)=>s+(Number(bankBreakdownShown[b.id])||0),0);
  const bankBreakdownMismatch = bankBalanceShown!==null && Math.abs(bankBreakdownSum - (Number(bankBalanceShown)||0)) > 1;

  const otherAsset = rec.balanceSheet.otherAsset || {label:'Debt to III Assets Ltd', amount:250000};
  const otherAssetAmount = Number(otherAsset.amount)||0;

  // Head-wise distribution of the bank balance (Gratuity + Education
  // Assistance + Remaining = Total), where Total should match "Balance in
  // Bank Account" above.
  const remainingBalance = (Number(bankBalanceShown)||0) - gratuityPayable - eduAssistPayable;
  const noteTotal = gratuityPayable + eduAssistPayable + remainingBalance;
  const noteTotalMismatch = bankBalanceShown!==null && Math.abs(noteTotal - (Number(bankBalanceShown)||0)) > 1;

  const totalAssets = (Number(cashInHandShown)||0) + (Number(bankBalanceShown)||0) + totalDueSum + otherAssetAmount;
  const equity = totalAssets - (Number(rec.balanceSheet.advancePayment)||0) - gratuityPayable - eduAssistPayable;
  const totalLiabilities = equity + (Number(rec.balanceSheet.advancePayment)||0) + gratuityPayable + eduAssistPayable;
  const assetLiabilityMismatch = Math.abs(totalAssets - totalLiabilities) > 1;

  return {rec, isLiveMonth, revTotals, revTotalIncome, yrtBefore, yrtNew, totalDueSum, totalAmount,
    liveCoaTotals, expColAmounts, expTotal, totalBalance, cashInHandShown, autoBankTotal,
    bankBalanceShown, formulaBankTotal, bankFormulaMismatch, bankBreakdownShown, bankBreakdownSum, bankBreakdownMismatch,
    otherAsset, otherAssetAmount, remainingBalance, noteTotal, noteTotalMismatch, totalLiabilities, assetLiabilityMismatch,
    debtTotal, gratuityPayable, eduAssistPayable, totalAssets, equity};
}

/* Self-service editing modal: lets the user fix small "data link" and
   "export formatting" issues himself, directly in the tool, without
   needing to prompt Claude each time. Two sections:
   1. Data Links - which Deposit Notesheet line description maps to
      which Revenue category (state.settings.depositRevenueMap).
   2. Export Formatting - border style + row heights + signature indent
      used when generating the Withdraw Summary sheet
      (state.settings.exportFormat). */
function renderMlSettingsModal(){
  const s = state.settings;
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal" style="max-width:640px;">
        <div class="modal-header">
          <h3>&#9881; Data Links &amp; Export Format</h3>
          <button class="icon-btn" data-action="toggle-ml-settings" title="Close">&times;</button>
        </div>
        <div class="modal-body">
          <p class="subnote">Fix these yourself, any time - changes save immediately and apply to every future notesheet/ledger you generate.</p>

          <h4 style="margin-bottom:4px;">Data Links: Deposit description &rarr; Revenue category</h4>
          <p class="subnote" style="margin-top:0;">If a Collection Register line isn't landing in the right Monthly Ledger revenue column, fix the mapping here.</p>
          <div id="ml-deplink-list"></div>
          <button class="secondary small" type="button" data-action="ml-deplink-add" style="margin-top:6px;">+ Add mapping</button>

          <div class="divider"></div>

          <h4 style="margin-bottom:4px;">Export Formatting (Withdraw Summary sheet)</h4>
          <div class="row">
            <div class="field">
              <label>Border style</label>
              <select id="ml-fmt-border">
                ${['thin','medium','thick','double'].map(v=>`<option value="${v}" ${s.exportFormat.borderStyle===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Taka-in-words row height</label>
              <input type="text" inputmode="numeric" id="ml-fmt-wordsrow" value="${s.exportFormat.wordsRowHeight}">
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>Signature row height</label>
              <input type="text" inputmode="numeric" id="ml-fmt-sigrow" value="${s.exportFormat.sigRowHeight}">
            </div>
            <div class="field">
              <label>Signature indent (spaces)</label>
              <input type="text" inputmode="numeric" id="ml-fmt-sigindent" value="${s.exportFormat.sigIndentSpaces}">
            </div>
          </div>
          <p class="subnote">If a signature line or the taka-in-words line looks cramped/misaligned in the exported Excel, nudge these numbers and re-export - no code changes needed.</p>
          <button class="secondary small" type="button" data-action="ml-fmt-reset">Reset export formatting to default</button>
        </div>
      </div>
    </div>
  `);

  function drawDepLinks(){
    const list = overlay.querySelector('#ml-deplink-list');
    list.innerHTML = '';
    Object.keys(s.depositRevenueMap).forEach(desc=>{
      const row = el(`
        <div class="line-item">
          <div class="field desc" style="margin-bottom:0;"><label>Deposit description</label><input type="text" class="ml-deplink-desc" value="${escapeHtml(desc)}"></div>
          <div class="field" style="margin-bottom:0;"><label>Revenue category</label>
            <select class="ml-deplink-cat">
              ${REVENUE_CATS.map(c=>`<option value="${c.key}" ${s.depositRevenueMap[desc]===c.key?'selected':''}>${escapeHtml(c.label)}</option>`).join('')}
            </select>
          </div>
          <button class="danger small" type="button" data-action="ml-deplink-remove" title="Remove">&times;</button>
        </div>
      `);
      const descInp = row.querySelector('.ml-deplink-desc');
      const catSel = row.querySelector('.ml-deplink-cat');
      descInp.addEventListener('change', ()=>{
        const oldKey = desc, newKey = descInp.value.trim();
        if(!newKey || newKey===oldKey) { descInp.value = oldKey; return; }
        const catVal = s.depositRevenueMap[oldKey];
        delete s.depositRevenueMap[oldKey];
        s.depositRevenueMap[newKey] = catVal;
        saveState(); drawDepLinks();
      });
      catSel.onchange = ()=>{ s.depositRevenueMap[desc] = catSel.value; saveState(); };
      row.querySelector('[data-action="ml-deplink-remove"]').onclick = ()=>{ delete s.depositRevenueMap[desc]; saveState(); drawDepLinks(); };
      list.appendChild(row);
    });
  }
  drawDepLinks();

  overlay.querySelector('[data-action="ml-deplink-add"]').onclick = ()=>{
    let base = 'New line', n = 1, key = base;
    while(s.depositRevenueMap[key]!==undefined){ key = `${base} ${++n}`; }
    s.depositRevenueMap[key] = REVENUE_CATS[0].key;
    saveState(); drawDepLinks();
  };

  overlay.querySelector('#ml-fmt-border').onchange = (e)=>{ s.exportFormat.borderStyle = e.target.value; saveState(); };
  overlay.querySelector('#ml-fmt-wordsrow').onchange = (e)=>{ s.exportFormat.wordsRowHeight = Number(e.target.value)||60; saveState(); };
  overlay.querySelector('#ml-fmt-sigrow').onchange = (e)=>{ s.exportFormat.sigRowHeight = Number(e.target.value)||50; saveState(); };
  overlay.querySelector('#ml-fmt-sigindent').onchange = (e)=>{ s.exportFormat.sigIndentSpaces = Number(e.target.value)||0; saveState(); };
  overlay.querySelector('[data-action="ml-fmt-reset"]').onclick = ()=>{
    s.exportFormat = defaultState().settings.exportFormat;
    saveState(); render();
  };

  overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ mlSettingsOpen = false; render(); } });
  return overlay;
}

/* Updates just the read-only computed figures in an already-rendered
   Monthly Ledger card, without rebuilding the DOM - rebuilding on every
   keystroke (the way a full render() would) steals focus out of
   whichever input the person is still typing in. */
function setDisplay(id, show){ const e=document.getElementById(id); if(e) e.style.display = show?'':'none'; }
function refreshMonthlyLedgerComputedOnly(){
  if(!monthlyLedgerOpen || !monthlyLedgerViewKey) return;
  const f = computeMonthlyLedgerFigures(monthlyLedgerViewKey);
  setText('ml-total-income', money(f.revTotalIncome));
  setText('ml-total-due-sum', money(f.totalDueSum));
  setText('ml-total-amount', money(f.totalAmount));
  setText('ml-total-expenditure', money(f.expTotal));
  setText('ml-total-balance', money(f.totalBalance));
  setText('ml-bs-balance-bank', money(f.bankBalanceShown||0));
  setText('ml-bs-due-payment', money(f.totalDueSum));
  setText('ml-bs-gratuity', money(f.gratuityPayable));
  setText('ml-bs-eduassist', money(f.eduAssistPayable));
  setText('ml-total-assets', money(f.totalAssets));
  setText('ml-equity', money(f.equity));
  setText('ml-bank-breakdown-sum', money(f.bankBreakdownSum));
  setText('ml-note-remaining', money(f.remainingBalance));
  setText('ml-note-total', money(f.noteTotal));
  setDisplay('ml-warn-bank-formula', f.bankFormulaMismatch);
  setDisplay('ml-warn-bank-breakdown', f.bankBreakdownMismatch);
  setDisplay('ml-warn-note-total', f.noteTotalMismatch);
  setDisplay('ml-warn-asset-liability', f.assetLiabilityMismatch);
  const yrtNewBox = document.getElementById('ml-yrt-new');
  if(yrtNewBox) yrtNewBox.innerHTML = REVENUE_CATS.map(c=>`<div><span style="opacity:.75;">${escapeHtml(c.label)}:</span> ${money(f.yrtNew[c.key])}</div>`).join('');
}

      <div class="floating-window-header" id="ml-floating-header">
        <span class="floating-window-title">&#128220; Monthly Ledger</span>
        <div class="floating-window-controls">
          <button type="button" class="secondary small" data-action="minimize-monthly-ledger" title="${monthlyLedgerMinimized?'Restore':'Minimize'}">${monthlyLedgerMinimized?'&#9723;':'&#8212;'}</button>
          <button type="button" class="secondary small" data-action="close-monthly-ledger" title="Close">&#10005;</button>
        </div>
      </div>
      <div class="floating-window-body" id="ml-floating-body" style="${monthlyLedgerMinimized?'display:none;':''}"></div>
    </div>
  `);
  if(!monthlyLedgerMinimized){
    win.querySelector('#ml-floating-body').appendChild(renderMonthlyLedgerCard());
  }
  // Drag by header (skip if the click originated on a control button)
  const header = win.querySelector('#ml-floating-header');
  header.addEventListener('mousedown', (e)=>{
    if(e.target.closest('button')) return;
    const rect = win.getBoundingClientRect();
    win.style.left = rect.left + 'px';
    win.style.top = rect.top + 'px';
    win.style.right = 'auto';
    win.style.bottom = 'auto';
    const startX = e.clientX, startY = e.clientY;
    const origLeft = rect.left, origTop = rect.top;
    const onMove = (ev)=>{
      win.style.left = Math.max(0, origLeft + (ev.clientX - startX)) + 'px';
      win.style.top = Math.max(0, origTop + (ev.clientY - startY)) + 'px';
    };
    const onUp = ()=>{
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  return win;
}

  const otherAssetAmtInp = card.querySelector('#ml-other-asset-amount');

  drawMlRevenueList(card.querySelector('#ml-revenue-list'), rec, key);

  drawMlGrid(card.querySelector('#ml-transfer-grid'), rec.revenueTransfer, 'transfer');
  drawMlExpenditureList(card.querySelector('#ml-expenditure-list'), rec, liveCoaTotals);
  drawMlBankBreakdownList(card.querySelector('#ml-bank-breakdown-list'), rec, bankBreakdownShown, isLiveMonth);
  if(mlBeginningOpen){
    drawMlBeginningGrid(card.querySelector('#ml-beginning-revenue-grid'), REVENUE_CATS, rec.beginningRevenue);
    drawMlBeginningGrid(card.querySelector('#ml-beginning-expenditure-grid'), COA, rec.beginningExpenditure);
  }

  return card;
}

function drawMlGrid(container, dataObj, kind){
  container.innerHTML = '';

    const inp = wrap.querySelector('input');
    wireAmountInput(inp, (num)=>{ dataObj[c.key] = num; saveState(); refreshMonthlyLedgerComputedOnly(); });

function drawMlRevenueList(container, rec, monthKey){
  container.innerHTML = '';
  if(rec.revenueEntries.length===0){ container.appendChild(el(`<p class="empty">No revenue entries yet this month.</p>`)); }
  rec.revenueEntries.forEach(entry=>{
    const row = el(`
      <div class="card" id="ml-rev-entry-${entry.id}" style="background:var(--card-alt,#F7F8F4);padding:10px;margin-bottom:8px;">
        <div class="row">
          <div class="field" style="max-width:150px;"><label>Date</label><input type="date" class="ml-rev-date" value="${entry.date||''}"></div>
          <div class="field"><label>Description</label><input type="text" class="ml-rev-desc" value="${escapeHtml(entry.desc||'')}"></div>
          <button class="danger small" type="button" data-action="ml-remove-revenue" data-item="${entry.id}" title="Remove">&times;</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;">
          ${REVENUE_CATS.map(c=>{
            const isAuto = c.key==='gratuity' || c.key==='eduAssist';
            return `<div class="field" style="margin-bottom:0;"><label style="font-size:11px;">${escapeHtml(c.label)}${isAuto?' <span class="tag">auto, see below</span>':''}</label><input type="text" inputmode="decimal" class="ml-rev-amt" data-cat="${c.key}" value="${formatAsianAmount(entry[c.key]||0)}" ${isAuto?'disabled':''}></div>`;
          }).join('')}
        </div>
      </div>
    `);
    row.querySelector('.ml-rev-date').oninput = (e)=>{ entry.date = e.target.value; saveState(); };
    wireLockableTextInput(row.querySelector('.ml-rev-desc'));
    row.querySelector('.ml-rev-desc').oninput = (e)=>{ entry.desc = e.target.value; saveState(); };
    row.querySelectorAll('.ml-rev-amt').forEach(inp=>{
      wireAmountInput(inp, (num)=>{ entry[inp.dataset.cat] = num; saveState(); refreshMonthlyLedgerComputedOnly(); });

    container.appendChild(row);
  });

function drawMlExpenditureList(container, rec, liveCoaTotals){
  container.innerHTML = '';

    const isCoa = col.source==='coa';
    const autoAmt = isCoa ? (liveCoaTotals ? (liveCoaTotals[col.coaKey]||0) : 0) : null;
    const overridden = isCoa && col.override!==undefined && col.override!==null;
    const amt = isCoa ? (overridden ? col.override : autoAmt) : (Number(col.amount)||0);
    const row = el(`
      <div class="line-item">
        <div class="field desc" style="margin-bottom:0;"><label>Column</label><input type="text" class="ml-exp-label" value="${escapeHtml(col.label)}"></div>

          ? `<div class="field amt" style="margin-bottom:0;"><label>Amount <span class="tag">${overridden?'manually overridden':'auto from Withdraw Notesheet: '+escapeHtml(COA.find(c=>c.key===col.coaKey)?.label||col.coaKey)}</span></label><input type="text" inputmode="decimal" class="ml-exp-amt-coa" value="${formatAsianAmount(amt)}"></div>
             <button type="button" class="secondary small ml-exp-reset" title="Clear override, go back to auto" ${overridden?'':'style="visibility:hidden;"'}>&#8635;</button>`
          : `<div class="field amt" style="margin-bottom:0;"><label>Amount <span class="tag">manual</span></label><input type="text" inputmode="decimal" class="ml-exp-amt" value="${formatAsianAmount(amt)}"></div>`

    const labelInp = row.querySelector('.ml-exp-label');
    wireLockableTextInput(labelInp);
    labelInp.oninput = (e)=>{ col.label = e.target.value; saveState(); };
    const amtInp = row.querySelector('.ml-exp-amt');
