<script>
/* ======================================================================
   Chart of Accounts
   ====================================================================== */
const COA = [
  {key:'Trans',   short:'Trans',    label:'Transport',                 desc:'Microbus-related expenses: gas/octane, servicing, parts',                       notesheetLabel:'Transport',                  expensePhrase:'Transport',                     summaryLabel:'Transport Expense'},
  {key:'Tailor',  short:'Tailor',   label:'Tailor',                    desc:'Student uniform / dress making',                                                 notesheetLabel:'Tailor',                     expensePhrase:'Tailor/Uniform',                summaryLabel:'Tailor/Uniform Expense'},
  {key:'Utility', short:'Utility',  label:'Utility',                   desc:'Electricity meter load, internet bill, WASA (water) bill',                      notesheetLabel:'Utility',                    expensePhrase:'Utility',                       summaryLabel:'Utility Expense'},
  {key:'BooksSty',short:'BooksSty', label:'Books & Stationery',        desc:'Student books/khata, stationery purchases',                                      notesheetLabel:'Books & Stationery',         expensePhrase:'Books & Stationery',            summaryLabel:'Books & Stationery Expense'},
  {key:'Hons',    short:'Hons',     label:'Honourarium',               desc:'Payments to Director, examiners, or others for interviews/meetings',            notesheetLabel:'Honourarium',                expensePhrase:'Honourarium',                   summaryLabel:'Honourarium Expense'},
  {key:'EduAssist',short:'EduAssist',label:'Education & Assistance Fund',desc:'Fee compromise for a student (booked here as a cash expenditure)',             notesheetLabel:'Education & Assistance Fund',expensePhrase:'Education & Assistance Fund',   summaryLabel:'Education & Assistance Fund Expense'},
  {key:'PayAllce',short:'PayAllce', label:'Pay & Allowance',           desc:'Ad-hoc / emergency salary-related payments outside the normal salary sheet',    notesheetLabel:'Pay & Allowance',            expensePhrase:'Pay & Allowance',               summaryLabel:'Pay & Allowance Expense'},
  {key:'Loan',    short:'Loan',     label:'Loan',                      desc:'Loan disbursed from Madrasa account to the main company',                       notesheetLabel:'Loan',                       expensePhrase:'Loan',                          summaryLabel:'Loan Expense'},
  {key:'Event',   short:'Event',    label:'Event',                     desc:'The 4 annual events: Sports, Cultural Competition, Science Fair, Study Tour',   notesheetLabel:'Event',                      expensePhrase:'Event',                         summaryLabel:'Event Expense'},
  {key:'Misc',    short:'Misc',     label:'Miscellaneous',             desc:'Any cost that does not fit the above categories',                                notesheetLabel:'Misc',                       expensePhrase:'misc',                          summaryLabel:'Miscellaneous Expense'},
];
/* Order categories appear in on the Withdraw Summary sheet & notesheet generation pass */
const SUMMARY_ORDER = ['Misc','Trans','Tailor','Utility','BooksSty','Hons','EduAssist','PayAllce','Loan','Event'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ======================================================================
   State
   ====================================================================== */
let state = null;
let selectedDayId = null;
let notesheetRange = null; // {start, end} - lazily defaulted to the full recorded month
let notesheetSettingsOpen = false;
let voucherCounterSettingsOpen = false;
let searchOpen = false;
let searchFilters = { catKey:'', year:'', month:'', fromDate:'', toDate:'', text:'', minAmt:'', maxAmt:'' };
let summaryOpen = false;
let summaryFilters = { catKey:'', mode:'month', year:'', fromDate:'', toDate:'' };
let locked = false;            // true = show the lock screen instead of the app
let deferredInstallPrompt = null; // captured 'beforeinstallprompt' event, if the browser offers one
let passwordFormOpen = false;  // true = show the set/change-password mini form
let lockError = '';            // error text shown on a failed unlock attempt

function defaultState(){
  const coaEmpty = {};
  const counters = {};
  COA.forEach(c=>{coaEmpty[c.key]=[]; counters[c.key]=0;});
  const notesheetCounters = {Misc:71, Trans:64, Tailor:38, Utility:59, BooksSty:0, Hons:0, EduAssist:0, PayAllce:0, Loan:0, Event:0};
  return {
    setupDone:false,
    month:'', year:'',
    banks:[],
    voucherCounters:counters,
    notesheetCounters,
    summaryCounterYear:'26',
    summaryCounterNum:13,
    signatories:{
      accountant:'Mulham Haider Chowdhury', accountantRole:'Accountant',
      adminManager:'Sgt Helal Uddin Sarker(Retd)', adminManagerRole:'Admin Manager',
      principal:'Brig Gen Md Abu Naser(Retd)', principalRole:'Principal'
    },
    days:[],
    iouRegistry:[],
    lockPasswordHash:null,
    archive:[]
  };
}
function newDay(dateStr){
  const coaEmpty = {};
  COA.forEach(c=>{coaEmpty[c.key]=[];});
  return {
    id:uid(),
    date:dateStr,
    openingCashManual:0,
    serviceRevenue:0,
    withdrawals:[],
    deposits:[],
    coa:coaEmpty,
    banksDaily:{},
    bankTransfers:[]
  };
}
function ensureBankDaily(day, bankId){
  if(!day.banksDaily[bankId]) day.banksDaily[bankId] = {sslDeposit:0, fees:0, salaryAccount:0, salaryCash:0};
  return day.banksDaily[bankId];
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function ordinal(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function dayLabel(dateStr){
  if(!dateStr) return 'Untitled day';
  const d = new Date(dateStr+'T00:00:00');
  return ordinal(d.getDate())+' '+MONTHS[d.getMonth()].slice(0,3);
}
function dayLabelFull(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return ordinal(d.getDate())+' '+MONTHS[d.getMonth()];
}
function money(n){
  n = Number(n)||0;
  const neg = n<0;
  const abs = Math.abs(n).toLocaleString('en-IN',{maximumFractionDigits:2});
  return (neg?'(':'')+abs+(neg?')':'');
}

/* --- Asian/Indian comma grouping (12,34,567 instead of 1,234,567) for the
   amount input boxes themselves, formatted live as the person types. --- */
function asianGroupDigits(intDigits){
  if(intDigits.length<=3) return intDigits;
  const lastThree = intDigits.slice(-3);
  let other = intDigits.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  return other + ',' + lastThree;
}
function formatAsianAmount(value){
  if(value===''||value===null||value===undefined) return '';
  const s = String(value);
  const neg = s.trim().startsWith('-');
  const cleaned = s.replace(/[^0-9.]/g,'');
  if(cleaned===''||cleaned==='.') return '';
  const dotIdx = cleaned.indexOf('.');
  let intPart = dotIdx===-1 ? cleaned : cleaned.slice(0,dotIdx);
  let decPart = dotIdx===-1 ? '' : cleaned.slice(dotIdx);
  intPart = intPart.replace(/^0+(?=\d)/,'');
  if(intPart==='') intPart='0';
  return (neg?'-':'') + asianGroupDigits(intPart) + decPart;
}
function parseAmountInput(displayValue){
  const num = parseFloat(String(displayValue||'').replace(/,/g,''));
  return isNaN(num) ? 0 : num;
}
/* Wires a text input to live-format with Asian comma grouping as the
   person types, preserving caret position, and reports the parsed numeric
   value back via onChange on every edit. */
function wireAmountInput(inputEl, onChange){
  inputEl.addEventListener('input', ()=>{
    const digitsBeforeCursor = inputEl.value.slice(0, inputEl.selectionStart).replace(/[^0-9.]/g,'').length;
    let raw = inputEl.value.replace(/[^0-9.]/g,'');
    const firstDot = raw.indexOf('.');
    if(firstDot!==-1){ raw = raw.slice(0,firstDot+1) + raw.slice(firstDot+1).replace(/\./g,''); }
    const num = (raw===''||raw==='.') ? 0 : parseFloat(raw);
    const formatted = formatAsianAmount(raw);
    inputEl.value = formatted;
    let seen = 0, pos = 0;
    for(; pos<formatted.length; pos++){
      if(/[0-9.]/.test(formatted[pos])) seen++;
      if(seen>=digitsBeforeCursor){ pos++; break; }
    }
    inputEl.setSelectionRange(pos, pos);
    onChange(isNaN(num)?0:num);
  });
}
function findDay(id){ return state.days.find(d=>d.id===id); }

/* Every day ever recorded, current month + everything archived by past
   "Refresh - new month" clears, so Search and Category Summary can see
   the full history rather than just what's currently loaded. */
function allDaysEverywhere(){
  const archived = (state.archive||[]).flatMap(m=>m.days||[]);
  return archived.concat(state.days);
}

/* Flattens every Cash Disbursed (CoA) voucher across every recorded day
   into one list of {date, cat, voucher, desc, amount}, for Search and
   Category Summary to filter and group. */
function allVouchers(){
  const out = [];
  allDaysEverywhere().forEach(day=>{
    COA.forEach(cat=>{
      (day.coa[cat.key]||[]).forEach(item=>{
        const amt = Number(item.amount)||0;
        if(amt>0) out.push({date:day.date, cat, catKey:cat.key, voucher:item.voucher, desc:item.desc||'', amount:amt});
      });
    });
  });
  out.sort((a,b)=>a.date.localeCompare(b.date));
  return out;
}
function voucherYearsPresent(){
  const years = new Set(allVouchers().map(v=>v.date.slice(0,4)));
  return Array.from(years).sort().reverse();
}
function filteredVouchers(f){
  return allVouchers().filter(v=>{
    if(f.catKey && v.catKey!==f.catKey) return false;
    if(f.year && v.date.slice(0,4)!==f.year) return false;
    if(f.month && v.date.slice(5,7)!==f.month) return false;
    if(f.fromDate && v.date<f.fromDate) return false;
    if(f.toDate && v.date>f.toDate) return false;
    if(f.text){
      const q = f.text.toLowerCase();
      if(!v.desc.toLowerCase().includes(q) && !v.voucher.toLowerCase().includes(q)) return false;
    }
    if(f.minAmt!=='' && f.minAmt!==undefined && v.amount<Number(f.minAmt)) return false;
    if(f.maxAmt!=='' && f.maxAmt!==undefined && v.amount>Number(f.maxAmt)) return false;
    return true;
  });
}
function groupSum(vouchers, keyFn, labelFn){
  const map = new Map();
  vouchers.forEach(v=>{
    const k = keyFn(v);
    map.set(k, (map.get(k)||0) + v.amount);
  });
  return Array.from(map.entries())
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([k,total])=>({key:k, label:labelFn?labelFn(k):k, total}));
}

/* --- Simple password lock screen -------------------------------------
   This only gates the on-screen view; the underlying data in browser
   storage is NOT encrypted, so it isn't real protection against someone
   who opens dev tools - it's a screen lock, not a vault. We hash the
   password (SHA-256) rather than store it in plain text, purely so it
   isn't sitting in the open in state. */
async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function addDaysStr(dateStr, delta){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+delta);
  return d.toISOString().slice(0,10);
}
/* An IOU carries forward automatically from the day it's added until it's
   removed - "removed" just closes off its toDate so it stops appearing on
   later days, without touching the days it already appeared on. */
function activeIousForDay(dateStr){
  return state.iouRegistry.filter(r => r.fromDate<=dateStr && (r.toDate===null || dateStr<=r.toDate));
}

/* Bangladeshi (Indian numbering: Crore/Lakh/Thousand) taka-in-words formatter */
const NUM_ONES = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
  'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const NUM_TENS = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function twoDigitWords(n){
  if(n<20) return NUM_ONES[n];
  const t=Math.floor(n/10), o=n%10;
  return NUM_TENS[t] + (o? ' '+NUM_ONES[o] : '');
}
function threeDigitWords(n){
  const h=Math.floor(n/100), r=n%100;
  const parts=[];
  if(h) parts.push(NUM_ONES[h]+' Hundred');
  if(r) parts.push(twoDigitWords(r));
  return parts.join(' ');
}
function takaInWords(amount){
  let n = Math.round(Number(amount)||0);
  if(n===0) return 'Zero Taka Only';
  const neg = n<0; n = Math.abs(n);
  const crore = Math.floor(n/10000000); n%=10000000;
  const lakh = Math.floor(n/100000); n%=100000;
  const thousand = Math.floor(n/1000); n%=1000;
  const rest = n;
  const parts=[];
  if(crore) parts.push(threeDigitWords(crore)+' Crore');
  if(lakh) parts.push(twoDigitWords(lakh)+' Lakh');
  if(thousand) parts.push(twoDigitWords(thousand)+' Thousand');
  if(rest) parts.push(threeDigitWords(rest));
  return (neg?'Minus ':'')+parts.join(' ')+' Taka Only';
}
function monthYearAbbr(){
  return (state.month||'').slice(0,3)+' '+String(state.year||'').slice(-2);
}

/* ======================================================================
   Notesheet / Withdraw Summary generation
   Gathers every CoA voucher across a chosen date range, grouped by
   category (skipping categories with no expense in that range), so it
   can be exported as one notesheet per category plus a Withdraw Summary,
   in the same voucher-code, date-range and signature-block style used in
   Rafsan's existing hand-built notesheets.
   ====================================================================== */
function collectNotesheetRange(startDate, endDate){
  const days = state.days.filter(d=>d.date>=startDate && d.date<=endDate).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const cats = [];
  SUMMARY_ORDER.forEach(key=>{
    const cat = COA.find(c=>c.key===key);
    const items = [];
    days.forEach(day=>{
      (day.coa[key]||[]).forEach(it=>{
        const amt = Number(it.amount)||0;
        if(amt>0){ items.push({voucher:it.voucher, desc:it.desc||cat.label, amount:amt, date:day.date}); }
      });
    });
    if(items.length===0) return;
    const total = items.reduce((s,it)=>s+it.amount,0);
    cats.push({key, cat, items, total, firstDate:items[0].date, lastDate:items[items.length-1].date});
  });
  const grandTotal = cats.reduce((s,c)=>s+c.total,0);
  return {cats, grandTotal};
}

/* ======================================================================
   Storage
   ====================================================================== */
/* window.storage only exists inside Claude.ai. When this file is opened
   directly in a browser (downloaded, double-clicked, or self-hosted),
   window.storage isn't there at all, so we fall back to the browser's own
   localStorage - which works fine in a normal tab - so data still
   survives reloads. Claude.ai is always tried first so nothing changes
   for artifact use. */
const LOCAL_STORAGE_KEY = 'daily_cash_bank_ledger_state_v1';

/* --- File System Access API: optional direct-to-disk auto-save ---------
   Chrome/Edge only (Firefox/Safari don't implement it - the feature just
   hides itself there and window.storage/localStorage remain the only
   record). Lets the person link this tool to one real file on their
   computer; every change then writes straight to that file, so the data
   survives PC restarts and isn't tied to any one browser profile. The
   FileSystemFileHandle itself is remembered in IndexedDB (localStorage
   can't hold a handle object) so we can try to silently reconnect on the
   next page load - though the browser may still require a fresh click to
   re-grant permission, by design. */
let fsFileHandle = null;
let fsFileName = '';
function fsApiSupported(){
  return typeof window!=='undefined' && typeof window.showOpenFilePicker==='function' && typeof window.showSaveFilePicker==='function';
}
function idbGet(key){
  return new Promise((resolve)=>{
    try{
      const req = indexedDB.open('ledger-fs-links', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readonly');
        const g = tx.objectStore('handles').get(key);
        g.onsuccess = ()=>resolve(g.result||null);
        g.onerror = ()=>resolve(null);
      };
      req.onerror = ()=>resolve(null);
    }catch(e){ resolve(null); }
  });
}
function idbSet(key, value){
  return new Promise((resolve)=>{
    try{
      const req = indexedDB.open('ledger-fs-links', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readwrite');
        tx.objectStore('handles').put(value, key);
        tx.oncomplete = ()=>resolve(true);
        tx.onerror = ()=>resolve(false);
      };
      req.onerror = ()=>resolve(false);
    }catch(e){ resolve(false); }
  });
}
function idbDelete(key){
  return new Promise((resolve)=>{
    try{
      const req = indexedDB.open('ledger-fs-links', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readwrite');
        tx.objectStore('handles').delete(key);
        tx.oncomplete = ()=>resolve(true);
        tx.onerror = ()=>resolve(false);
      };
      req.onerror = ()=>resolve(false);
    }catch(e){ resolve(false); }
  });
}
async function writeStateToConnectedFile(){
  if(!fsFileHandle) return;
  try{
    const perm = await fsFileHandle.queryPermission({mode:'readwrite'});
    if(perm!=='granted') return; // don't block saving elsewhere; UI offers "Reconnect"
    const writable = await fsFileHandle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
  }catch(e){ /* disk write failed - window.storage/localStorage still has the data */ }
}
async function connectToFile(){
  if(!fsApiSupported()){
    showAlert("This browser can't connect directly to a file (needs Chrome or Edge). Use Export/Import backup instead.");
    return;
  }
  let handle;
  try{
    [handle] = await window.showOpenFilePicker({
      types:[{description:'Ledger backup', accept:{'application/json':['.json']}}]
    });
  }catch(e){
    return; // person cancelled the picker
  }
  try{
    const perm = await handle.requestPermission({mode:'readwrite'});
    if(perm!=='granted'){ showAlert('Permission to read/write that file was not granted.'); return; }
    const file = await handle.getFile();
    const text = await file.text();
    if(text && text.trim()){
      let parsed;
      try{ parsed = JSON.parse(text); }catch(e){ parsed = null; }
      if(!parsed || typeof parsed!=='object' || !Array.isArray(parsed.days)){
        showAlert("That file isn't a ledger backup. Pick an empty/new file, or one exported from this tool.");
        return;
      }
      showConfirm(`"${handle.name}" already has ledger data in it. Load that data now (replacing what's currently shown here)?`, async ()=>{
        state = parsed;
        migrateState();
        selectedDayId = null;
        locked = !!state.lockPasswordHash;
        fsFileHandle = handle; fsFileName = handle.name;
        await idbSet('lastHandle', handle);
        await saveState();
        render();
      }, 'Load from file');
    } else {
      fsFileHandle = handle; fsFileName = handle.name;
      await idbSet('lastHandle', handle);
      await writeStateToConnectedFile();
      render();
    }
  }catch(e){ showAlert('Could not connect to that file.'); }
}
async function createNewFile(){
  if(!fsApiSupported()){
    showAlert("This browser can't connect directly to a file (needs Chrome or Edge). Use Export/Import backup instead.");
    return;
  }
  let handle;
  try{
    handle = await window.showSaveFilePicker({
      suggestedName: (state.month&&state.year?`Ledger_${state.month}${state.year}`:'Ledger_Data')+'.json',
      types:[{description:'Ledger backup', accept:{'application/json':['.json']}}]
    });
  }catch(e){
    return; // person cancelled the picker
  }
  try{
    const perm = await handle.requestPermission({mode:'readwrite'});
    if(perm!=='granted'){ showAlert('Permission to write that file was not granted.'); return; }
    fsFileHandle = handle; fsFileName = handle.name;
    await idbSet('lastHandle', handle);
    await writeStateToConnectedFile();
    render();
  }catch(e){ showAlert('Could not create that file.'); }
}
async function disconnectFile(){
  fsFileHandle = null;
  fsFileName = '';
  await idbDelete('lastHandle');
  render();
}
async function tryReconnectFile(){
  if(!fsApiSupported()) return;
  const handle = await idbGet('lastHandle');
  if(!handle) return;
  try{
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm==='granted'){ fsFileHandle = handle; fsFileName = handle.name; }
    // if not granted, leave fsFileHandle null - the header offers a
    // "Reconnect" button, since browsers require a fresh click to re-grant
  }catch(e){ /* handle may be stale (file moved/deleted) */ }
}

async function saveState(){
  const json = JSON.stringify(state);
  let savedToCloud = false;
  try{
    const res = await window.storage.set('state', json);
    if(res) savedToCloud = true;
  }catch(e){ /* window.storage not available here */ }
  if(!savedToCloud){
    try{ localStorage.setItem(LOCAL_STORAGE_KEY, json); }
    catch(e){ /* localStorage blocked too (e.g. private browsing) */ }
  }
  writeStateToConnectedFile();
}
function migrateState(){
  const d = defaultState();
  if(!state.notesheetCounters) state.notesheetCounters = d.notesheetCounters;
  else COA.forEach(c=>{ if(!(c.key in state.notesheetCounters)) state.notesheetCounters[c.key] = 0; });
  if(state.summaryCounterYear===undefined) state.summaryCounterYear = d.summaryCounterYear;
  if(state.summaryCounterNum===undefined) state.summaryCounterNum = d.summaryCounterNum;
  if(!state.signatories) state.signatories = d.signatories;
  if(!state.iouRegistry){
    /* Older saves kept IOUs as a plain per-day list with no carry-forward.
       Bring each of those in as a single-day entry so historical Cash In
       Hand figures for already-recorded days don't silently change. */
    state.iouRegistry = [];
    (state.days||[]).forEach(day=>{
      (day.ious||[]).forEach(i=>{
        state.iouRegistry.push({id:i.id||uid(), desc:i.desc, amount:i.amount, fromDate:day.date, toDate:day.date});
      });
      delete day.ious;
    });
  }
  (state.days||[]).forEach(day=>{ if(!day.bankTransfers) day.bankTransfers = []; });
  if(state.lockPasswordHash===undefined) state.lockPasswordHash = null;
  if(!state.archive) state.archive = [];
}
async function loadState(){
  try{
    const res = await window.storage.get('state');
    if(res && res.value){ state = JSON.parse(res.value); migrateState(); return; }
  }catch(e){ /* window.storage not available here */ }
  try{
    const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
    if(raw){ state = JSON.parse(raw); migrateState(); return; }
  }catch(e){ /* localStorage not available either */ }
  state = defaultState();
}

/* --- Portable JSON backup ---------------------------------------------
   window.storage and localStorage are both tied to one Claude.ai chat or
   one browser/file location. A downloaded backup file is the only copy
   that survives a deleted chat, a different browser, or a different
   computer - the person carries it themselves and re-imports it wherever
   they open this tool next. */
function exportBackupJson(){
  const label = (state.month && state.year) ? `${state.month}${state.year}` : 'backup';
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Ledger_Backup_${label}_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importBackupJson(file){
  showConfirm('Importing a backup replaces all data currently in this ledger (in this browser/chat) with what\'s in the file. Continue?', ()=>{
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed || typeof parsed!=='object' || !Array.isArray(parsed.days)){ throw new Error('not a ledger backup'); }
        state = parsed;
        migrateState();
        selectedDayId = null;
        notesheetRange = null;
        locked = !!state.lockPasswordHash;
        await saveState();
        render();
        showAlert('Backup imported successfully.');
      }catch(e){
        showAlert('That file could not be read as a valid Daily Cash & Bank Ledger backup.');
      }
    };
    reader.readAsText(file);
  }, 'Import & replace');
}

/* ======================================================================
   Computation engine (single source of truth for every number shown
   on screen AND every number written into the exported spreadsheets)
   ====================================================================== */
function computeAll(){
  const results = {};
  let prevCash = null;
  let prevBankClose = {};
  state.banks.forEach(b=>{ prevBankClose[b.id] = b.opening||0; });

  state.days.forEach((day, idx)=>{
    const openingCash = idx===0 ? (Number(day.openingCashManual)||0) : prevCash;
    const withdrawTotal = day.withdrawals.reduce((s,w)=>s+(Number(w.amount)||0),0);
    const cashCollected = (Number(day.serviceRevenue)||0) + withdrawTotal;
    const totalAmountCash = openingCash + cashCollected;

    let coaTotal = 0;
    const coaTotals = {};
    COA.forEach(c=>{
      const t = (day.coa[c.key]||[]).reduce((s,l)=>s+(Number(l.amount)||0),0);
      coaTotals[c.key]=t; coaTotal += t;
    });
    const depositTotal = day.deposits.reduce((s,d)=>s+(Number(d.amount)||0),0);
    const totalCashDisbursed = coaTotal + depositTotal;
    const closingAmount = totalAmountCash - totalCashDisbursed;
    const iouTotal = activeIousForDay(day.date).reduce((s,i)=>s+(Number(i.amount)||0),0);
    const cashInHand = closingAmount - iouTotal;

    const banks = {};
    state.banks.forEach(b=>{
      const bd = day.banksDaily[b.id] || {sslDeposit:0,fees:0,salaryAccount:0,salaryCash:0};
      const opening = prevBankClose[b.id];
      const transferIn = day.deposits.filter(d=>d.bankId===b.id).reduce((s,d)=>s+(Number(d.amount)||0),0);
      const transferOut = day.withdrawals.filter(w=>w.bankId===b.id).reduce((s,w)=>s+(Number(w.amount)||0),0);
      const bankXfers = (day.bankTransfers||[]).filter(t=>t.fromBankId!==t.toBankId);
      const bankXferIn = bankXfers.filter(t=>t.toBankId===b.id).reduce((s,t)=>s+(Number(t.amount)||0),0);
      const bankXferOut = bankXfers.filter(t=>t.fromBankId===b.id).reduce((s,t)=>s+(Number(t.amount)||0),0);
      const totalIn = opening + (Number(bd.sslDeposit)||0) + transferIn + bankXferIn;
      const totalOut = (Number(bd.fees)||0) + (Number(bd.salaryAccount)||0) + (Number(bd.salaryCash)||0) + transferOut + bankXferOut;
      const closing = totalIn - totalOut;
      banks[b.id] = {opening, sslDeposit:Number(bd.sslDeposit)||0, transferIn, bankXferIn, totalIn,
                      fees:Number(bd.fees)||0, salaryAccount:Number(bd.salaryAccount)||0, salaryCash:Number(bd.salaryCash)||0,
                      transferOut, bankXferOut, totalOut, closing};
      prevBankClose[b.id] = closing;
    });

    const grandTotal = closingAmount + Object.values(banks).reduce((s,b)=>s+b.closing,0);

    results[day.id] = {openingCash, withdrawTotal, cashCollected, totalAmountCash, coaTotals, coaTotal,
                        depositTotal, totalCashDisbursed, closingAmount, iouTotal, cashInHand, banks, grandTotal};
    prevCash = closingAmount;
  });
  return results;
}

/* ======================================================================
   Small DOM helper
   ====================================================================== */
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* Native confirm()/alert() are often blocked inside a sandboxed artifact
   iframe (they silently no-op). These custom modals work everywhere. */
function showModal({message, confirmText='OK', cancelText=null, danger=false, onConfirm}){
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal-box">
        <p>${escapeHtml(message)}</p>
        <div class="modal-actions">
          ${cancelText ? `<button class="secondary" type="button">${escapeHtml(cancelText)}</button>` : ''}
          <button class="${danger?'danger':''}" type="button">${escapeHtml(confirmText)}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  const buttons = overlay.querySelectorAll('.modal-actions button');
  const confirmBtn = buttons[buttons.length-1];
  const cancelBtn = buttons.length>1 ? buttons[0] : null;
  confirmBtn.onclick = ()=>{ overlay.remove(); if(onConfirm) onConfirm(); };
  if(cancelBtn) cancelBtn.onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
}
function showAlert(message){ showModal({message, confirmText:'OK'}); }
function showConfirm(message, onConfirm, confirmText='Delete'){ showModal({message, confirmText, cancelText:'Cancel', danger:true, onConfirm}); }

/* ======================================================================
   Rendering
   ====================================================================== */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(state.lockPasswordHash && locked){
    app.appendChild(renderLockScreen());
    return;
  }
  app.appendChild(renderHeader());
  if(passwordFormOpen && !state.lockPasswordHash) app.appendChild(renderPasswordForm());
  if(!state.setupDone){
    app.appendChild(renderSetup());
    return;
  }
  if(searchOpen) app.appendChild(renderSearchCard());
  if(summaryOpen) app.appendChild(renderCategorySummaryCard());
  app.appendChild(renderDayTabs());
  const computed = computeAll();
  if(state.days.length===0){
    app.appendChild(el(`<div class="card"><p class="empty">No days added yet. Click "+ Add day" above to start entering the first day of ${state.month} ${state.year}.</p></div>`));
  } else {
    if(!selectedDayId || !findDay(selectedDayId)) selectedDayId = state.days[state.days.length-1].id;
    app.appendChild(renderDayPanel(selectedDayId, computed));
    app.appendChild(renderNotesheetCard());
  }
  app.appendChild(renderFooter());
}

        </div>
      </div>
      <div class="divider"></div>
      <div class="setup-banks">
        <label>Bank accounts</label>
        <div id="bank-rows"></div>
        <button class="secondary small" data-action="add-bank">+ Add bank account</button>
      </div>
      <div class="divider"></div>
      <button data-action="finish-setup">Start recording &rarr;</button>
    </div>
  `);
  const bankRows = card.querySelector('#bank-rows');
  function drawBankRows(){
    bankRows.innerHTML='';
    if(state.banks.length===0){
      bankRows.appendChild(el(`<p class="empty">No bank accounts yet &mdash; add at least one (e.g. IBBPLC, TBL).</p>`));
    }
    state.banks.forEach((b,i)=>{
      const row = el(`
        <div class="bank-row">
          <div class="field" style="flex:2;margin-bottom:0;"><label>Bank name</label><input type="text" value="${escapeHtml(b.name)}" placeholder="e.g. IBBPLC"></div>
          <div class="field" style="flex:1;margin-bottom:0;"><label>Opening balance</label><input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(b.opening)}"></div>
          <button class="danger small" type="button" title="Remove bank">&times;</button>
        </div>
      `);
      const nameInp = row.querySelector('input[type=text]');
      const openInp = row.querySelector('.amt-input');
      nameInp.oninput = ()=>{ b.name = nameInp.value; saveState(); };
      wireAmountInput(openInp, (num)=>{ b.opening = num; saveState(); });
      row.querySelector('button').onclick = ()=>{ state.banks.splice(i,1); drawBankRows(); saveState(); };
      bankRows.appendChild(row);
    });
  }
  drawBankRows();
  card.querySelector('#set-month').onchange = (e)=>{ state.month = e.target.value; saveState(); };
  card.querySelector('#set-year').oninput = (e)=>{ state.year = e.target.value; saveState(); };
  card._drawBankRows = drawBankRows;
  return card;
}

function renderDayTabs(){
  const wrap = el(`<div></div>`);
  const tabs = el(`<div class="day-tabs"></div>`);
  state.days.forEach(d=>{
    tabs.appendChild(el(`<div class="day-tab ${d.id===selectedDayId?'active':''}" data-action="select-day" data-day="${d.id}">${dayLabel(d.date)}</div>`));
  });
  tabs.appendChild(el(`<button class="secondary small" style="flex:none;" data-action="add-day">+ Add day</button>`));
  wrap.appendChild(tabs);
  return wrap;
}

function refreshComputedOnly(){
  const computed = computeAll();
  const day = findDay(selectedDayId);
  if(!day) return;
  const c = computed[day.id];
  setText('c-openingCash', money(c.openingCash));
  setText('c-cashCollected', money(c.cashCollected));
  setText('c-totalAmountCash', money(c.totalAmountCash));
  setText('c-totalCashDisbursed', money(c.totalCashDisbursed));
  setText('c-closingAmount', money(c.closingAmount));
  setText('c-iouTotal', money(c.iouTotal));
  setText('c-cashInHand', money(c.cashInHand));
  setText('c-grandTotal', money(c.grandTotal));
  state.banks.forEach(b=>{
    const bc = c.banks[b.id]; if(!bc) return;
    setText('bc-opening-'+b.id, money(bc.opening));
    setText('bc-totalIn-'+b.id, money(bc.totalIn));
    setText('bc-totalOut-'+b.id, money(bc.totalOut));
    setText('bc-closing-'+b.id, money(bc.closing));
  });
  COA.forEach(cat=>{ setText('coa-cat-total-'+cat.key, money(c.coaTotals[cat.key]||0)); });
  saveState();
}
function setText(id, text){ const e=document.getElementById(id); if(e) e.textContent = text; }

function renderDayPanel(dayId, computed){
  const day = findDay(dayId);
  const c = computed[dayId];
  const idx = state.days.findIndex(d=>d.id===dayId);
  const wrap = el(`<div></div>`);

  /* --- 01 Cash received --- */
  const cashCard = el(`
    <div class="card">
      <h3><span class="num">01</span> Cash received &mdash; ${dayLabel(day.date)}</h3>
      <div class="row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="day-date" value="${day.date}">
        </div>
        ${idx===0 ? `
        <div class="field">
          <label>Opening cash balance (manual &mdash; first day only)</label>
          <input type="text" inputmode="decimal" id="opening-cash-manual" value="${formatAsianAmount(day.openingCashManual)}">
        </div>` : `
        <div class="field">
          <label>Beginning balance cash <span class="tag">auto</span></label>
          <div class="computed"><span class="lbl">Carried from previous day's Closing amount</span><span id="c-openingCash">${money(c.openingCash)}</span></div>
        </div>`}
      </div>
      ${idx===0 ? '' : `<p class="subnote" style="margin:4px 0 12px;">Tomorrow's opening cash comes from today's <strong>Closing amount</strong>, before IOUs are deducted &mdash; IOUs only affect today's own Cash In Hand.</p>`}
      <div class="field">
        <label>Service revenue collected</label>
        <input type="text" inputmode="decimal" id="service-revenue" value="${formatAsianAmount(day.serviceRevenue)}">
      </div>

      <label style="margin-top:6px;">Cash withdrawn from a bank (adds to cash, drains that bank) <span class="tag">optional</span></label>
      <div id="withdraw-list"></div>
      <button class="secondary small" data-action="add-withdraw" data-day="${day.id}">+ Add withdrawal</button>

      <div class="computed" style="margin-top:12px;"><span class="lbl">Total cash collected</span><span id="c-cashCollected">${money(c.cashCollected)}</span></div>
      <div class="computed total"><span class="lbl">Total amount cash</span><span id="c-totalAmountCash">${money(c.totalAmountCash)}</span></div>
    </div>
  `);
  if(idx===0){
    wireAmountInput(cashCard.querySelector('#opening-cash-manual'), (num)=>{ day.openingCashManual = num; refreshComputedOnly(); });
  }
  cashCard.querySelector('#day-date').oninput = (e)=>{ day.date = e.target.value; refreshComputedOnly(); render(); };
  wireAmountInput(cashCard.querySelector('#service-revenue'), (num)=>{ day.serviceRevenue = num; refreshComputedOnly(); });
  drawTransferList(cashCard.querySelector('#withdraw-list'), day, 'withdrawals', 'No withdrawals today.');
  wrap.appendChild(cashCard);

  /* --- 02 CoA disbursements --- */
  const coaCard = el(`
    <div class="card">
      <h3><span class="num">02</span> Cash disbursed &mdash; by Chart of Accounts</h3>
      <p class="subnote">Every voucher is classified into one CoA category first. The voucher code (short form + running number + month/year, e.g. Trans7/7/26) is generated automatically the moment you add a line.</p>
      <button class="secondary small" type="button" id="toggle-voucher-numbering">${voucherCounterSettingsOpen?'Hide':'Set'} starting voucher numbers</button>
      <div id="voucher-numbering-settings" style="${voucherCounterSettingsOpen?'':'display:none;'}margin-top:12px;"></div>
      <div class="divider"></div>
    </div>
  `);
  function drawVoucherNumberingSettings(){
    const box = coaCard.querySelector('#voucher-numbering-settings');
    box.innerHTML = '';
    box.appendChild(el(`<p class="subnote" style="margin:0 0 8px;">Set the next voucher number for a category &mdash; useful when switching over from vouchers already issued outside this tool (e.g. if Trans6/.. was the last one used, set Transport's next number to 7).</p>`));
    const grid = el(`<div class="row" style="flex-wrap:wrap;"></div>`);
    COA.forEach(cat=>{
      const field = el(`
        <div class="field" style="min-width:170px;flex:1;">
          <label>Next ${cat.label} voucher # <span class="tag">${cat.short}</span></label>
          <input type="number" min="1" value="${(state.voucherCounters[cat.key]||0)+1}">
        </div>
      `);
      field.querySelector('input').oninput = (e)=>{
        const n = parseInt(e.target.value, 10);
        state.voucherCounters[cat.key] = (isNaN(n)||n<1) ? 0 : n-1;
        saveState();
      };
      grid.appendChild(field);
    });
    box.appendChild(grid);
  }
  drawVoucherNumberingSettings();
  coaCard.querySelector('#toggle-voucher-numbering').onclick = ()=>{
    voucherCounterSettingsOpen = !voucherCounterSettingsOpen;
    const box = coaCard.querySelector('#voucher-numbering-settings');
    box.style.display = voucherCounterSettingsOpen ? '' : 'none';
    coaCard.querySelector('#toggle-voucher-numbering').textContent = (voucherCounterSettingsOpen?'Hide':'Set')+' starting voucher numbers';
  };
  COA.forEach((cat, ci)=>{
    const items = day.coa[cat.key];
    const section = el(`
      <div style="margin-bottom:14px;padding-bottom:12px;${ci<COA.length-1?'border-bottom:1px solid var(--line-soft);':''}">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <strong style="font-size:13.5px;">${String(ci+1).padStart(2,'0')} &middot; ${cat.label} <span class="tag">${cat.short}</span></strong>
          <span class="mono" style="font-size:12.5px;color:var(--ink-soft);">Category total: <span id="coa-cat-total-${cat.key}">${money(c.coaTotals[cat.key]||0)}</span></span>
        </div>
        <div class="coa-desc">${cat.desc}</div>
        <div id="coa-list-${cat.key}"></div>
        <button class="secondary small" data-action="add-coa" data-day="${day.id}" data-cat="${cat.key}">+ Add ${cat.label} voucher</button>
      </div>
    `);
    drawCoaList(section.querySelector('#coa-list-'+cat.key), day, cat.key, items);
    coaCard.appendChild(section);
  });
  wrap.appendChild(coaCard);

  /* --- 03 Deposits + IOU --- */
  const depIouCard = el(`
    <div class="card">
      <h3><span class="num">03</span> Deposits to bank &amp; IOUs</h3>
      <label>Cash deposited into a bank (drains cash, adds to that bank) <span class="tag">optional</span></label>
      <div id="deposit-list"></div>
      <button class="secondary small" data-action="add-deposit" data-day="${day.id}">+ Add deposit</button>

      <div class="divider"></div>

      <label>IOU / not-yet-cleared cash (subtracted from today's closing cash)</label>
      <p class="subnote" style="margin-top:-4px;">An IOU line keeps carrying forward to every following day automatically, until you remove it &mdash; removing it here only stops it going forward, it stays on the earlier days it already appeared on.</p>
      <div id="iou-list"></div>
      <button class="secondary small" data-action="add-iou" data-day="${day.id}">+ Add IOU line</button>

      <div class="computed" style="margin-top:12px;"><span class="lbl">Total cash disbursed (CoA + deposits)</span><span id="c-totalCashDisbursed">${money(c.totalCashDisbursed)}</span></div>
      <div class="computed"><span class="lbl">Closing amount</span><span id="c-closingAmount">${money(c.closingAmount)}</span></div>
      <div class="computed"><span class="lbl">Total IOU</span><span id="c-iouTotal">${money(c.iouTotal)}</span></div>
      <div class="computed total"><span class="lbl">Cash in hand</span><span id="c-cashInHand">${money(c.cashInHand)}</span></div>
    </div>
  `);
  drawTransferList(depIouCard.querySelector('#deposit-list'), day, 'deposits', 'No deposits today.');
  drawIouList(depIouCard.querySelector('#iou-list'), day);
  wrap.appendChild(depIouCard);

  /* --- 04+ Bank accounts --- */
  state.banks.forEach((b, bi)=>{
    const bd = ensureBankDaily(day, b.id);
    const bc = c.banks[b.id];
    const bankCard = el(`
      <div class="card">
        <h3><span class="num">0${4+bi}</span> Bank &mdash; ${escapeHtml(b.name)}</h3>
        <div class="computed"><span class="lbl">Beginning balance <span class="tag">auto</span></span><span id="bc-opening-${b.id}">${money(bc.opening)}</span></div>
        <div class="row" style="margin-top:10px;">
          <div class="field">
            <label>Other deposit / SSL Commerz</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.sslDeposit)}" data-field="sslDeposit" data-bank="${b.id}">
          </div>
          <div class="field">
            <label>Bank fees</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.fees)}" data-field="fees" data-bank="${b.id}">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Salary payment &mdash; by account</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.salaryAccount)}" data-field="salaryAccount" data-bank="${b.id}">
          </div>
          <div class="field">
            <label>Salary payment &mdash; by cash</label>
            <input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(bd.salaryCash)}" data-field="salaryCash" data-bank="${b.id}">
          </div>
        </div>
        <p class="subnote">Both salary lines affect only this bank's balance &mdash; they do not touch today's cash section.</p>
        <div class="divider"></div>
        <label>Bank to Bank Transfer <span class="tag">optional</span></label>

        <div id="bank-xfer-list-${b.id}"></div>
        ${state.banks.length>=2 ? `<button class="secondary small" type="button" data-action="add-bank-transfer" data-day="${day.id}">+ Add transfer</button>` : `<p class="empty">Add a second bank account to enable transfers.</p>`}
        <div class="divider"></div>

        <div class="computed"><span class="lbl">Total out (fees + salary + transfers out)</span><span id="bc-totalOut-${b.id}">${money(bc.totalOut)}</span></div>
        <div class="computed total"><span class="lbl">Closing balance &mdash; ${escapeHtml(b.name)}</span><span id="bc-closing-${b.id}">${money(bc.closing)}</span></div>
      </div>

    bankCard.querySelectorAll('input[data-field]').forEach(inp=>{
      wireAmountInput(inp, (num)=>{ bd[inp.dataset.field] = num; refreshComputedOnly(); });

    wrap.appendChild(bankCard);
  });

  /* --- Day summary --- */
  const bankBoxes = state.banks.map(b=>{
    const bc = c.banks[b.id];
    return `<div class="summary-box"><div class="lbl">${escapeHtml(b.name)} closing</div><div class="val">${money(bc.closing)}</div></div>`;

  wrap.appendChild(summary);

  return wrap;
}

/* --- Advanced Search: find any Cash Disbursed voucher across every
   recorded day (current month + archived months), by category, year,
   month, a specific date range, description/voucher text, and amount. --- */
function renderSearchCard(){
  const years = voucherYearsPresent();
  const card = el(`
    <div class="card">
      <h3><span class="num">&#128269;</span> Advanced Search</h3>
      <p class="subnote">Search every Cash Disbursed voucher ever recorded (this month and archived months) by category, year/month, a date range, description or voucher text, and amount.</p>
      <div class="row" style="flex-wrap:wrap;">
        <div class="field" style="min-width:160px;">
          <label>Category</label>
          <select id="srch-cat">
            <option value="">All categories</option>
            ${COA.map(c=>`<option value="${c.key}" ${searchFilters.catKey===c.key?'selected':''}>${c.label}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="min-width:120px;">
          <label>Year</label>
          <select id="srch-year">
            <option value="">All years</option>
            ${years.map(y=>`<option value="${y}" ${searchFilters.year===y?'selected':''}>${y}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="min-width:140px;">
          <label>Month</label>
          <select id="srch-month">
            <option value="">All months</option>
            ${MONTHS.map((m,i)=>{const v=String(i+1).padStart(2,'0'); return `<option value="${v}" ${searchFilters.month===v?'selected':''}>${m}</option>`;}).join('')}
          </select>
        </div>
      </div>
      <div class="row" style="flex-wrap:wrap;">
        <div class="field"><label>From date <span class="tag">optional</span></label><input type="date" id="srch-from" value="${searchFilters.fromDate}"></div>
        <div class="field"><label>To date <span class="tag">optional</span></label><input type="date" id="srch-to" value="${searchFilters.toDate}"></div>
        <div class="field"><label>Min amount <span class="tag">optional</span></label><input type="text" inputmode="decimal" class="amt-input" id="srch-min" value="${searchFilters.minAmt!==''?formatAsianAmount(searchFilters.minAmt):''}"></div>
        <div class="field"><label>Max amount <span class="tag">optional</span></label><input type="text" inputmode="decimal" class="amt-input" id="srch-max" value="${searchFilters.maxAmt!==''?formatAsianAmount(searchFilters.maxAmt):''}"></div>
      </div>
      <div class="field">
        <label>Description or voucher text</label>
        <input type="text" id="srch-text" placeholder="e.g. warranty, pure it kit, misc18/6/26" value="${escapeHtml(searchFilters.text)}">
      </div>
      <div id="srch-results"></div>
    </div>
  `);
  function drawResults(){
    const box = card.querySelector('#srch-results');
    const results = filteredVouchers(searchFilters);
    const total = results.reduce((s,v)=>s+v.amount,0);
    box.innerHTML = '';
    box.appendChild(el(`<div class="computed total"><span class="lbl">${results.length} voucher${results.length===1?'':'s'} found</span><span>${money(total)}</span></div>`));
    if(results.length===0){
      box.appendChild(el(`<p class="empty">No matching vouchers.</p>`));
      return;
    }
    const table = el(`
      <div style="overflow-x:auto; margin-top:10px;">
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead><tr style="text-align:left; border-bottom:2px solid var(--line);">
            <th style="padding:6px 8px;">Date</th>
            <th style="padding:6px 8px;">Category</th>
            <th style="padding:6px 8px;">Voucher</th>
            <th style="padding:6px 8px;">Description</th>
            <th style="padding:6px 8px; text-align:right;">Amount</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    `);
    const tbody = table.querySelector('tbody');
    results.slice().reverse().forEach(v=>{
      tbody.appendChild(el(`
        <tr style="border-bottom:1px solid var(--line-soft);">
          <td style="padding:6px 8px; white-space:nowrap;" class="mono">${dayLabelFull(v.date)} ${v.date.slice(0,4)}</td>
          <td style="padding:6px 8px;">${escapeHtml(v.cat.label)}</td>
          <td style="padding:6px 8px;" class="mono">${escapeHtml(v.voucher)}</td>
          <td style="padding:6px 8px;">${escapeHtml(v.desc)}</td>
          <td style="padding:6px 8px; text-align:right;" class="mono">${money(v.amount)}</td>
        </tr>
      `));
    });
    box.appendChild(table);
  }
  drawResults();
  card.querySelector('#srch-cat').onchange = (e)=>{ searchFilters.catKey = e.target.value; drawResults(); };
  card.querySelector('#srch-year').onchange = (e)=>{ searchFilters.year = e.target.value; drawResults(); };
  card.querySelector('#srch-month').onchange = (e)=>{ searchFilters.month = e.target.value; drawResults(); };
  card.querySelector('#srch-from').onchange = (e)=>{ searchFilters.fromDate = e.target.value; drawResults(); };
  card.querySelector('#srch-to').onchange = (e)=>{ searchFilters.toDate = e.target.value; drawResults(); };
  card.querySelector('#srch-text').oninput = (e)=>{ searchFilters.text = e.target.value; drawResults(); };
  wireAmountInput(card.querySelector('#srch-min'), (num)=>{ searchFilters.minAmt = num||''; drawResults(); });
  wireAmountInput(card.querySelector('#srch-max'), (num)=>{ searchFilters.maxAmt = num||''; drawResults(); });
  return card;
}

/* --- Category-wise Summary: pick a category and see totals by month,
   by year, or for a custom date range (e.g. 1st-15th). --- */
function renderCategorySummaryCard(){
  if(!summaryFilters.catKey) summaryFilters.catKey = COA[0].key;
  const years = voucherYearsPresent();
  const card = el(`
    <div class="card">
      <h3><span class="num">&#128202;</span> Category-wise Summary</h3>
      <p class="subnote">Pick a category to see how much was spent, grouped by month or year, or totalled over any custom date range.</p>
      <div class="row" style="flex-wrap:wrap;">
        <div class="field" style="min-width:180px;">
          <label>Category</label>
          <select id="sum-cat">
            ${COA.map(c=>`<option value="${c.key}" ${summaryFilters.catKey===c.key?'selected':''}>${c.label}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="min-width:220px;">
          <label>View</label>
          <select id="sum-mode">
            <option value="month" ${summaryFilters.mode==='month'?'selected':''}>By month</option>
            <option value="year" ${summaryFilters.mode==='year'?'selected':''}>By year</option>
            <option value="range" ${summaryFilters.mode==='range'?'selected':''}>Custom date range</option>
          </select>
        </div>
        ${summaryFilters.mode==='month' ? `
        <div class="field" style="min-width:120px;">
          <label>Year <span class="tag">optional</span></label>
          <select id="sum-year">
            <option value="">All years</option>
            ${years.map(y=>`<option value="${y}" ${summaryFilters.year===y?'selected':''}>${y}</option>`).join('')}
          </select>
        </div>` : ''}
        ${summaryFilters.mode==='range' ? `
        <div class="field"><label>From date</label><input type="date" id="sum-from" value="${summaryFilters.fromDate}"></div>
        <div class="field"><label>To date</label><input type="date" id="sum-to" value="${summaryFilters.toDate}"></div>
        ` : ''}
      </div>
      <div id="sum-results"></div>
    </div>
  `);
  function drawResults(){
    const box = card.querySelector('#sum-results');
    box.innerHTML = '';
    const catFilter = { catKey: summaryFilters.catKey };
    if(summaryFilters.mode==='month'){
      const f = Object.assign({}, catFilter, summaryFilters.year ? {year:summaryFilters.year} : {});
      const rows = groupSum(filteredVouchers(f), v=>v.date.slice(0,7), k=>{
        const [y,m] = k.split('-');
        return `${MONTHS[parseInt(m,10)-1]} ${y}`;
      });
      renderSummaryTable(box, rows, 'Month');
    } else if(summaryFilters.mode==='year'){
      const rows = groupSum(filteredVouchers(catFilter), v=>v.date.slice(0,4));
      renderSummaryTable(box, rows, 'Year');
    } else {
      const f = Object.assign({}, catFilter, {fromDate:summaryFilters.fromDate, toDate:summaryFilters.toDate});
      const results = filteredVouchers(f);
      const total = results.reduce((s,v)=>s+v.amount,0);
      box.appendChild(el(`<div class="computed total"><span class="lbl">${escapeHtml(COA.find(c=>c.key===summaryFilters.catKey).label)} total for this range</span><span>${money(total)}</span></div>`));
      if(results.length===0){
        box.appendChild(el(`<p class="empty">No vouchers in this range.</p>`));
      } else {
        box.appendChild(el(`<p class="subnote" style="margin-top:8px;">${results.length} voucher${results.length===1?'':'s'}:</p>`));
        results.forEach(v=>{
          box.appendChild(el(`<div class="computed"><span class="lbl">${dayLabelFull(v.date)} ${v.date.slice(0,4)} &middot; ${escapeHtml(v.voucher)}${v.desc?' &mdash; '+escapeHtml(v.desc):''}</span><span>${money(v.amount)}</span></div>`));
        });
      }
    }
  }
  function renderSummaryTable(box, rows, groupLabel){
    if(rows.length===0){ box.appendChild(el(`<p class="empty">No data for this category yet.</p>`)); return; }
    const grand = rows.reduce((s,r)=>s+r.total,0);
    const table = el(`
      <div style="overflow-x:auto; margin-top:10px;">
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead><tr style="text-align:left; border-bottom:2px solid var(--line);">
            <th style="padding:6px 8px;">${groupLabel}</th>
            <th style="padding:6px 8px; text-align:right;">Total</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    `);
    const tbody = table.querySelector('tbody');
    rows.slice().reverse().forEach(r=>{
      tbody.appendChild(el(`<tr style="border-bottom:1px solid var(--line-soft);"><td style="padding:6px 8px;">${escapeHtml(r.label)}</td><td style="padding:6px 8px; text-align:right;" class="mono">${money(r.total)}</td></tr>`));
    });
    box.appendChild(table);
    box.appendChild(el(`<div class="computed total" style="margin-top:10px;"><span class="lbl">Grand total</span><span>${money(grand)}</span></div>`));
  }
  drawResults();
  card.querySelector('#sum-cat').onchange = (e)=>{ summaryFilters.catKey = e.target.value; drawResults(); };
  card.querySelector('#sum-mode').onchange = (e)=>{ summaryFilters.mode = e.target.value; render(); };
  const yearSel = card.querySelector('#sum-year');
  if(yearSel) yearSel.onchange = (e)=>{ summaryFilters.year = e.target.value; drawResults(); };
  const fromInp = card.querySelector('#sum-from');
  const toInp = card.querySelector('#sum-to');
  if(fromInp) fromInp.onchange = (e)=>{ summaryFilters.fromDate = e.target.value; drawResults(); };
  if(toInp) toInp.onchange = (e)=>{ summaryFilters.toDate = e.target.value; drawResults(); };
  return card;
}

/* ======================================================================
   ONE delegated listener for every button in the app.
   Buttons never get per-render onclick rebinding, so there is no way
   for a stale handler to fire on the wrong row.
   ====================================================================== */
function wireDelegation(){
  document.getElementById('app').addEventListener('click', (e)=>{
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    const dayId = t.dataset.day;
    const day = dayId ? findDay(dayId) : null;

    if(action==='refresh'){ onRefresh(); return; }
    if(action==='toggle-password-form'){ passwordFormOpen = !passwordFormOpen; render(); return; }
    if(action==='lock-now'){
      if(!state.lockPasswordHash){ showAlert('Set a password first.'); return; }
      locked = true; lockError = ''; render();
      return;
    }
    if(action==='export-backup'){ exportBackupJson(); return; }
    if(action==='import-backup'){ document.getElementById('import-file-input').click(); return; }
    if(action==='connect-file'){ connectToFile(); return; }
    if(action==='create-file'){ createNewFile(); return; }
    if(action==='disconnect-file'){ disconnectFile(); return; }
    if(action==='install-app'){
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(()=>{ deferredInstallPrompt = null; render(); });
      return;
    }
    if(action==='edit-setup'){ state.setupDone=false; render(); return; }
    if(action==='toggle-search'){ searchOpen = !searchOpen; render(); return; }
    if(action==='toggle-summary'){ summaryOpen = !summaryOpen; render(); return; }

    if(action==='add-bank'){
      state.banks.push({id:uid(), name:'', opening:0});
      const setupCard = t.closest('.card');
      if(setupCard && setupCard._drawBankRows) setupCard._drawBankRows();
      saveState();
      return;
    }
    if(action==='finish-setup'){
      if(!state.month || !state.year){ showAlert('Please choose a month and year.'); return; }
      if(state.banks.length===0){ showAlert('Add at least one bank account.'); return; }
      if(state.banks.some(b=>!b.name.trim())){ showAlert('Every bank account needs a name.'); return; }
      state.setupDone = true;
      saveState(); render();
      return;
    }

    if(action==='select-day'){ selectedDayId = t.dataset.day; render(); return; }
    if(action==='add-day'){
      const lastDate = state.days.length ? state.days[state.days.length-1].date : null;
      let next = new Date();
      if(lastDate){ next = new Date(lastDate+'T00:00:00'); next.setDate(next.getDate()+1); }
      const d = newDay(next.toISOString().slice(0,10));
      state.days.push(d);
      selectedDayId = d.id;
      saveState(); render();
      return;
    }
    if(action==='delete-day'){
      showConfirm('Delete '+dayLabel(day.date)+'? This cannot be undone.', ()=>{
        const i = state.days.findIndex(d=>d.id===dayId);
        state.days.splice(i,1);
        selectedDayId = state.days.length ? state.days[Math.max(0,i-1)].id : null;
        saveState(); render();
      });
      return;
    }

    if(!day && action!=='dl-day' && action!=='dl-month'){ return; }

    if(action==='add-withdraw'){ day.withdrawals.push({id:uid(), amount:0, bankId:state.banks[0].id, note:''}); render(); return; }
    if(action==='remove-withdraw'){ day.withdrawals = day.withdrawals.filter(x=>x.id!==t.dataset.item); render(); return; }
    if(action==='add-deposit'){ day.deposits.push({id:uid(), amount:0, bankId:state.banks[0].id, note:''}); render(); return; }
    if(action==='remove-deposit'){ day.deposits = day.deposits.filter(x=>x.id!==t.dataset.item); render(); return; }
    if(action==='add-iou'){ state.iouRegistry.push({id:uid(), desc:'', amount:0, fromDate:day.date, toDate:null}); render(); return; }
    if(action==='remove-iou'){
      const item = state.iouRegistry.find(x=>x.id===t.dataset.item);
      if(item){
        if(item.fromDate===day.date){ state.iouRegistry = state.iouRegistry.filter(x=>x.id!==item.id); }
        else{ item.toDate = addDaysStr(day.date, -1); }
      }
      render();
      return;
    }
    if(action==='add-bank-transfer'){
      if(state.banks.length<2){ showAlert('Add at least two bank accounts to make a transfer.'); return; }
      if(!day.bankTransfers) day.bankTransfers = [];
      const from = state.banks[0], to = state.banks[1];
      day.bankTransfers.push({id:uid(), fromBankId:from.id, toBankId:to.id, amount:0});
      render();
      return;
    }
    if(action==='remove-bank-transfer'){
      day.bankTransfers = (day.bankTransfers||[]).filter(x=>x.id!==t.dataset.item);
      render();
      return;
    }

    if(action==='add-coa'){
      const catKey = t.dataset.cat;
      const cat = COA.find(c=>c.key===catKey);
      state.voucherCounters[catKey] += 1;
      const yearShort = String(state.year).slice(-2);
      const monthNum = MONTHS.indexOf(state.month)+1;
      const voucher = `${cat.short}${state.voucherCounters[catKey]}/${monthNum}/${yearShort}`;
      day.coa[catKey].push({id:uid(), voucher, desc:'', amount:0});
      render();
      return;
    }
    if(action==='remove-coa'){
      const catKey = t.dataset.cat;
      day.coa[catKey] = day.coa[catKey].filter(x=>x.id!==t.dataset.item);
      render();
      return;
    }

    if(action==='dl-day'){ exportDay(selectedDayId); return; }
    if(action==='dl-month'){ exportMonth(); return; }
  });
}

function onRefresh(){
  showConfirm(
    "This clears every day, voucher counter and bank balance so you can start a brand-new month. Have you downloaded the current month's Excel already? (This month's entries are archived first, so Search and Category Summary can still see them.) This cannot be undone.",
    ()=>{
      const archive = state.archive || [];
      if(state.days.length>0){
        archive.push({month: state.month, year: state.year, days: JSON.parse(JSON.stringify(state.days))});
      }
      state = defaultState();
      state.archive = archive;
      selectedDayId = null;
      saveState();
      render();
    },
    'Clear & start new month'
  );
}

/* ======================================================================
   Excel export (ExcelJS) — mirrors the original workbook's layout:
   Times New Roman throughout, bold section/total rows, thin borders on
   every used cell, and live =SUM(...) / cross-sheet formulas instead of
   hard-coded numbers, so the file behaves exactly like the hand-built
   sample once opened in Excel.
   ====================================================================== */
const EXCELJS_URLS = [
  'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js',
  'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js',
  'https://unpkg.com/exceljs@4.4.0/dist/exceljs.min.js'
];
let excelJsLoadPromise = null;
function loadExcelJS(){
  if(typeof ExcelJS !== 'undefined') return Promise.resolve();
  if(excelJsLoadPromise) return excelJsLoadPromise;
  excelJsLoadPromise = (async ()=>{
    for(const url of EXCELJS_URLS){
      try{
        await new Promise((resolve, reject)=>{
          const s = document.createElement('script');
          s.src = url;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
        if(typeof ExcelJS !== 'undefined') return;
      }catch(e){ /* try next source */ }
    }
    throw new Error('Could not load the Excel export library from any source.');
  })();
  return excelJsLoadPromise;
}

/* ======================================================================
   Debit Voucher generation (per cash-disbursed entry, daily export only)
   The institute's exact Debit Voucher template (fonts, borders, merges,
   A5 page setup/margins/print area) is embedded below as base64 and
   cloned cell-for-cell for every CoA voucher with a non-blank amount, so
   the printed layout is never altered - only five boxes get filled in:
