/* ======================================================================
   Deposit Notesheet — companion to the withdrawal Notesheets & Withdraw
   Summary section above. Reads a raw "Collection Register Account Wise
   Summary" export, sums TotalAmount for the grand total and each fee
   column for the category lines (Tuition Fee + Late Fine combine into
   one "Tuition Fees & Late Fine" line; Admission Fee + Admission Form
   combine into one "Admission fee & Form" line; every other category
   gets its own line when non-zero), then clones the Revenue_deposit
   template cell-for-cell and fills in only the numbered lines, total,
   amount-in-words, and the collection date range - matching the
   institute's exact layout, fonts, merges and signature blocks.
   ====================================================================== */
let depositNotesheetTemplatePromise = null;
function loadDepositNotesheetTemplate(){
  if(depositNotesheetTemplatePromise) return depositNotesheetTemplatePromise;
  depositNotesheetTemplatePromise = (async ()=>{
    const buf = base64ToArrayBuffer(DEPOSIT_NOTESHEET_TEMPLATE_B64);
    const tmplWb = new ExcelJS.Workbook();
    await tmplWb.xlsx.load(buf);
    return tmplWb.worksheets[0];
  })();
  return depositNotesheetTemplatePromise;
}

const DEPOSIT_ONES = ['','one','two','three','four','five','six','seven','eight','nine','ten',
  'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
const DEPOSIT_TENS = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
function depositTwoDigitWords(n){
  if(n<20) return DEPOSIT_ONES[n];
  return (DEPOSIT_TENS[Math.floor(n/10)] + (n%10 ? ' '+DEPOSIT_ONES[n%10] : '')).trim();
}
function depositThreeDigitWords(n){
  const parts = [];
  if(n>=100){ parts.push(DEPOSIT_ONES[Math.floor(n/100)]+' hundred'); n%=100; if(n) parts.push(depositTwoDigitWords(n)); }
  else if(n) parts.push(depositTwoDigitWords(n));
  return parts.join(' ');
}
function depositNumberToWordsIndian(n){
  if(n===0) return 'zero';
  const crore = Math.floor(n/10000000); n%=10000000;
  const lakh = Math.floor(n/100000); n%=100000;
  const thousand = Math.floor(n/1000); n%=1000;
  const rest = n;
  const parts = [];
  if(crore) parts.push(depositThreeDigitWords(crore)+' crore');
  if(lakh) parts.push(depositThreeDigitWords(lakh)+' lakh');
  if(thousand) parts.push(depositThreeDigitWords(thousand)+' thousand');
  if(rest) parts.push(depositThreeDigitWords(rest));
  return parts.join(' ');
}
function depositOrdinal(day){
  const suf = (day%100>=11 && day%100<=13) ? 'th' : ({1:'st',2:'nd',3:'rd'}[day%10] || 'th');
  return day+suf;
}
const DEPOSIT_MONTH_MAP = {Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',
  Jul:'July',Aug:'August',Sep:'September',Oct:'October',Nov:'November',Dec:'December'};
function depositFormatDateRangeText(rawText){
  const m = /^(\d{2})-(\w{3})-(\d{4}) to (\d{2})-(\w{3})-(\d{4})/.exec((rawText||'').trim());
  if(!m) return null;
  const [,d1,mo1,y1,d2,mo2,y2] = m;
  const mo1full = DEPOSIT_MONTH_MAP[mo1], mo2full = DEPOSIT_MONTH_MAP[mo2];
  if(!mo1full || !mo2full) return null;
  return `${depositOrdinal(parseInt(d1,10))} ${mo1full} ${y1}- ${depositOrdinal(parseInt(d2,10))} ${mo2full} ${y2}`;
}

const DEPOSIT_CAT_COLS = ['Tuition Fee -I','Admission Fee -I','Exam Fee -I','Admission Form-I',
  'Session Fees -I','Muqaddam Fees -I','Uniform Fees -I','Books & Stationeries -I','Transport -I',
  'Late Fine-I','Event\u00A0Fee -I'];

async function parseDepositRawFile(arrayBuffer){
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(arrayBuffer);
  const ws = wb.worksheets[0];
  const dateRangeRaw = ws.getCell('B3').value;
  const headerRow = ws.getRow(5);
  const headers = {};
  headerRow.eachCell({includeEmpty:false}, (cell, colNum)=>{ headers[String(cell.value||'').trim()] = colNum; });
  const tranIdCol = headers['TranID'];
  const totalAmtCol = headers['TotalAmount'];
  if(!tranIdCol || !totalAmtCol) throw new Error('Could not find TranID/TotalAmount columns - is this the right raw file?');
  const catCols = {};
  DEPOSIT_CAT_COLS.forEach(name=>{ catCols[name] = headers[name] || null; });
  let grand = 0;
  const totals = {}; DEPOSIT_CAT_COLS.forEach(c=>totals[c]=0);
  for(let r=6; r<=ws.rowCount; r++){
    const row = ws.getRow(r);
    const tranId = row.getCell(tranIdCol).value;
    if(tranId===null || tranId===undefined || tranId==='') continue;
    grand += Number(row.getCell(totalAmtCol).value) || 0;
    DEPOSIT_CAT_COLS.forEach(name=>{
      const col = catCols[name];
      if(col) totals[name] += Number(row.getCell(col).value) || 0;
    });
  }
  return {dateRangeRaw, totals, grand};
}

function buildDepositLines(totals){
  const defs = [
    ['Tuition Fees & Late Fine', totals['Tuition Fee -I'] + totals['Late Fine-I']],
    ['Admission fee & Form', totals['Admission Fee -I'] + totals['Admission Form-I']],
    ['Exam Fee', totals['Exam Fee -I']],
    ['Session Fees', totals['Session Fees -I']],
    ['Muqaddam', totals['Muqaddam Fees -I']],
    ['Books & Sty', totals['Books & Stationeries -I']],
    ['Transport', totals['Transport -I']],
    ['Uniform', totals['Uniform Fees -I']],
    ['Event Fee', totals['Event\u00A0Fee -I']],
  ];
  return defs.filter(([,amt])=>amt);
}

function depositParseRawRangeToISO(rawText){
  const m = /^(\d{2})-(\w{3})-(\d{4}) to (\d{2})-(\w{3})-(\d{4})/.exec((rawText||'').trim());
  if(!m) return null;
  const [,d1,mo1,y1,d2,mo2,y2] = m;
  const monIdx = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  if(!monIdx[mo1] || !monIdx[mo2]) return null;
  return {start:`${y1}-${monIdx[mo1]}-${d1}`, end:`${y2}-${monIdx[mo2]}-${d2}`};
}
function depositFormatISODateRangeText(startISO, endISO){
  const fmt = (iso)=>{
    const [y,m,d] = iso.split('-').map(Number);
    return `${depositOrdinal(d)} ${MONTHS[m-1]} ${y}`;
  };
  return `${fmt(startISO)}- ${fmt(endISO)}`;
}

async function generateDepositNotesheet(file, startISO, endISO, shouldSave, previewOnly){
  if(shouldSave===undefined) shouldSave = true;
  try{
    await loadExcelJS();
  }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }

  let parsed;
  try{
    const buf = await file.arrayBuffer();
    parsed = await parseDepositRawFile(buf);
  }catch(e){
    showAlert('Could not read that file as a Collection Register Account Wise Summary export: ' + e.message);
    return;
  }

  const dateText = depositFormatISODateRangeText(startISO, endISO);
  const lines = buildDepositLines(parsed.totals);
  if(!lines.length){ showAlert('No non-zero fee categories were found in that file.'); return; }

  const noteNum = state.nextDepositNotesheetNo || 117;
  const srcWs = await loadDepositNotesheetTemplate();
  const wb = new ExcelJS.Workbook();
  const ws = cloneTemplateSheet(wb, srcWs, String(noteNum - 1));

  ws.getCell('B3').value = `III/Acct/Madrasa/revenue/${noteNum}`;
  ws.getCell('B7').value = dateText
    ? `Following amount of cash collected at ${dateText} may be deposited to madrasa account`
    : `Following amount of cash collected may be deposited to madrasa account`;

  const firstRow = 11;
  const fixedLastCatRow = 16; // template's 6 pre-formatted category-line rows
  const fixedTotalRow = 17;   // template's merged "Total collected amount" row (fixed, do not shift)
  const fixedWordsRow = 18;   // template's merged amount-in-words row (fixed, do not shift)

  // Clear all 6 category slots first so nothing from the template (or a
  // shorter previous run) leaks through when this run has fewer lines.
  for(let r = firstRow; r <= fixedLastCatRow; r++){
    ws.getCell(r, 3).value = null;
    ws.getCell(r, 4).value = null;
    ws.getCell(r, 10).value = null;
  }

  if(lines.length > (fixedLastCatRow - firstRow + 1)){
    // More non-zero categories than the template has rows for - insert
    // extra rows above the fixed Total row, copied from row 16's style.
    const extra = lines.length - (fixedLastCatRow - firstRow + 1);
    for(let i=0;i<extra;i++) ws.duplicateRow(fixedLastCatRow, 1, true);
  }
  const lastCatRow = fixedLastCatRow + Math.max(0, lines.length - (fixedLastCatRow - firstRow + 1));
  const totalRow = fixedTotalRow + Math.max(0, lines.length - (fixedLastCatRow - firstRow + 1));
  const wordsRow = fixedWordsRow + Math.max(0, lines.length - (fixedLastCatRow - firstRow + 1));

  lines.forEach(([desc, amt], i)=>{
    const r = firstRow + i;
    ws.getCell(r, 3).value = String(i+1).padStart(2,'0');
    ws.getCell(r, 4).value = desc;
    ws.getCell(r, 10).value = amt;
  });
  const lastRow = firstRow + lines.length - 1;
  ws.getCell(totalRow, 3).value = 'Total collected amount';
  ws.getCell(totalRow, 10).value = {formula: `SUM(J${firstRow}:J${lastRow})`};
  const words = depositNumberToWordsIndian(Math.round(parsed.grand));
  ws.getCell(wordsRow, 3).value = `${words.charAt(0).toUpperCase()+words.slice(1)} taka only.`;

  if(previewOnly){
    showWorkbookPreview(wb, {
      title: `Deposit Notesheet #${noteNum}`,
      onDownload: async ()=>{
        const outBuf2 = await wb.xlsx.writeBuffer();
        const blob2 = new Blob([outBuf2], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        const url2 = URL.createObjectURL(blob2);
        const a2 = document.createElement('a');
        a2.href = url2; a2.download = `Revenue_deposit-${noteNum}.xlsx`;
        document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
        setTimeout(()=>URL.revokeObjectURL(url2), 4000);
      }
    });
  } else {
    const outBuf = await wb.xlsx.writeBuffer();
    const blob = new Blob([outBuf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Revenue_deposit-${noteNum}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }

  state.nextDepositNotesheetNo = noteNum + 1;

  const DEPOSIT_TO_REVENUE_KEY = state.settings.depositRevenueMap;
  const depositLogId = uid();
  const revEntry = {id:depositLogId, date:endISO, desc:`Deposit Notesheet #${noteNum} (${startISO} to ${endISO})`};
  REVENUE_CATS.forEach(c=>{ revEntry[c.key] = 0; });
  lines.forEach(([desc, amt])=>{
    const key = DEPOSIT_TO_REVENUE_KEY[desc];
    if(key) revEntry[key] = (revEntry[key]||0) + amt;
  });
  const [endYear, endMonthNum] = endISO.split('-');
  const monthName = MONTHS[parseInt(endMonthNum,10)-1];
  const mlKey = monthKeyFor(monthName, endYear);
  const mlRec = getMonthlyLedgerMonth(mlKey);
  mlRec.revenueEntries.push(revEntry);

  if(!Array.isArray(state.depositNotesheetLog)) state.depositNotesheetLog = [];
  state.depositNotesheetLog.push({
    id:depositLogId, generatedAt:new Date().toISOString(), noteNum, startDate:startISO, endDate:endISO,
    lines: lines.map(([desc,amt])=>({desc,amt})),
    grandTotal: parsed.grand
  });

  saveState();
  render();
}

/* Clones a worksheet cell-for-cell (values, styles, merges, column widths,
   row heights, page setup/margins/print area) into destWb under a new name,
   so the source template's exact formatting is preserved. */
function cloneTemplateSheet(destWb, srcWs, name){
  const ws = destWb.addWorksheet(name);
  for(let c=1;c<=srcWs.columnCount;c++){ ws.getColumn(c).width = srcWs.getColumn(c).width; }
  for(let r=1;r<=srcWs.rowCount;r++){
    ws.getRow(r).height = srcWs.getRow(r).height;
    for(let c=1;c<=srcWs.columnCount;c++){
      const sCell = srcWs.getCell(r,c);
      const dCell = ws.getCell(r,c);
      dCell.value = sCell.value;
      dCell.style = JSON.parse(JSON.stringify(sCell.style));
    }
  }
  (srcWs.model.merges||[]).forEach(rng=>{ try{ ws.mergeCells(rng); }catch(e){ /* already covered */ } });
  /* Copy page setup (orientation, margins, paper size, fit-to-page,
     print area) as-is. printArea itself is just a bare cell range like
     "A2:I37" - no sheet name embedded - so copying it is safe. The
     earlier corruption came from ExcelJS not escaping an apostrophe
     when it QUOTES the destination sheet's name while writing the
     Print_Area defined name; that's now fixed at the source by
     stripping apostrophes out of voucher sheet names in
     appendDebitVoucherSheets, so printArea can stay - dropping it
     entirely made Excel fit-to-page the sheet's whole used range
     instead of just the voucher area, printing everything smaller
     than intended. */
  ws.pageSetup = JSON.parse(JSON.stringify(srcWs.pageSetup));
  return ws;
}

/* "=1234-" / "=1234.50-" style amount box, matching the template's convention */
function formatTakaBox(amount){
  const n = Math.round((Number(amount)||0)*100)/100;
  const s = (n % 1 === 0) ? String(n) : n.toFixed(2);
  return '=' + formatAsianAmount(s) + '/-';
}

/* Splits a numbered multi-item description like "1. A 2. B 3. C" onto
   separate lines - line 1 keeps item 1, then every next "N." / "N)" marker
   (2 onward) starts a fresh line, so the Debit Voucher's Description box
   prints each item on its own line instead of one run-on sentence. */
function formatMultiItemDescription(text){
  if(!text) return text;
  return text.replace(/\s+(\d{1,3}[.\)]\s)/g, '\n$1').trim();
}

/* Mirrors the description box line-for-line: with one section it's just
   the plain Taka box; with 2+ sections each section's own amount goes on
   its own line, in the same order as the numbered description lines, so
   in the exported voucher "1. Purchasing of Dictionary" lines up with
   "1950/-" and "2. Conveyance" lines up with "160/-" beside it. The
   combined total still goes in the separate Total Amount / In Words box
   below (G28), unchanged. */
function formatMultiItemAmounts(item){
  if(!item.sections || item.sections.length<=1) return formatTakaBox(item.amount);
  return item.sections.map(s=>formatTakaBox(Number(s.amount)||0)).join('\n');
}

/* Adds one Debit Voucher sheet per Cash Disbursed (CoA) entry for the day,
   skipping blank-amount vouchers. `used` is the sheet-name set shared with
   the day's summary sheet so names never collide. */
async function appendDebitVoucherSheets(wb, day, used){
  const entries = [];
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(item=>{
      const amt = Number(item.amount)||0;
      if(amt>0) entries.push({cat, item, amt});
    });
  });
  if(entries.length===0) return;
  let srcWs;
  try{ srcWs = await loadDebitVoucherTemplate(); }
  catch(e){ return; } // if the template can't load, skip vouchers rather than block the whole export
  entries.forEach(({cat, item, amt})=>{
    const label = (item.desc && item.desc.trim()) ? item.desc.trim() : cat.label;
    const sheetName = uniqueSheetName(label.replace(/[\\/\?\*\[\]:']/g,''), used);
    const ws = cloneTemplateSheet(wb, srcWs, sheetName);
    ws.getCell('C9').value = item.voucher;
    ws.getCell('H9').value = `${dayLabelFull(day.date)} ${state.year}`;
    ws.getCell('B14').value = formatMultiItemDescription(label);
    ws.getCell('G14').value = formatMultiItemAmounts(item);
    ws.getCell('B28').value = `In Words: ${takaInWords(amt)}`;
    ws.getCell('G28').value = formatTakaBox(amt);

    /* No & Description boxes: top-left aligned */
    ws.getCell('C9').alignment = {horizontal:'left', vertical:'top'};
    ws.getCell('B14').alignment = {horizontal:'left', vertical:'top', wrapText:true};
    /* In Words box: wrap so longer amounts (e.g. lakhs/crores) don't get cut off */
    ws.getCell('B28').alignment = {horizontal:'left', vertical:'top', wrapText:true};
    /* Taka (amount) box: top-center aligned; wrapText so each section's
       amount lands on its own line, matching the description box. */
    ws.getCell('G14').alignment = {horizontal:'center', vertical:'top', wrapText:true};
    /* Bottom border under the Total Amount / In Words line */
    ['B29','C29','D29','E29','F29','G29','H29'].forEach(addr=>{
      const cell = ws.getCell(addr);
      cell.border = Object.assign({}, cell.border, {bottom:{style:'thin'}});
    });
    /* Right border for the repeated-amount box (G28:H29) */
    ['G28','H28','G29','H29'].forEach(addr=>{
      const cell = ws.getCell(addr);
      cell.border = Object.assign({}, cell.border, {right:{style:'thin'}});
    });
  });
}

const FONT = 'Times New Roman';
const THIN = {style:'thin'};
const BORDER_ALL = {top:THIN,left:THIN,bottom:THIN,right:THIN};

/* Excel custom format for Asian/Indian comma grouping: last 3 digits,
   then groups of 2 (e.g. 12,34,567) - matches the on-screen inputs. */
const ASIAN_NUMFMT = '#,##,##0.00';
function setCell(ws, addr, {value, formula, size=11, bold=false, center=false, numFmt}={}){
  const cell = ws.getCell(addr);
  if(formula!==undefined) cell.value = {formula};
  else cell.value = (value===undefined?'':value);
  cell.font = {name:FONT, size, bold};
  cell.border = BORDER_ALL;
  cell.alignment = center ? {horizontal:'center', vertical:'center', wrapText:true} : {vertical:'center'};
  if(numFmt) cell.numFmt = numFmt;
  return cell;
}

/* Writes one ledger row: A = voucher (blank+bordered if none), B = centered
   label, and the amount goes in EITHER C or D depending on valueCol - the
   other of the two is left as a blank bordered filler (valueCol='D') or left
   completely untouched with no border (valueCol='C'), exactly like the sample. */
/* Excel doesn't auto-fit a row's height once we set one explicitly - even
   with wrap text turned on - so a long description just gets visually
   clipped until someone manually double-clicks the row border. We
   estimate how many wrapped lines the text needs (given the column's
   character width and font size) and size the row for that ourselves. */
function estimateWrappedRowHeight(text, colWidthChars, fontSize=11, minHeight=18.75){
  if(!text) return minHeight;
  const charsPerLine = Math.max(6, Math.round((colWidthChars*0.85) * (11/Math.max(fontSize,8))));
  const paragraphs = String(text).split('\n');
  let lines = 0;
  paragraphs.forEach(p=>{ lines += Math.max(1, Math.ceil(p.length / charsPerLine)); });
  const lineHeight = 15 * (fontSize/11);
  const height = lines*lineHeight + 6;
  return Math.max(minHeight, Math.ceil(height*1.15)); // 15% safety margin against estimation error
}

function writeRow(ws, r, {voucher='', label='', size=11, bold=false, valueCol='C', value, formula}={}){
  setCell(ws, `A${r}`, {value:voucher, size:11, bold:false});
  setCell(ws, `B${r}`, {value:label, size, bold, center:true});
  if(valueCol==='D'){
    setCell(ws, `C${r}`, {value:'', size, bold});
    setCell(ws, `D${r}`, {value, formula, size, bold, numFmt:ASIAN_NUMFMT});
  } else {
    setCell(ws, `C${r}`, {value, formula, size, bold, numFmt:ASIAN_NUMFMT});
  }
  ws.getRow(r).height = estimateWrappedRowHeight(label, 58, size);
  return r;
}

function writeDaySheet(ws, day, cmp, beginRefs){
  ws.getColumn(1).width = 13;
  ws.getColumn(2).width = 58;
  ws.getColumn(3).width = 18;
  ws.getColumn(4).width = 16;

  let r = 1;
  ws.mergeCells(`A${r}:C${r}`);
  setCell(ws, `A${r}`, {value:`Daily Cash & Bank Account Summary - ${dayLabelFull(day.date)} ${state.year}`, size:16, bold:true, center:true});
  // Match the sample's exact merged-title border pattern: outer box only, no internal dividers.
  ws.getCell(`A${r}`).border = {left:THIN, top:THIN, bottom:THIN};
  ws.getCell(`B${r}`).border = {top:THIN, bottom:THIN};
  ws.getCell(`C${r}`).border = {top:THIN, bottom:THIN, right:THIN};
  ws.getRow(r).height = 26;
  r++;

  // Beginning balance cash -> column D
  const beginCashRow = r;
  writeRow(ws, r, {label:'Beginning Balance Cash', size:14, bold:true, valueCol:'D', ...beginRefs.cash});
  r++;

  const revenueStart = r;
  writeRow(ws, r, {label:'Service revenue collected', value:Number(day.serviceRevenue)||0}); r++;
  if((Number(day.miscCollection)||0) > 0){
    writeRow(ws, r, {label:'Miscellaneous collection'+(miscCollectionDescText(day)?' - '+miscCollectionDescText(day):''), value:Number(day.miscCollection)||0}); r++;
  }
  day.withdrawals.forEach(w=>{
    const bank = state.banks.find(b=>b.id===w.bankId);
    writeRow(ws, r, {label:'Cash withdrawn from '+(bank?bank.name:'bank')+(w.note?' - '+w.note:''), value:Number(w.amount)||0});
    r++;
  });
  const revenueEnd = r-1;

  const totalCollectedRow = r;
  writeRow(ws, r, {label:'Total cash collected', size:12, bold:true, formula:`SUM(C${revenueStart}:C${revenueEnd})`}); r++;

  const totalAmountCashRow = r;
  writeRow(ws, r, {label:'Total Amount Cash', size:14, bold:true, valueCol:'D', formula:`D${beginCashRow}+C${totalCollectedRow}`}); r++;

  writeRow(ws, r, {label:'Cash Disbursed Summary', size:11, bold:true, value:''}); r++;

  const disbStart = r;
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(item=>{
      writeRow(ws, r, {voucher:item.voucher, label:item.desc||cat.label, value:Number(item.amount)||0});
      r++;
    });
  });
  day.deposits.forEach(d=>{
    const bank = state.banks.find(b=>b.id===d.bankId);
    writeRow(ws, r, {label:'Cash deposited to '+(bank?bank.name:'bank')+(d.note?' - '+d.note:''), value:Number(d.amount)||0});
    r++;
  });
  let disbEnd = r-1;
  if(disbEnd < disbStart){ writeRow(ws, r, {label:'(no disbursements)', value:0}); disbEnd=r; r++; }

  const totalDisbursedRow = r;
  writeRow(ws, r, {label:'Total Cash Disbursed', size:12, bold:true, formula:`SUM(C${disbStart}:C${disbEnd})`}); r++;

  const closingAmountRow = r;
  writeRow(ws, r, {label:'Closing amount', size:12, bold:true, valueCol:'D', formula:`D${totalAmountCashRow}-C${totalDisbursedRow}`}); r++;

  const iouStart = r;
  activeIousForDay(day.date).forEach(i=>{ writeRow(ws, r, {label:i.desc||'IOU', value:Number(i.amount)||0}); r++; });
  let iouEnd = r-1;
  if(iouEnd < iouStart){ writeRow(ws, r, {label:'(no IOU)', value:0}); iouEnd=r; r++; }

  const totalIouRow = r;
  writeRow(ws, r, {label:'Total IOU', size:11, bold:true, formula:`SUM(C${iouStart}:C${iouEnd})`}); r++;

  const cashInHandRow = r;
  writeRow(ws, r, {label:'Cash In Hand', size:14, bold:true, formula:`D${closingAmountRow}-C${totalIouRow}`}); r++;

  const bankClosingAddr = {};
  state.banks.forEach(b=>{
    const bd = day.banksDaily[b.id] || {sslDeposit:0,fees:0,salaryAccount:0,salaryCash:0};
    const bankXfers = (day.bankTransfers||[]).filter(t=>t.fromBankId!==t.toBankId);
    const beginBankRow = r;
    const ref = beginRefs.banks[b.id] || {value:0};
    writeRow(ws, r, {label:`Beginning Balance - ${b.name}`, size:14, bold:true, ...ref}); r++;

    bankXfers.filter(t=>t.toBankId===b.id).forEach(t=>{
      const fromBank = state.banks.find(x=>x.id===t.fromBankId);
      writeRow(ws, r, {label:`Transferred from ${fromBank?fromBank.name:'bank'}`, value:Number(t.amount)||0});
      r++;
    });
    if(bd.sslDeposit){ writeRow(ws, r, {label:'Other deposit / SSL Commerz', value:Number(bd.sslDeposit)||0}); r++; }
    day.deposits.filter(d=>d.bankId===b.id).forEach(d=>{
      writeRow(ws, r, {label:'Cash deposited from ledger'+(d.note?' - '+d.note:''), value:Number(d.amount)||0});
      r++;
    });
    const depositEnd = Math.max(r-1, beginBankRow);

    const totalAmountBankRow = r;
    writeRow(ws, r, {label:`Total Amount - ${b.name}`, size:14, bold:true, formula:`SUM(C${beginBankRow}:C${depositEnd})`}); r++;

    const disburseStart = r;
    if(bd.fees){ writeRow(ws, r, {label:'Bank fees', value:Number(bd.fees)||0}); r++; }
    if(bd.salaryAccount){ writeRow(ws, r, {label:'Salary payment - by account', value:Number(bd.salaryAccount)||0}); r++; }
    if(bd.salaryCash){ writeRow(ws, r, {label:'Salary payment - by cash', value:Number(bd.salaryCash)||0}); r++; }
    bankXfers.filter(t=>t.fromBankId===b.id).forEach(t=>{
      const toBank = state.banks.find(x=>x.id===t.toBankId);
      writeRow(ws, r, {label:`Transferred to ${toBank?toBank.name:'bank'}`, value:Number(t.amount)||0});
      r++;
    });
    day.withdrawals.filter(w=>w.bankId===b.id).forEach(w=>{
      writeRow(ws, r, {label:'Cash withdrawn to ledger'+(w.note?' - '+w.note:''), value:Number(w.amount)||0});
      r++;
    });
    let disburseEnd = r-1;
    if(disburseEnd < disburseStart){ writeRow(ws, r, {label:'Bank fees', value:0}); disburseEnd=r; r++; }

    const totalDisbursedBankRow = r;
    writeRow(ws, r, {label:'Total Cash Disbursed', size:14, bold:true, formula:`SUM(C${disburseStart}:C${disburseEnd})`}); r++;

    const closingBankRow = r;
    writeRow(ws, r, {label:`Closing Balance - ${b.name}`, size:14, bold:true, valueCol:'D', formula:`C${totalAmountBankRow}-C${totalDisbursedBankRow}`}); r++;

    bankClosingAddr[b.id] = `D${closingBankRow}`;
  });

  const grandTotalRow = r;
  const terms = [`D${closingAmountRow}`, ...Object.values(bankClosingAddr)].join('+');
  writeRow(ws, r, {label:'Grand Total (Closing amount + all Bank Closing Balances)', size:15, bold:true, valueCol:'D', formula:terms});

  return {cashInHandAddr:`C${cashInHandRow}`, closingAmountAddr:`D${closingAmountRow}`, bankClosingAddr, grandTotalAddr:`D${grandTotalRow}`};
}

/* --- Annual Summary: a Category x Month matrix for a full year, across
   both the current month and everything archived. --- */
async function exportAnnualSummary(year){
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }
  const vouchers = allVouchers().filter(v=>v.date.slice(0,4)===year);
  if(vouchers.length===0){ showAlert('No expenses recorded for '+year+' yet.'); return; }

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet(`Annual ${year}`);
  ws.getColumn(1).width = 26;
  for(let m=2;m<=13;m++) ws.getColumn(m).width = 12;
  ws.getColumn(14).width = 14;

  function put(addr, value, {size=11, bold=false, numFmt}={}){
    const c = ws.getCell(addr);
    c.value = (value===''||value===undefined) ? '' : value;
    c.font = {name:FONT, size, bold};
    c.border = BORDER_ALL;
    c.alignment = {horizontal:'center', vertical:'center'};
    if(numFmt) c.numFmt = numFmt;
    return c;
  }

  ws.mergeCells('A1:N1');
  put('A1', `Annual Category Summary - ${year}`, {size:16, bold:true});
  ws.getRow(1).height = 24;

  let r = 3;
  put(`A${r}`, 'Category', {bold:true});
  for(let m=0;m<12;m++){ put(String.fromCharCode(66+m)+r, MONTHS[m].slice(0,3), {bold:true}); }
  put('N'+r, 'Total', {bold:true});
  r++;

  const monthColTotals = new Array(12).fill(0);
  SUMMARY_ORDER.forEach(catKey=>{
    const cat = COA.find(c=>c.key===catKey);
    put(`A${r}`, cat.label);
    let rowTotal = 0;
    for(let m=0;m<12;m++){
      const mm = String(m+1).padStart(2,'0');
      const total = vouchers.filter(v=>v.catKey===catKey && v.date.slice(5,7)===mm).reduce((s,v)=>s+v.amount,0);
      put(String.fromCharCode(66+m)+r, total||'', {numFmt:ASIAN_NUMFMT});
      rowTotal += total;
      monthColTotals[m] += total;
    }
    put('N'+r, rowTotal, {bold:true, numFmt:ASIAN_NUMFMT});
    r++;
  });
  put(`A${r}`, 'Total', {bold:true});
  for(let m=0;m<12;m++){ put(String.fromCharCode(66+m)+r, monthColTotals[m], {bold:true, numFmt:ASIAN_NUMFMT}); }
  put('N'+r, monthColTotals.reduce((s,v)=>s+v,0), {bold:true, numFmt:ASIAN_NUMFMT});

  if(previewOnly){
    showWorkbookPreview(wb, {
      title: `Monthly Ledger \u2014 ${monthKeyLabel(key)}`,
      onDownload: ()=> downloadWorkbook(wb, `${key}_Monthly_Ledger.xlsx`)
    });
  } else {
    await downloadWorkbook(wb, `${key}_Monthly_Ledger.xlsx`);
  }
}

function uniqueSheetName(base, used){
  base = (base||'Sheet').slice(0,31);
  let name = base, n=2;
  while(used.has(name)){ name = (base+' '+n).slice(0,31); n++; }
  used.add(name);
  return name;
}

    put(`D${r}`, it.desc, {size:11, wrap:true});
    put(`E${r}`, it.amount, {size:10, name:'Arial', numFmt:ASIAN_NUMFMT});
    ws.getRow(r).height = estimateWrappedRowHeight(it.desc, 47, 11);
    r++;
  });
  const endRow = r-1;

  put(`C${r}`,'Total Amount',{size:12, bold:true});
  put(`E${r}`, {formula:`SUM(E${startRow}:E${endRow})`}, {size:10, name:'Arial', numFmt:ASIAN_NUMFMT});
  const totalRow = r; r++;

  ws.mergeCells(`C${r}:E${r}`);
  put(`C${r}`, takaInWords(total), {size:12, bold:true});
  const wordsRow = r;

  const my = monthYearAbbr();
  const s = state.signatories;

  // Left/right border down the notesheet body from row 6 through the
  // taka-in-words line (no bottom border there anymore - that moved to
  // the gap area between the words line and the signature blocks below).
  for(let row=6; row<=wordsRow; row++){
    const leftCell = ws.getCell(`B${row}`);
    leftCell.border = {...(leftCell.border||{}), left:THIN};
    const rightCell = ws.getCell(`F${row}`);
    rightCell.border = {...(rightCell.border||{}), right:THIN};
  }
  // Right border on F4:F5 (attach/sheet-no header rows)
  ws.getCell('F4').border = {...(ws.getCell('F4').border||{}), right:THIN};
  ws.getCell('F5').border = {...(ws.getCell('F5').border||{}), right:THIN};

  // Bordered box (left, right, bottom) around the blank gap between the
  // taka-in-words line and the first signature block.
  const gapStart = wordsRow+1, gapEnd = wordsRow+11;
  for(let row=gapStart; row<=gapEnd; row++){
    const leftCell = ws.getCell(`B${row}`);
    leftCell.border = {...(leftCell.border||{}), left:THIN};
    const rightCell = ws.getCell(`F${row}`);
    rightCell.border = {...(rightCell.border||{}), right:THIN};
  }
  for(let col=2; col<=6; col++){
    const c = ws.getCell(gapEnd, col);
    c.border = {...(c.border||{}), bottom:THIN};
  }

  const fmt = (state.settings && state.settings.exportFormat) || {};
  const sigIndent = ' '.repeat(Number(fmt.sigIndentSpaces)>=0 ? Number(fmt.sigIndentSpaces) : 60);
  const sigRowH = Number(fmt.sigRowHeight) || 50;
  let rr = wordsRow+4;
  ws.mergeCells(`D${rr}:E${rr}`);
  put(`E${rr}`, `${sigIndent}${s.accountant}\n${sigIndent}${s.accountantRole}\n${sigIndent}${my}`, {size:13, border:false, wrap:true});
  ws.getRow(rr).height = sigRowH;
  rr = wordsRow+5;
  put(`C${rr}`, 'Admin Manager', {size:13, border:false});
  ws.getCell(`B${rr}`).border = {bottom:THIN};
  ws.getCell(`C${rr}`).border = {bottom:THIN};
  rr = wordsRow+8;
  ws.mergeCells(`D${rr}:E${rr}`);
  put(`E${rr}`, `${sigIndent}${s.adminManager}\n${sigIndent}${s.adminManagerRole}\n${sigIndent}${my}`, {size:13, border:false, wrap:true});
  ws.getRow(rr).height = sigRowH;
  rr = wordsRow+10;
  put(`C${rr}`, 'Principal', {size:13, border:false});
  ws.getCell(`B${rr}`).border = {bottom:THIN};
  ws.getCell(`C${rr}`).border = {bottom:THIN};
  rr = wordsRow+11;
  ws.mergeCells(`D${rr}:E${rr}`);
  put(`E${rr}`, `${sigIndent}${s.principal}\n${sigIndent}${s.principalRole}\n${sigIndent}${my}`, {size:13, border:false, wrap:true});
  ws.getRow(rr).height = sigRowH;
}

/* --- Consolidated Withdraw Summary sheet --- */
function writeWithdrawSummary(ws, rows, grandTotal, yearCode, num){
  ws.getColumn(2).width = 4; ws.getColumn(3).width = 12;
  for(let i=4;i<=8;i++) ws.getColumn(i).width = 10;
  ws.getColumn(9).width = 18;

  function put(addr, value, {size=20, bold=false, name=FONT, center=false, numFmt}={}){
    const c = ws.getCell(addr);
    c.value = value;
    c.font = {name, size, bold};
    if(center) c.alignment = {horizontal:'center', vertical:'center'};
    if(numFmt) c.numFmt = numFmt;
    return c;
  }

  ws.mergeCells('B1:I1');
  put('B1', `III/Acct/Madrasa/Withdraw Summary/${yearCode}-${num}`, {size:14, bold:true, center:true});
  ws.mergeCells('B2:I2');
  put('B2', 'Cash withdraw Summary', {size:20, bold:true, center:true});

  let r = 3;
  rows.forEach((row, i)=>{
    put(`B${r}`, String(i+1), {size:20});
    ws.mergeCells(`C${r}:H${r}`);
    put(`C${r}`, row.label, {size:20});
    put(`I${r}`, row.total, {size:16, bold:true, name:'Arial', numFmt:ASIAN_NUMFMT});
    r++;
  });
  const firstRow = 3, lastRow = r-1;

  ws.mergeCells(`B${r}:H${r}`);
  const wordsCell = put(`B${r}`, `Total: ${takaInWords(grandTotal)}`, {size:20, bold:true});
  wordsCell.alignment = {wrapText:true, vertical:'middle'};
  put(`I${r}`, {formula:`SUM(I${firstRow}:I${lastRow})`}, {size:16, bold:true, name:'Arial', numFmt:ASIAN_NUMFMT});
  const totalRow = r;
  const fmt = (state.settings && state.settings.exportFormat) || {};
  ws.getRow(totalRow).height = Number(fmt.wordsRowHeight) || 60; // room for wrapped taka-in-words text

  const thin = {style: fmt.borderStyle || 'thin'};
  for(let row=1; row<=totalRow; row++){
    for(let col=2; col<=9; col++){
      ws.getCell(row, col).border = {top:thin, bottom:thin, left:thin, right:thin};
    }
  }

  put(`B${totalRow+4}`, 'Accountant', {size:14, bold:true, name:'Calibri'});
  put(`I${totalRow+4}`, 'Principal', {size:14, bold:true, name:'Calibri'});
}

async function exportNotesheets(startDate, endDate, shouldSave, previewOnly, incrementNumbering){
  if(incrementNumbering===undefined) incrementNumbering = true;
  if(!startDate || !endDate){ showAlert('Pick a from and to date.'); return; }
  if(startDate > endDate){ showAlert('The "From date" must be before the "To date".'); return; }
  const {cats, grandTotal} = collectNotesheetRange(startDate, endDate);
  if(cats.length===0){ showAlert('No expenses were recorded in that date range.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }

  const wb = new ExcelJS.Workbook();
  const used = new Set();
  const summaryRows = [];

  cats.forEach(({key, cat, items, total, firstDate, lastDate})=>{
    const number = (state.notesheetCounters[key]||0) + 1;
    const ws = wb.addWorksheet(uniqueSheetName(`${coaText(cat,'notesheetLabel')} ${number}`.replace(/[\\\/\?\*\[\]:]/g,''), used));
    writeNotesheet(ws, cat, number, items, total, firstDate, lastDate);
    if(incrementNumbering) state.notesheetCounters[key] = number;
    summaryRows.push({label:coaText(cat,'summaryLabel'), total});
  });

  const summaryNum = (state.summaryCounterNum||0) + 1;
  const wsSummary = wb.addWorksheet(uniqueSheetName(`${state.summaryCounterYear}-${summaryNum}`, used));
  writeWithdrawSummary(wsSummary, summaryRows, grandTotal, state.summaryCounterYear, summaryNum);
  if(incrementNumbering) state.summaryCounterNum = summaryNum;

  if(shouldSave && incrementNumbering){
    if(!Array.isArray(state.withdrawNotesheetLog)) state.withdrawNotesheetLog = [];
    state.withdrawNotesheetLog.push({
      id:uid(), generatedAt:new Date().toISOString(), startDate, endDate,
      summaryLabel:`${state.summaryCounterYear}-${summaryNum}`,
      categories: summaryRows.map(r=>({label:r.label, total:r.total})),
      grandTotal
    });
  }

  await saveState();
  if(previewOnly){
    showWorkbookPreview(wb, {
      title: `Notesheets & Summary (${startDate} to ${endDate})`,
      onDownload: ()=> downloadWorkbook(wb, `Notesheets_${startDate}_to_${endDate}.xlsx`)
    });
  } else {
    await downloadWorkbook(wb, `Notesheets_${startDate}_to_${endDate}.xlsx`);
  }
  render();
}

/* ---- Excel-like preview modal: renders an ExcelJS workbook as HTML
   tables (one tab per sheet, merged cells respected) so the user can
   eyeball a notesheet/summary before it's actually downloaded. Since
   ExcelJS doesn't evaluate formulas, evalPreviewFormula() resolves the
   simple SUM(range) formulas this app generates so totals still show. ----*/
function evalPreviewFormula(ws, formula){
  const m = /^SUM\(([A-Z]+)(\d+):([A-Z]+)(\d+)\)$/.exec((formula||'').trim());
  if(!m) return null;
  const [,colA,rowA,,rowB] = m;
  let sum = 0;
  for(let r=parseInt(rowA,10); r<=parseInt(rowB,10); r++){
    const v = ws.getCell(`${colA}${r}`).value;
    sum += (typeof v === 'number') ? v : 0;
  }
  return sum;
}
function previewCellText(ws, cell){
  const v = cell.value;
  if(v===null || v===undefined) return '';
  if(v instanceof Date) return v.toLocaleDateString('en-GB');
  if(typeof v === 'object' && v.formula) {
    const evald = evalPreviewFormula(ws, v.formula);
    return evald===null ? '' : moneyPlain(evald);
  }
  if(typeof v === 'object' && v.richText) return v.richText.map(t=>t.text).join('');
  if(typeof v === 'number') return moneyPlain(v);
  return String(v);
}
function moneyPlain(n){
  return Number(n).toLocaleString('en-IN', {maximumFractionDigits:2});
}
function buildSheetPreviewTable(ws){
  const merges = (ws.model && ws.model.merges) || [];
  const covered = {}; // "r-c" -> {rowspan, colspan} on top-left, or 'skip' on covered-but-not-topleft
  merges.forEach(rangeStr=>{
    const m = /^([A-Z]+)(\d+):([A-Z]+)(\d+)$/.exec(rangeStr);
    if(!m) return;
    const [,c1,r1,c2,r2] = m;
    const colNum = s=>{ let n=0; for(const ch of s) n = n*26 + (ch.charCodeAt(0)-64); return n; };
    const R1=+r1, R2=+r2, C1=colNum(c1), C2=colNum(c2);
    covered[`${R1}-${C1}`] = {rowspan:R2-R1+1, colspan:C2-C1+1};
    for(let r=R1;r<=R2;r++) for(let c=C1;c<=C2;c++){ if(r===R1&&c===C1) continue; covered[`${r}-${c}`] = 'skip'; }
  });
  const maxRow = Math.max(ws.rowCount, 1);
  const maxCol = Math.max(ws.columnCount, 1);

  // Gather each row into {cells:[{r,c,text,bold,numeric}], wide} - "wide"
  // means one cell spans (via merge) more than half the sheet's columns,
  // a strong signal it's a title/sentence/section banner rather than a
  // label+amount line.
  const rows = [];
  for(let r=1; r<=maxRow; r++){
    const cells = [];
    let hasContent = false;
    for(let c=1; c<=maxCol; c++){
      const key = `${r}-${c}`;
      if(covered[key]==='skip') continue;
      const span = covered[key];
      const cell = ws.getCell(r,c);
      const text = previewCellText(ws, cell);
      const bold = !!(cell.font && cell.font.bold);
      const numeric = typeof cell.value === 'number' || (typeof cell.value==='object' && cell.value && cell.value.formula);
      if(text!=='') hasContent = true;
      cells.push({r, c, text, bold, numeric, colspan:(span&&span.colspan)||1});
    }
    if(cells.length) rows.push({r, cells, hasContent});
  }

  let html = '<div class="doc-preview">';
  rows.forEach(({cells, hasContent})=>{
    if(!hasContent) return; // skip blank spacer rows entirely - cleaner reading
    const textCells = cells.filter(c=>!c.numeric);
    const numCells = cells.filter(c=>c.numeric);
    const wideTextCell = textCells.find(c=>c.colspan>=4);
    const anyBold = cells.some(c=>c.bold);

    if(wideTextCell && numCells.length===0){
      // A single wide sentence/title with no amount alongside it - treat
      // as a heading or narrative line (sheet title, instruction sentence,
      // "Total: <amount in words>", signatory name/role, etc).
      const isBig = wideTextCell.text.length < 60 && anyBold;
      html += `<div class="doc-row doc-row--${isBig?'title':'note'}">
        <span class="doc-editable" contenteditable="true" data-r="${wideTextCell.r}" data-c="${wideTextCell.c}">${escapeHtml(wideTextCell.text)}</span>
      </div>`;
      return;
    }

    if(textCells.length && numCells.length){
      // The common case: a description (one or more text cells) on the
      // left, an amount on the right - render as a clean receipt-style line.
      const isTotal = anyBold && /total/i.test(textCells.map(c=>c.text).join(' '));
      html += `<div class="doc-row doc-row--line${isTotal?' doc-row--total':''}">
        <span class="doc-desc">${textCells.map(c=>`<span class="doc-editable" contenteditable="true" data-r="${c.r}" data-c="${c.c}">${escapeHtml(c.text)}</span>`).join(' <span class="doc-sep">&middot;</span> ')}</span>
        <span class="doc-amt">${numCells.map(c=>`<span class="doc-editable" contenteditable="true" data-r="${c.r}" data-c="${c.c}">${escapeHtml(c.text)}</span>`).join(' ')}</span>
      </div>`;
      return;
    }

    if(textCells.length && !numCells.length){
      // Short text-only row (a label like "Accountant" / "Admin Manager") -
      // render as a small caption.
      html += `<div class="doc-row doc-row--caption">${textCells.map(c=>`<span class="doc-editable" contenteditable="true" data-r="${c.r}" data-c="${c.c}">${escapeHtml(c.text)}</span>`).join(' ')}</div>`;
      return;
    }

    if(numCells.length){
      html += `<div class="doc-row doc-row--line"><span class="doc-desc"></span><span class="doc-amt">${numCells.map(c=>`<span class="doc-editable" contenteditable="true" data-r="${c.r}" data-c="${c.c}">${escapeHtml(c.text)}</span>`).join(' ')}</span></div>`;
    }
  });
  html += '</div>';
  return html;
}
function showWorkbookPreview(wb, {title, onDownload}){
  let activeIdx = 0;
  const overlay = el(`
    <div class="xlsx-preview-overlay">
      <div class="xlsx-preview-modal">
        <div class="xlsx-preview-head">
          <h4>${escapeHtml(title||'Preview')}</h4>
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:12px; color:var(--ink-soft);">Click any cell to correct it before downloading</span>
            ${onDownload ? '<button type="button" class="secondary" id="xlsxp-download">&#11015; Download this file</button>' : ''}
            <button type="button" class="secondary" id="xlsxp-close">&times; Close preview</button>
          </div>
        </div>
        <div class="xlsx-preview-tabs" id="xlsxp-tabs"></div>
        <div class="xlsx-preview-body" id="xlsxp-body"></div>
      </div>
    </div>
  `);
  const tabsEl = overlay.querySelector('#xlsxp-tabs');
  const bodyEl = overlay.querySelector('#xlsxp-body');
  function draw(){
    tabsEl.innerHTML = '';
    wb.worksheets.forEach((ws,i)=>{
      const b = document.createElement('button');
      b.type='button'; b.textContent = ws.name; b.className = i===activeIdx ? 'active' : '';
      b.onclick = ()=>{ activeIdx = i; draw(); };
      tabsEl.appendChild(b);
    });
    bodyEl.innerHTML = buildSheetPreviewTable(wb.worksheets[activeIdx]);
    bodyEl.querySelectorAll('td[contenteditable]').forEach(td=>{
      td.addEventListener('blur', ()=>{
        const ws = wb.worksheets[activeIdx];
        const r = parseInt(td.dataset.r, 10), c = parseInt(td.dataset.c, 10);
        const cell = ws.getCell(r, c);
        const raw = td.textContent.trim();
        const cleaned = raw.replace(/,/g, '');
        if(raw==='') { cell.value = null; }
        else if(!isNaN(cleaned) && cleaned!=='') { cell.value = Number(cleaned); }
        else { cell.value = raw; }
      });
      td.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){ e.preventDefault(); td.blur(); }
      });
    });
  }
  draw();
  overlay.querySelector('#xlsxp-close').onclick = ()=> overlay.remove();
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
  if(onDownload){
    overlay.querySelector('#xlsxp-download').onclick = async ()=>{ await onDownload(); overlay.remove(); };
  }
  document.body.appendChild(overlay);
}

async function downloadWorkbook(wb, filename){
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function exportDay(dayId){
  if(!dayId){ showAlert('No day selected.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }
  const day = findDay(dayId);
  const computed = computeAll();
  const c = computed[dayId];
  const wb = new ExcelJS.Workbook();
  const used = new Set();
  const ws = wb.addWorksheet(sheetNameFor(day, used));
  const beginRefs = {
    cash: {value: c.openingCash},
    banks: Object.fromEntries(state.banks.map(b=>[b.id, {value: c.banks[b.id].opening}]))
  };
  writeDaySheet(ws, day, c, beginRefs);

async function exportMonth(){
  if(state.days.length===0){ showAlert('No days recorded yet.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }
  const computed = computeAll();
  const wb = new ExcelJS.Workbook();
  const used = new Set(['Overview']);

  const wsOverview = wb.addWorksheet('Overview');

  const dayRefs = {}; // dayId -> {sheetName, cashInHandAddr, bankClosingAddr, grandTotalAddr}
  state.days.forEach((day, idx)=>{
    const c = computed[day.id];
    const sheetName = sheetNameFor(day, used);
    const ws = wb.addWorksheet(sheetName);
    let beginRefs;
    if(idx===0){
      beginRefs = {
        cash: {value: c.openingCash},
        banks: Object.fromEntries(state.banks.map(b=>[b.id, {value:c.banks[b.id].opening}]))
      };
    } else {
      const prevDay = state.days[idx-1];
      const prevRef = dayRefs[prevDay.id];
      beginRefs = {
        cash: {formula: `'${prevRef.sheetName}'!${prevRef.closingAmountAddr}`},
        banks: Object.fromEntries(state.banks.map(b=>{
          if(prevRef.bankClosingAddr[b.id]) return [b.id, {formula:`'${prevRef.sheetName}'!${prevRef.bankClosingAddr[b.id]}`}];
          return [b.id, {value: c.banks[b.id].opening}];
        }))
      };
    }
    const refs = writeDaySheet(ws, day, c, beginRefs);
    dayRefs[day.id] = {sheetName, ...refs};
  });

  // Populate the Overview sheet (created first, above, so it stays the first tab)
  wsOverview.getColumn(1).width = 20;
  for(let i=2;i<=state.banks.length+3;i++) wsOverview.getColumn(i).width = 18;
  let r=1;
  wsOverview.mergeCells(`A${r}:${String.fromCharCode(65+2+state.banks.length)}${r}`);
  setCell(wsOverview, `A${r}`, {value:`Month Overview - ${state.month} ${state.year}`, size:16, bold:true, align:'center'});
  r++;
  const headerRow = r;
  setCell(wsOverview, `A${r}`, {value:'Date', size:11, bold:true});
  setCell(wsOverview, `B${r}`, {value:'Cash In Hand', size:11, bold:true});
  state.banks.forEach((b,i)=>{ setCell(wsOverview, `${String.fromCharCode(67+i)}${r}`, {value:b.name+' Closing', size:11, bold:true}); });
  setCell(wsOverview, `${String.fromCharCode(67+state.banks.length)}${r}`, {value:'Grand Total', size:11, bold:true});
  r++;
  state.days.forEach(day=>{
    const ref = dayRefs[day.id];
    setCell(wsOverview, `A${r}`, {value:dayLabel(day.date)});
    setCell(wsOverview, `B${r}`, {formula:`'${ref.sheetName}'!${ref.cashInHandAddr}`, numFmt:ASIAN_NUMFMT});
    state.banks.forEach((b,i)=>{
      const addr = ref.bankClosingAddr[b.id];
      setCell(wsOverview, `${String.fromCharCode(67+i)}${r}`, addr?{formula:`'${ref.sheetName}'!${addr}`, numFmt:ASIAN_NUMFMT}:{value:0, numFmt:ASIAN_NUMFMT});
    });
    setCell(wsOverview, `${String.fromCharCode(67+state.banks.length)}${r}`, {formula:`'${ref.sheetName}'!${ref.grandTotalAddr}`, numFmt:ASIAN_NUMFMT});
    r++;
  });
  r++;
  setCell(wsOverview, `A${r}`, {value:'CoA Category Totals - Whole Month', size:12, bold:true});
  r++;
  COA.forEach(cat=>{
    let total = 0;
    state.days.forEach(day=>{ total += computed[day.id].coaTotals[cat.key]||0; });
    setCell(wsOverview, `A${r}`, {value:cat.label});
    setCell(wsOverview, `B${r}`, {value:cat.short});
    setCell(wsOverview, `C${r}`, {value:total, numFmt:ASIAN_NUMFMT});
    r++;
  });

  await downloadWorkbook(wb, `${state.month}${state.year}_Full_Ledger.xlsx`);
}

/* --- PWA installability & offline caching -------------------------------
   The manifest link in <head> (with an embedded icon) is what lets the
   browser offer "Install" at all. This only matters when the file is
   hosted over https:// (or localhost) - a local file:// double-click and
   Claude.ai's sandboxed artifact iframe generally won't offer an install
   prompt no matter what, that's a browser platform restriction, not
   something fixable from inside the page. Where it IS available, capture
   the prompt so the header's "Install App" button can trigger it.

   Actual offline support needs a REAL service worker file (sw.js) served
   from the same origin - a blob: URL service worker (what used to be
   registered here) can't reliably take control of or cache the page
   itself, so it never actually enabled offline use. If a sibling sw.js
   isn't present next to this HTML file (e.g. it hasn't been uploaded to
   the host yet, or this file is being viewed somewhere without one),
   registration just quietly fails and the app keeps working online only -
   nothing here depends on it being present. */
if(typeof window!=='undefined' && typeof window.addEventListener==='function'){
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    if(state) render();
  });
}
if(typeof navigator!=='undefined' && 'serviceWorker' in navigator && typeof location!=='undefined' && (location.protocol==='https:' || location.hostname==='localhost')){
  navigator.serviceWorker.register('./sw.js').catch(()=>{ /* no sw.js next to this file (yet) - fine, app still works online */ });
}
