function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

let debitVoucherTemplatePromise = null;
function loadDebitVoucherTemplate(){
  if(debitVoucherTemplatePromise) return debitVoucherTemplatePromise;
  debitVoucherTemplatePromise = (async ()=>{
    const buf = base64ToArrayBuffer(DEBIT_VOUCHER_TEMPLATE_B64);
    const tmplWb = new ExcelJS.Workbook();
    await tmplWb.xlsx.load(buf);
    return tmplWb.worksheets[0];
  })();
  return debitVoucherTemplatePromise;
}

/* Clones a worksheet cell-for-cell (values, styles, merges, column widths,
   row heights, page setup/margins/print area) into destWb under a new name,
   so the source template's exact formatting is preserved. */
function cloneTemplateSheet(destWb, srcWs, name){
  const ws = destWb.addWorksheet(name);
  for(let c=1;c<=srcWs.columnCount;c++){ ws.getColumn(c).width = srcWs.getColumn(c).width; }
  for(let r=1;r<=srcWs.rowCount;r++){
    ws.getRow(r).height = srcWs.getRow(r).height;
    for(let c=1;c<=srcWs.columnCount;c++){
      const sCell = srcWs.getCell(r,c);
      const dCell = ws.getCell(r,c);
      dCell.value = sCell.value;
      dCell.style = JSON.parse(JSON.stringify(sCell.style));
    }
  }
  (srcWs.model.merges||[]).forEach(rng=>{ try{ ws.mergeCells(rng); }catch(e){ /* already covered */ } });
  ws.pageSetup = JSON.parse(JSON.stringify(srcWs.pageSetup));
  return ws;
}

/* "=1234-" / "=1234.50-" style amount box, matching the template's convention */
function formatTakaBox(amount){
  const n = Math.round((Number(amount)||0)*100)/100;
  const s = (n % 1 === 0) ? String(n) : n.toFixed(2);
  return '=' + formatAsianAmount(s) + '/-';
}

/* Splits a numbered multi-item description like "1. A 2. B 3. C" onto
   separate lines - line 1 keeps item 1, then every next "N." / "N)" marker
   (2 onward) starts a fresh line, so the Debit Voucher's Description box
   prints each item on its own line instead of one run-on sentence. */
function formatMultiItemDescription(text){
  if(!text) return text;
  return text.replace(/\s+(\d{1,3}[.\)]\s)/g, '\n$1').trim();
}

/* Adds one Debit Voucher sheet per Cash Disbursed (CoA) entry for the day,
   skipping blank-amount vouchers. `used` is the sheet-name set shared with
   the day's summary sheet so names never collide. */
async function appendDebitVoucherSheets(wb, day, used){
  const entries = [];
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(item=>{
      const amt = Number(item.amount)||0;
      if(amt>0) entries.push({cat, item, amt});
    });
  });
  if(entries.length===0) return;
  let srcWs;
  try{ srcWs = await loadDebitVoucherTemplate(); }
  catch(e){ return; } // if the template can't load, skip vouchers rather than block the whole export
  entries.forEach(({cat, item, amt})=>{
    const label = (item.desc && item.desc.trim()) ? item.desc.trim() : cat.label;
    const sheetName = uniqueSheetName(label.replace(/[\\/\?\*\[\]:]/g,''), used);
    const ws = cloneTemplateSheet(wb, srcWs, sheetName);
    ws.getCell('C9').value = item.voucher;
    ws.getCell('H9').value = `${dayLabelFull(day.date)} ${state.year}`;
    ws.getCell('B14').value = formatMultiItemDescription(label);
    ws.getCell('G14').value = formatTakaBox(amt);
    ws.getCell('B28').value = `In Words: ${takaInWords(amt)}`;
    ws.getCell('G28').value = formatTakaBox(amt);

    /* No & Description boxes: top-left aligned */
    ws.getCell('C9').alignment = {horizontal:'left', vertical:'top'};
    ws.getCell('B14').alignment = {horizontal:'left', vertical:'top', wrapText:true};
    /* Taka (amount) box: top-center aligned */
    ws.getCell('G14').alignment = {horizontal:'center', vertical:'top'};
    /* Bottom border under the Total Amount / In Words line */
    ['B29','C29','D29','E29','F29','G29','H29'].forEach(addr=>{
      const cell = ws.getCell(addr);
      cell.border = Object.assign({}, cell.border, {bottom:{style:'thin'}});
    });
    /* Right border for the repeated-amount box (G28:H29) */
    ['G28','H28','G29','H29'].forEach(addr=>{
      const cell = ws.getCell(addr);
      cell.border = Object.assign({}, cell.border, {right:{style:'thin'}});
    });
  });
}

const FONT = 'Times New Roman';
const THIN = {style:'thin'};
const BORDER_ALL = {top:THIN,left:THIN,bottom:THIN,right:THIN};

/* Excel custom format for Asian/Indian comma grouping: last 3 digits,
   then groups of 2 (e.g. 12,34,567) - matches the on-screen inputs. */
const ASIAN_NUMFMT = '#,##,##0.00';
function setCell(ws, addr, {value, formula, size=11, bold=false, center=false, numFmt}={}){
  const cell = ws.getCell(addr);
  if(formula!==undefined) cell.value = {formula};
  else cell.value = (value===undefined?'':value);
  cell.font = {name:FONT, size, bold};
  cell.border = BORDER_ALL;
  cell.alignment = center ? {horizontal:'center', vertical:'center', wrapText:true} : {vertical:'center'};
  if(numFmt) cell.numFmt = numFmt;
  return cell;
}

/* Writes one ledger row: A = voucher (blank+bordered if none), B = centered
   label, and the amount goes in EITHER C or D depending on valueCol - the
   other of the two is left as a blank bordered filler (valueCol='D') or left
   completely untouched with no border (valueCol='C'), exactly like the sample. */
function writeRow(ws, r, {voucher='', label='', size=11, bold=false, valueCol='C', value, formula}={}){
  setCell(ws, `A${r}`, {value:voucher, size:11, bold:false});
  setCell(ws, `B${r}`, {value:label, size, bold, center:true});
  if(valueCol==='D'){
    setCell(ws, `C${r}`, {value:'', size, bold});
    setCell(ws, `D${r}`, {value, formula, size, bold, numFmt:ASIAN_NUMFMT});
  } else {
    setCell(ws, `C${r}`, {value, formula, size, bold, numFmt:ASIAN_NUMFMT});
  }
  ws.getRow(r).height = 18.75;
  return r;
}

function writeDaySheet(ws, day, cmp, beginRefs){
  ws.getColumn(1).width = 13;
  ws.getColumn(2).width = 58;
  ws.getColumn(3).width = 18;
  ws.getColumn(4).width = 16;

  let r = 1;
  ws.mergeCells(`A${r}:C${r}`);
  setCell(ws, `A${r}`, {value:`Daily Cash & Bank Account Summary - ${dayLabelFull(day.date)} ${state.year}`, size:16, bold:true, center:true});
  // Match the sample's exact merged-title border pattern: outer box only, no internal dividers.
  ws.getCell(`A${r}`).border = {left:THIN, top:THIN, bottom:THIN};
  ws.getCell(`B${r}`).border = {top:THIN, bottom:THIN};
  ws.getCell(`C${r}`).border = {top:THIN, bottom:THIN, right:THIN};
  ws.getRow(r).height = 26;
  r++;

  // Beginning balance cash -> column D
  const beginCashRow = r;
  writeRow(ws, r, {label:'Beginning Balance Cash', size:14, bold:true, valueCol:'D', ...beginRefs.cash});
  r++;

  const revenueStart = r;
  writeRow(ws, r, {label:'Service revenue collected', value:Number(day.serviceRevenue)||0}); r++;
  day.withdrawals.forEach(w=>{
    const bank = state.banks.find(b=>b.id===w.bankId);
    writeRow(ws, r, {label:'Cash withdrawn from '+(bank?bank.name:'bank')+(w.note?' - '+w.note:''), value:Number(w.amount)||0});
    r++;
  });
  const revenueEnd = r-1;

  const totalCollectedRow = r;
  writeRow(ws, r, {label:'Total cash collected', size:12, bold:true, formula:`SUM(C${revenueStart}:C${revenueEnd})`}); r++;

  const totalAmountCashRow = r;
  writeRow(ws, r, {label:'Total Amount Cash', size:14, bold:true, valueCol:'D', formula:`D${beginCashRow}+C${totalCollectedRow}`}); r++;

  writeRow(ws, r, {label:'Cash Disbursed Summary', size:11, bold:true, value:''}); r++;

  const disbStart = r;
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(item=>{
      writeRow(ws, r, {voucher:item.voucher, label:item.desc||cat.label, value:Number(item.amount)||0});
      r++;
    });
  });
  day.deposits.forEach(d=>{
    const bank = state.banks.find(b=>b.id===d.bankId);
    writeRow(ws, r, {label:'Cash deposited to '+(bank?bank.name:'bank')+(d.note?' - '+d.note:''), value:Number(d.amount)||0});
    r++;
  });
  let disbEnd = r-1;
  if(disbEnd < disbStart){ writeRow(ws, r, {label:'(no disbursements)', value:0}); disbEnd=r; r++; }

  const totalDisbursedRow = r;
  writeRow(ws, r, {label:'Total Cash Disbursed', size:12, bold:true, formula:`SUM(C${disbStart}:C${disbEnd})`}); r++;

  const closingAmountRow = r;
  writeRow(ws, r, {label:'Closing amount', size:12, bold:true, valueCol:'D', formula:`D${totalAmountCashRow}-C${totalDisbursedRow}`}); r++;

  const iouStart = r;
  activeIousForDay(day.date).forEach(i=>{ writeRow(ws, r, {label:i.desc||'IOU', value:Number(i.amount)||0}); r++; });
  let iouEnd = r-1;
  if(iouEnd < iouStart){ writeRow(ws, r, {label:'(no IOU)', value:0}); iouEnd=r; r++; }

  const totalIouRow = r;
  writeRow(ws, r, {label:'Total IOU', size:11, bold:true, formula:`SUM(C${iouStart}:C${iouEnd})`}); r++;

  const cashInHandRow = r;
  writeRow(ws, r, {label:'Cash In Hand', size:14, bold:true, formula:`D${closingAmountRow}-C${totalIouRow}`}); r++;

  const bankClosingAddr = {};
  state.banks.forEach(b=>{
    const bd = day.banksDaily[b.id] || {sslDeposit:0,fees:0,salaryAccount:0,salaryCash:0};
    const bankXfers = (day.bankTransfers||[]).filter(t=>t.fromBankId!==t.toBankId);
    const beginBankRow = r;
    const ref = beginRefs.banks[b.id] || {value:0};
    writeRow(ws, r, {label:`Beginning Balance - ${b.name}`, size:14, bold:true, ...ref}); r++;

    bankXfers.filter(t=>t.toBankId===b.id).forEach(t=>{
      const fromBank = state.banks.find(x=>x.id===t.fromBankId);
      writeRow(ws, r, {label:`Transferred from ${fromBank?fromBank.name:'bank'}`, value:Number(t.amount)||0});
      r++;
    });
    if(bd.sslDeposit){ writeRow(ws, r, {label:'Other deposit / SSL Commerz', value:Number(bd.sslDeposit)||0}); r++; }
    day.deposits.filter(d=>d.bankId===b.id).forEach(d=>{
      writeRow(ws, r, {label:'Cash deposited from ledger'+(d.note?' - '+d.note:''), value:Number(d.amount)||0});
      r++;
    });
    const depositEnd = Math.max(r-1, beginBankRow);

    const totalAmountBankRow = r;
    writeRow(ws, r, {label:`Total Amount - ${b.name}`, size:14, bold:true, formula:`SUM(C${beginBankRow}:C${depositEnd})`}); r++;

    const disburseStart = r;
    if(bd.fees){ writeRow(ws, r, {label:'Bank fees', value:Number(bd.fees)||0}); r++; }
    if(bd.salaryAccount){ writeRow(ws, r, {label:'Salary payment - by account', value:Number(bd.salaryAccount)||0}); r++; }
    if(bd.salaryCash){ writeRow(ws, r, {label:'Salary payment - by cash', value:Number(bd.salaryCash)||0}); r++; }
    bankXfers.filter(t=>t.fromBankId===b.id).forEach(t=>{
      const toBank = state.banks.find(x=>x.id===t.toBankId);
      writeRow(ws, r, {label:`Transferred to ${toBank?toBank.name:'bank'}`, value:Number(t.amount)||0});
      r++;
    });
    day.withdrawals.filter(w=>w.bankId===b.id).forEach(w=>{
      writeRow(ws, r, {label:'Cash withdrawn to ledger'+(w.note?' - '+w.note:''), value:Number(w.amount)||0});
      r++;
    });
    let disburseEnd = r-1;
    if(disburseEnd < disburseStart){ writeRow(ws, r, {label:'Bank fees', value:0}); disburseEnd=r; r++; }

    const totalDisbursedBankRow = r;
    writeRow(ws, r, {label:'Total Cash Disbursed', size:14, bold:true, formula:`SUM(C${disburseStart}:C${disburseEnd})`}); r++;

    const closingBankRow = r;
    writeRow(ws, r, {label:`Closing Balance - ${b.name}`, size:14, bold:true, valueCol:'D', formula:`C${totalAmountBankRow}-C${totalDisbursedBankRow}`}); r++;

    bankClosingAddr[b.id] = `D${closingBankRow}`;
  });

  const grandTotalRow = r;
  const terms = [`D${closingAmountRow}`, ...Object.values(bankClosingAddr)].join('+');
  writeRow(ws, r, {label:'Grand Total (Closing amount + all Bank Closing Balances)', size:15, bold:true, valueCol:'D', formula:terms});

  return {cashInHandAddr:`C${cashInHandRow}`, closingAmountAddr:`D${closingAmountRow}`, bankClosingAddr, grandTotalAddr:`D${grandTotalRow}`};
}

function sheetNameFor(day, used){
  return uniqueSheetName(dayLabel(day.date).replace(/[\\\/\?\*\[\]:]/g,'').slice(0,28), used);
}
function uniqueSheetName(base, used){
  base = (base||'Sheet').slice(0,31);
  let name = base, n=2;
  while(used.has(name)){ name = (base+' '+n).slice(0,31); n++; }
  used.add(name);
  return name;
}

/* --- Individual category notesheet, mirroring the hand-built template --- */
function writeNotesheet(ws, cat, number, items, total, firstDate, lastDate){
  ws.getColumn(1).width = 3.9; ws.getColumn(2).width = 3;
  ws.getColumn(3).width = 13; ws.getColumn(4).width = 47; ws.getColumn(5).width = 20;
  ws.getColumn(6).width = 7;

  const thin = {top:THIN,left:THIN,bottom:THIN,right:THIN};
  function put(addr, value, {size=12, bold=false, name=FONT, center=false, border=true, wrap=false, numFmt}={}){
    const c = ws.getCell(addr);
    c.value = value;
    c.font = {name, size, bold};
    if(border) c.border = thin;
    if(center || wrap) c.alignment = {horizontal:center?'center':undefined, vertical:'center', wrapText:wrap};
    if(numFmt) c.numFmt = numFmt;
    return c;
  }

  ws.mergeCells('B1:F1');
  put('B1','Note Sheet',{size:12, center:true, border:false});

  ws.mergeCells('B3:E3');
  put('B3', `III/Acct/Madrasa/Withdraw/${cat.notesheetLabel}/${number}`, {size:12, bold:true});
  put('F3','Attach',{size:12});

  ws.mergeCells('B4:E4');
  put('B4','Sheet No 01',{size:12});

  ws.mergeCells('B5:E5');
  const sentence = `Following amount of money disbursed from ${dayLabelFull(firstDate)} ${state.year} - ${dayLabelFull(lastDate)} ${state.year} (voucher no: ${items[0].voucher} - ${items[items.length-1].voucher}) as ${cat.expensePhrase} expense may be withdrawn from madrasa acct:`;
  put('B5', sentence, {size:12, wrap:true});
  ws.getRow(5).height = 30;

  let r = 7;
  put(`C${r}`,'S/no',{size:12, center:true}); put(`D${r}`,'Description',{size:12, center:true}); put(`E${r}`,'Amount',{size:12, center:true});
  r++;
  const startRow = r;
  items.forEach(it=>{
    put(`C${r}`, it.voucher, {size:11});
    put(`D${r}`, it.desc, {size:11});
    put(`E${r}`, it.amount, {size:10, name:'Arial', numFmt:ASIAN_NUMFMT});
    r++;
  });
  const endRow = r-1;

  put(`C${r}`,'Total Amount',{size:12, bold:true});
  put(`E${r}`, {formula:`SUM(E${startRow}:E${endRow})`}, {size:10, name:'Arial', numFmt:ASIAN_NUMFMT});
  const totalRow = r; r++;

  ws.mergeCells(`C${r}:E${r}`);
  put(`C${r}`, takaInWords(total), {size:12, bold:true});
  const wordsRow = r;

  const my = monthYearAbbr();
  const s = state.signatories;
  let rr = wordsRow+4;
  put(`E${rr}`, `${s.accountant}\n${s.accountantRole}\n${my}`, {size:13, border:false, wrap:true});
  rr = wordsRow+5;
  put(`C${rr}`, 'Admin Manager', {size:13, border:false});
  rr = wordsRow+8;
  put(`E${rr}`, `${s.adminManager}\n${s.adminManagerRole}\n${my}`, {size:13, border:false, wrap:true});
  rr = wordsRow+10;
  put(`C${rr}`, 'Principal', {size:13, border:false});
  rr = wordsRow+11;
  put(`E${rr}`, `${s.principal}\n${s.principalRole}\n${my}`, {size:13, border:false, wrap:true});
}

/* --- Consolidated Withdraw Summary sheet --- */
function writeWithdrawSummary(ws, rows, grandTotal, yearCode, num){
  ws.getColumn(2).width = 4; ws.getColumn(3).width = 12;
  for(let i=4;i<=8;i++) ws.getColumn(i).width = 10;
  ws.getColumn(9).width = 12;

  function put(addr, value, {size=20, bold=false, name=FONT, center=false, numFmt}={}){
    const c = ws.getCell(addr);
    c.value = value;
    c.font = {name, size, bold};
    if(center) c.alignment = {horizontal:'center', vertical:'center'};
    if(numFmt) c.numFmt = numFmt;
    return c;
  }

  put('B1', `III/Acct/Madrasa/Withdraw Summary/${yearCode}-${num}`, {size:14, bold:true});
  ws.mergeCells('B2:I2');
  put('B2', 'Cash withdraw Summary', {size:20, bold:true, center:true});

  let r = 3;
  rows.forEach((row, i)=>{
    put(`B${r}`, String(i+1), {size:20});
    ws.mergeCells(`C${r}:H${r}`);
    put(`C${r}`, row.label, {size:20});
    put(`I${r}`, row.total, {size:16, bold:true, name:'Arial', numFmt:ASIAN_NUMFMT});
    r++;
  });
  const firstRow = 3, lastRow = r-1;

  ws.mergeCells(`B${r}:H${r}`);
  put(`B${r}`, `Total: ${takaInWords(grandTotal)}`, {size:20, bold:true});
  put(`I${r}`, {formula:`SUM(I${firstRow}:I${lastRow})`}, {size:16, bold:true, name:'Arial', numFmt:ASIAN_NUMFMT});
  const totalRow = r;

  put(`B${totalRow+4}`, 'Accountant', {size:14, bold:true, name:'Calibri'});
  put(`I${totalRow+4}`, 'Principal', {size:14, bold:true, name:'Calibri'});
}

async function exportNotesheets(startDate, endDate){
  if(!startDate || !endDate){ showAlert('Pick a from and to date.'); return; }
  if(startDate > endDate){ showAlert('The "From date" must be before the "To date".'); return; }
  const {cats, grandTotal} = collectNotesheetRange(startDate, endDate);
  if(cats.length===0){ showAlert('No expenses were recorded in that date range.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }

  const wb = new ExcelJS.Workbook();
  const used = new Set();
  const summaryRows = [];

  cats.forEach(({key, cat, items, total, firstDate, lastDate})=>{
    const number = (state.notesheetCounters[key]||0) + 1;
    const ws = wb.addWorksheet(uniqueSheetName(`${cat.notesheetLabel} ${number}`.replace(/[\\\/\?\*\[\]:]/g,''), used));
    writeNotesheet(ws, cat, number, items, total, firstDate, lastDate);
    state.notesheetCounters[key] = number;
    summaryRows.push({label:cat.summaryLabel, total});
  });

  const summaryNum = (state.summaryCounterNum||0) + 1;
  const wsSummary = wb.addWorksheet(uniqueSheetName(`${state.summaryCounterYear}-${summaryNum}`, used));
  writeWithdrawSummary(wsSummary, summaryRows, grandTotal, state.summaryCounterYear, summaryNum);
  state.summaryCounterNum = summaryNum;

  await saveState();
  await downloadWorkbook(wb, `Notesheets_${startDate}_to_${endDate}.xlsx`);
  render();
}

async function downloadWorkbook(wb, filename){
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function exportDay(dayId){
  if(!dayId){ showAlert('No day selected.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }
  const day = findDay(dayId);
  const computed = computeAll();
  const c = computed[dayId];
  const wb = new ExcelJS.Workbook();
  const used = new Set();
  const ws = wb.addWorksheet(sheetNameFor(day, used));
  const beginRefs = {
    cash: {value: c.openingCash},
    banks: Object.fromEntries(state.banks.map(b=>[b.id, {value: c.banks[b.id].opening}]))
  };
  writeDaySheet(ws, day, c, beginRefs);
  await appendDebitVoucherSheets(wb, day, used);
  await downloadWorkbook(wb, `${dayLabel(day.date)}_${state.month}${state.year}.xlsx`);
}

async function exportMonth(){
  if(state.days.length===0){ showAlert('No days recorded yet.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }
  const computed = computeAll();
  const wb = new ExcelJS.Workbook();
  const used = new Set(['Overview']);

  const wsOverview = wb.addWorksheet('Overview');

  const dayRefs = {}; // dayId -> {sheetName, cashInHandAddr, bankClosingAddr, grandTotalAddr}
  state.days.forEach((day, idx)=>{
    const c = computed[day.id];
    const sheetName = sheetNameFor(day, used);
    const ws = wb.addWorksheet(sheetName);
    let beginRefs;
    if(idx===0){
      beginRefs = {
        cash: {value: c.openingCash},
        banks: Object.fromEntries(state.banks.map(b=>[b.id, {value:c.banks[b.id].opening}]))
      };
    } else {
      const prevDay = state.days[idx-1];
      const prevRef = dayRefs[prevDay.id];
      beginRefs = {
        cash: {formula: `'${prevRef.sheetName}'!${prevRef.closingAmountAddr}`},
        banks: Object.fromEntries(state.banks.map(b=>{
          if(prevRef.bankClosingAddr[b.id]) return [b.id, {formula:`'${prevRef.sheetName}'!${prevRef.bankClosingAddr[b.id]}`}];
          return [b.id, {value: c.banks[b.id].opening}];
        }))
      };
    }
    const refs = writeDaySheet(ws, day, c, beginRefs);
    dayRefs[day.id] = {sheetName, ...refs};
  });

  // Populate the Overview sheet (created first, above, so it stays the first tab)
  wsOverview.getColumn(1).width = 20;
  for(let i=2;i<=state.banks.length+3;i++) wsOverview.getColumn(i).width = 18;
  let r=1;
  wsOverview.mergeCells(`A${r}:${String.fromCharCode(65+2+state.banks.length)}${r}`);
  setCell(wsOverview, `A${r}`, {value:`Month Overview - ${state.month} ${state.year}`, size:16, bold:true, align:'center'});
  r++;
  const headerRow = r;
  setCell(wsOverview, `A${r}`, {value:'Date', size:11, bold:true});
  setCell(wsOverview, `B${r}`, {value:'Cash In Hand', size:11, bold:true});
  state.banks.forEach((b,i)=>{ setCell(wsOverview, `${String.fromCharCode(67+i)}${r}`, {value:b.name+' Closing', size:11, bold:true}); });
  setCell(wsOverview, `${String.fromCharCode(67+state.banks.length)}${r}`, {value:'Grand Total', size:11, bold:true});
  r++;
  state.days.forEach(day=>{
    const ref = dayRefs[day.id];
    setCell(wsOverview, `A${r}`, {value:dayLabel(day.date)});
    setCell(wsOverview, `B${r}`, {formula:`'${ref.sheetName}'!${ref.cashInHandAddr}`, numFmt:ASIAN_NUMFMT});
    state.banks.forEach((b,i)=>{
      const addr = ref.bankClosingAddr[b.id];
      setCell(wsOverview, `${String.fromCharCode(67+i)}${r}`, addr?{formula:`'${ref.sheetName}'!${addr}`, numFmt:ASIAN_NUMFMT}:{value:0, numFmt:ASIAN_NUMFMT});
    });
    setCell(wsOverview, `${String.fromCharCode(67+state.banks.length)}${r}`, {formula:`'${ref.sheetName}'!${ref.grandTotalAddr}`, numFmt:ASIAN_NUMFMT});
    r++;
  });
  r++;
  setCell(wsOverview, `A${r}`, {value:'CoA Category Totals - Whole Month', size:12, bold:true});
  r++;
  COA.forEach(cat=>{
    let total = 0;
    state.days.forEach(day=>{ total += computed[day.id].coaTotals[cat.key]||0; });
    setCell(wsOverview, `A${r}`, {value:cat.label});
    setCell(wsOverview, `B${r}`, {value:cat.short});
    setCell(wsOverview, `C${r}`, {value:total, numFmt:ASIAN_NUMFMT});
    r++;
  });

  await downloadWorkbook(wb, `${state.month}${state.year}_Full_Ledger.xlsx`);
}

/* --- PWA installability ------------------------------------------------
   The manifest link in <head> (with an embedded icon) is what lets the
   browser offer "Install" at all. This only matters when the file is
   hosted over https:// (or localhost) - a local file:// double-click and
   Claude.ai's sandboxed artifact iframe generally won't offer an install
   prompt no matter what, that's a browser platform restriction, not
   something fixable from inside the page. Where it IS available, capture
   the prompt so the header's "Install App" button can trigger it. */
if(typeof window!=='undefined' && typeof window.addEventListener==='function'){
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    if(state) render();
  });
}
if(typeof navigator!=='undefined' && 'serviceWorker' in navigator && typeof location!=='undefined' && (location.protocol==='https:' || location.hostname==='localhost')){
  try{
    const swCode = "self.addEventListener('fetch', function(){});";
    const swUrl = URL.createObjectURL(new Blob([swCode], {type:'application/javascript'}));
    navigator.serviceWorker.register(swUrl).catch(()=>{ /* best effort - some browsers block blob: service workers */ });
  }catch(e){ /* ignore - manifest alone is enough for installability in most current browsers */ }
}
