/* --- Monthly Ledger: import a previous month's workbook to read off its
   Yearly Running Total row, so the seed above doesn't need retyping by
   hand. Only reads - never writes back to the uploaded file. --- */
async function importMonthlyLedgerFile(file){
  try{
    await loadExcelJS();
    const buf = await file.arrayBuffer();
    const wb = new ExcelJS.Workbook();
    await wb.xlsx.load(buf);
    const revSheet = wb.worksheets.find(w=>/revenue/i.test(w.name));
    if(!revSheet){ showAlert('Could not find a "Monthly Revenue" sheet in that file.'); return; }

    // Find the category header row (has "Date" and "Description" nearby)
    let headerRow = null, headerRowIdx = null;
    for(let r=1;r<=revSheet.rowCount;r++){
      const row = revSheet.getRow(r);
      const rowText = row.values.map(v=>String(v||'')).join('|').toLowerCase();
      if(rowText.includes('date') && rowText.includes('description')){ headerRow = row; headerRowIdx = r; break; }
    }
    if(!headerRow){ showAlert('Could not find the category header row (Date/Description/...) in that sheet.'); return; }
    const colsForCat = {}; // cat.key -> array of matching column indices (old formats sometimes split one category across two columns)
    REVENUE_CATS.forEach(cat=>{
      const names = [cat.label, ...(cat.aliases||[])].map(s=>s.toLowerCase().replace(/\s+/g,' ').trim());
      const matches = [];
      for(let c=1;c<=revSheet.columnCount;c++){
        const v = String(headerRow.getCell(c).value||'').toLowerCase().replace(/\s+/g,' ').trim();
        if(!v) continue;
        if(names.some(target => v===target || v.includes(target) || target.includes(v))) matches.push(c);
      }
      colsForCat[cat.key] = matches;
    });

    // Find the "Yearly Running Total" row (the NEW one, not "...from Previous Month")
    // - the label can sit in column A, B, or C depending on the file's exact layout.
    let yrtRow = null;
    for(let r=headerRowIdx;r<=revSheet.rowCount;r++){
      const rowLabel = [1,2,3].map(c=>String(revSheet.getCell(r,c).value||'')).join(' ');
      if(/yearly running total/i.test(rowLabel) && !/previous month/i.test(rowLabel)){ yrtRow = r; break; }
    }
    if(!yrtRow){ showAlert('Could not find the "Yearly Running Total" row in that sheet.'); return; }

    const revenue = {};
    REVENUE_CATS.forEach(cat=>{
      const cols = colsForCat[cat.key]||[];
      revenue[cat.key] = cols.reduce((s,c)=> s + (Number(revSheet.getCell(yrtRow, c).value)||0), 0);
    });

    // Try to read the month/year from a title cell like "Monthly Income: Month of March 2026"
    let year = state.year||'', throughMonth = state.month||MONTHS[0];
    for(let r=1;r<=Math.min(6,revSheet.rowCount);r++){
      const v = String(revSheet.getCell(r,1).value||'');
      const m = v.match(/month of\s+([a-zA-Z]+)\s+(\d{4})/i);
      if(m){ throughMonth = MONTHS.find(mm=>mm.toLowerCase()===m[1].toLowerCase())||throughMonth; year = m[2]; break; }
    }

    showConfirm(
      `Found Yearly Running Total figures through ${throughMonth} ${year}. Set this as the starting point? ` +
      REVENUE_CATS.map(c=>`${c.label}: ${money(revenue[c.key])}`).join(', '),
      ()=>{
        state.monthlyLedger.seed = {year:String(year), throughMonth, revenue};
        saveState(); render();
        showAlert('Starting point saved. Months you add from here are summed on top of it automatically.');
      },
      'Use these figures'
    );
  }catch(err){
    showAlert('Could not read that file - make sure it\'s the same format as your existing monthly ledger workbooks.');
  }
}

/* --- Monthly Ledger: export the two-sheet workbook, matching the
   institution's existing format with real formulas (not hardcoded
   results), so it recalculates correctly if opened and tweaked. --- */
async function exportMonthlyLedger(key, previewOnly){
  const rec = getMonthlyLedgerMonth(key);
  await loadExcelJS();
  const wb = new ExcelJS.Workbook();

  const FONT = {name:'Calibri', size:11};
  const BOLD = {name:'Calibri', size:11, bold:true};
  const thin = {top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
  const numFmt = '#,##0.00';

  /* ---- Monthly Revenue sheet ---- */
  const rev = wb.addWorksheet('Monthly Revenue');
  rev.getColumn(1).width = 4; rev.getColumn(2).width = 12; rev.getColumn(3).width = 34;
  for(let c=4;c<=15;c++) rev.getColumn(c).width = 15;

  rev.getCell('A1').value = 'INTERNATIONAL ISLAMIC INSTITUTE (MADRASHA ACCT)';
  rev.getCell('A1').font = BOLD;
  rev.getCell('A2').value = `Monthly Income: Month of ${monthKeyLabel(key)}`;
  rev.getCell('A2').font = BOLD;
  rev.getCell('A3').value = 'Madrasah Acct';

  const headerRowNum = 5;
  const headers = ['Date','Description','Total', ...REVENUE_CATS.map(c=>c.label)];
  headers.forEach((h,i)=>{
    const cell = rev.getCell(headerRowNum, i+2); // starts col B
    cell.value = h; cell.font = BOLD; cell.border = thin;
    cell.alignment = {wrapText:true, vertical:'bottom'};
  });

  let r = headerRowNum+1;
  rev.getCell(r,1).value = '-';
  rev.getCell(r,2).value = 'Beginning Balance Bank';
  rev.getCell(r,3).value = 'Beginning Balance Bank';
  rev.getCell(r,4).value = Number(rec.beginningBankBalance)||0;
  r++;
  const yrtBeforeRow = r;
  rev.getCell(r,3).value = 'Yearly Running Total from Previous Month';
  const yrtBefore = yearlyRunningTotalBefore(key);
  REVENUE_CATS.forEach((c,i)=>{ rev.getCell(r, 5+i).value = yrtBefore[c.key]; });
  r++;

  const dataStartRow = r;
  rec.revenueEntries.forEach(entry=>{
    rev.getCell(r,2).value = entry.date ? new Date(entry.date) : '';
    if(entry.date) rev.getCell(r,2).numFmt = 'd/m/yyyy';
    rev.getCell(r,3).value = entry.desc||'';
    rev.getCell(r,4).value = {formula:`SUM(E${r}:O${r})`};
    REVENUE_CATS.forEach((c,i)=>{ rev.getCell(r,5+i).value = Number(entry[c.key])||0; });
    for(let c=2;c<=15;c++) rev.getCell(r,c).border = thin;
    r++;
  });
  const dataEndRow = r-1;
  if(dataEndRow < dataStartRow){ // no entries - keep a valid (empty) range
    rev.getCell(dataStartRow,4).value = 0;
  }

  const totalIncomeRow = r;
  rev.getCell(r,3).value = 'Total Income:'; rev.getCell(r,3).font = BOLD;
  for(let c=4;c<=15;c++){
    const colLetter = rev.getColumn(c).letter;
    rev.getCell(r,c).value = dataEndRow>=dataStartRow ? {formula:`SUM(${colLetter}${dataStartRow}:${colLetter}${dataEndRow})`} : 0;
    rev.getCell(r,c).font = BOLD;
  }
  r++;
  const totalDueRow = r;
  rev.getCell(r,3).value = 'Total Due';
  rev.getCell(r,4).value = {formula:`SUM(E${r}:O${r})`};
  REVENUE_CATS.forEach((c,i)=>{ rev.getCell(r,5+i).value = Number(rec.revenueTotalDue[c.key])||0; });
  r++;
  const transferRow = r;
  rev.getCell(r,3).value = 'Transfer between categories';
  rev.getCell(r,4).value = {formula:`SUM(E${r}:O${r})`};
  REVENUE_CATS.forEach((c,i)=>{ rev.getCell(r,5+i).value = Number(rec.revenueTransfer[c.key])||0; });
  r++;
  const yrtNewRow = r;
  rev.getCell(r,3).value = 'Yearly Running Total'; rev.getCell(r,3).font = BOLD;
  REVENUE_CATS.forEach((c,i)=>{
    const colLetter = rev.getColumn(5+i).letter;
    rev.getCell(r,5+i).value = {formula:`${colLetter}${totalIncomeRow}+${colLetter}${transferRow}+${colLetter}${yrtBeforeRow}`};
    rev.getCell(r,5+i).font = BOLD;
  });
  r++;
  const totalAmountRow = r;
  rev.getCell(r,3).value = 'Total Amount'; rev.getCell(r,3).font = BOLD;
  rev.getCell(r,4).value = {formula:`D${totalIncomeRow}+D${dataStartRow-2}`};
  rev.getCell(r,4).font = BOLD;

  /* ---- Monthly Expenditure sheet ---- */
  const exp = wb.addWorksheet('Monthly Expenditure');
  exp.getColumn(1).width = 12; exp.getColumn(2).width = 34;
  for(let c=3;c<=3+rec.expenditureColumns.length;c++) exp.getColumn(c).width = 14;

  exp.getCell('A1').value = 'INTERNATIONAL ISLAMIC INSTITUTE (MADRASHA ACCT)'; exp.getCell('A1').font = BOLD;
  exp.getCell('A2').value = `Monthly Expenditure: Month of ${monthKeyLabel(key)}`; exp.getCell('A2').font = BOLD;
  exp.getCell('A3').value = 'Madrash Acct';

  const expHeaderRow = 4;
  exp.getCell(expHeaderRow,1).value = 'Date'; exp.getCell(expHeaderRow,1).font = BOLD;
  exp.getCell(expHeaderRow,2).value = 'Description'; exp.getCell(expHeaderRow,2).font = BOLD;
  exp.getCell(expHeaderRow,3).value = 'Total'; exp.getCell(expHeaderRow,3).font = BOLD;
  rec.expenditureColumns.forEach((col,i)=>{
    const cell = exp.getCell(expHeaderRow, 4+i);
    cell.value = col.label; cell.font = BOLD; cell.alignment = {wrapText:true};
  });

  const liveCoaTotals = monthWithdrawCoaTotals(key);
  const expDataRow = expHeaderRow+2;
  exp.getCell(expDataRow,1).value = 'Recorded in Withdraw Notesheets';
  exp.getCell(expDataRow,2).value = 'Category totals for the month';
  exp.getCell(expDataRow,3).value = {formula:`SUM(D${expDataRow}:${exp.getColumn(3+rec.expenditureColumns.length).letter}${expDataRow})`};
  rec.expenditureColumns.forEach((col,i)=>{
    const amt = col.source==='coa' ? (liveCoaTotals ? (liveCoaTotals[col.coaKey]||0) : 0) : (Number(col.amount)||0);
    exp.getCell(expDataRow, 4+i).value = amt;
  });
  const expTotalRow = expDataRow+1;
  exp.getCell(expTotalRow,2).value = 'Total Expenditure:'; exp.getCell(expTotalRow,2).font = BOLD;
  for(let i=0;i<=rec.expenditureColumns.length;i++){
    const colLetter = exp.getColumn(3+i).letter;
    exp.getCell(expTotalRow, 3+i).value = {formula:`SUM(${colLetter}${expDataRow}:${colLetter}${expDataRow})`};
    exp.getCell(expTotalRow, 3+i).font = BOLD;
  }
  const balanceRow = expTotalRow+1;
  exp.getCell(balanceRow,2).value = 'Total Balance:';
  exp.getCell(balanceRow,3).value = {formula:`C${balanceRow+1}-C${expTotalRow}`};
  const incomeRefRow = balanceRow+1;
  exp.getCell(incomeRefRow,2).value = 'Total Income:';
  exp.getCell(incomeRefRow,3).value = {formula:`'Monthly Revenue'!D${totalAmountRow}`};

  // Balance Sheet block
  let bs = incomeRefRow+2;
  exp.getCell(bs,5).value = 'Balance Sheet'; exp.getCell(bs,5).font = BOLD;
  bs++;
  exp.getCell(bs,5).value = 'Asset'; exp.getCell(bs,5).font = BOLD;
  exp.getCell(bs,10).value = 'Liabilities'; exp.getCell(bs,10).font = BOLD;
  const assetStartRow = bs+1;
  const computedNow = key===monthKeyFor(state.month,state.year) ? computeAll() : null;
  const latestDay = state.days.length ? state.days[state.days.length-1] : null;
  const autoCash = computedNow && latestDay ? computedNow[latestDay.id].cashInHand : 0;
  const cashInHand = rec.balanceSheet.cashInHandOverride!==null ? rec.balanceSheet.cashInHandOverride : autoCash;
  const autoBankTotalExp = computedNow && latestDay ? state.banks.reduce((s,b)=>s+computedNow[latestDay.id].banks[b.id].closing,0) : 0;
  const bankBalanceVal = rec.balanceSheet.bankBalanceOverride!==null ? rec.balanceSheet.bankBalanceOverride : autoBankTotalExp;
  const otherAsset = rec.balanceSheet.otherAsset || {label:'Debt to III Assets Ltd', amount:250000};

  exp.getCell(assetStartRow,5).value = 1; exp.getCell(assetStartRow,6).value = 'Cash in Hand'; exp.getCell(assetStartRow,9).value = Number(cashInHand)||0;
  exp.getCell(assetStartRow,10).value = 1; exp.getCell(assetStartRow,11).value = 'Equity';
  exp.getCell(assetStartRow+1,5).value = 2; exp.getCell(assetStartRow+1,6).value = 'Balance in Bank Account'; exp.getCell(assetStartRow+1,9).value = Number(bankBalanceVal)||0;
  exp.getCell(assetStartRow+1,10).value = 2; exp.getCell(assetStartRow+1,11).value = 'Advance Payment'; exp.getCell(assetStartRow+1,14).value = Number(rec.balanceSheet.advancePayment)||0;
  const gratuityColLetter = rev.getColumn(5 + REVENUE_CATS.findIndex(c=>c.key==='gratuity')).letter;
  const eduAssistColLetter = rev.getColumn(5 + REVENUE_CATS.findIndex(c=>c.key==='eduAssist')).letter;
  exp.getCell(assetStartRow+2,5).value = 3; exp.getCell(assetStartRow+2,6).value = 'Due Payment'; exp.getCell(assetStartRow+2,9).value = {formula:`'Monthly Revenue'!D${totalDueRow}`};
  exp.getCell(assetStartRow+2,10).value = 3; exp.getCell(assetStartRow+2,11).value = 'Gratuity Payable'; exp.getCell(assetStartRow+2,14).value = {formula:`'Monthly Revenue'!${gratuityColLetter}${yrtNewRow}`};
  exp.getCell(assetStartRow+3,5).value = 4; exp.getCell(assetStartRow+3,6).value = otherAsset.label||'Debt to III Assets Ltd'; exp.getCell(assetStartRow+3,9).value = Number(otherAsset.amount)||0;

  const eduAssistRow = assetStartRow+3;
  exp.getCell(eduAssistRow,10).value = 4; exp.getCell(eduAssistRow,11).value = 'Education Assistance Payable';
  const eduCol = rec.expenditureColumns.find(c=>c.coaKey==='EduAssist');
  const eduColIdx = eduCol ? rec.expenditureColumns.indexOf(eduCol) : -1;
  const eduExpLetter = eduColIdx>=0 ? exp.getColumn(4+eduColIdx).letter : null;
  exp.getCell(eduAssistRow,14).value = eduExpLetter
    ? {formula:`'Monthly Revenue'!${eduAssistColLetter}${yrtNewRow}-${eduExpLetter}${expDataRow}`}
    : {formula:`'Monthly Revenue'!${eduAssistColLetter}${yrtNewRow}`};

  const totalRow = assetStartRow+4;
  exp.getCell(totalRow,5).value = 'Total'; exp.getCell(totalRow,5).font = BOLD;
  exp.getCell(totalRow,9).value = {formula:`SUM(I${assetStartRow}:I${assetStartRow+3})`};
  exp.getCell(totalRow,10).value = 'Total'; exp.getCell(totalRow,10).font = BOLD;
  exp.getCell(totalRow,14).value = {formula:`SUM(N${assetStartRow+1}:N${eduAssistRow})`};
  exp.getCell(assetStartRow,14).value = {formula:`I${totalRow}-N${assetStartRow+1}-N${assetStartRow+2}-N${eduAssistRow}`};

  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${monthKeyLabel(key).replace(/\s+/g,'_')}_Madrasa_Account.xlsx`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

/* --- Category-wise Summary: pick a category and see totals by month,
   by year, or for a custom date range (e.g. 1st-15th). --- */
function renderCategorySummaryCard(){
  if(!summaryFilters.catKey) summaryFilters.catKey = COA[0].key;
  const years = voucherYearsPresent();
  const card = el(`
    <div class="card">
      <h3><span class="num">&#128202;</span> Category-wise Summary</h3>
      <p class="subnote">Pick a category to see how much was spent, grouped by month or year, or totalled over any custom date range.</p>
      <div class="row" style="flex-wrap:wrap;">
        <div class="field" style="min-width:180px;">
          <label>Category</label>
          <select id="sum-cat">
            ${COA.map(c=>`<option value="${c.key}" ${summaryFilters.catKey===c.key?'selected':''}>${c.label}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="min-width:220px;">
          <label>View</label>
          <select id="sum-mode">
            <option value="month" ${summaryFilters.mode==='month'?'selected':''}>By month</option>
            <option value="year" ${summaryFilters.mode==='year'?'selected':''}>By year</option>
            <option value="range" ${summaryFilters.mode==='range'?'selected':''}>Custom date range</option>
          </select>
        </div>
        ${summaryFilters.mode==='month' ? `
        <div class="field" style="min-width:120px;">
          <label>Year <span class="tag">optional</span></label>
          <select id="sum-year">
            <option value="">All years</option>
            ${years.map(y=>`<option value="${y}" ${summaryFilters.year===y?'selected':''}>${y}</option>`).join('')}
          </select>
        </div>` : ''}
        ${summaryFilters.mode==='range' ? `
        <div class="field"><label>From date</label><input type="date" id="sum-from" value="${summaryFilters.fromDate}"></div>
        <div class="field"><label>To date</label><input type="date" id="sum-to" value="${summaryFilters.toDate}"></div>
        ` : ''}
      </div>
      <div id="sum-results"></div>
    </div>
  `);
  function drawResults(){
    const box = card.querySelector('#sum-results');
    box.innerHTML = '';
    const catFilter = { catKey: summaryFilters.catKey };
    if(summaryFilters.mode==='month'){
      const f = Object.assign({}, catFilter, summaryFilters.year ? {year:summaryFilters.year} : {});
      const rows = groupSum(filteredVouchers(f), v=>v.date.slice(0,7), k=>{
        const [y,m] = k.split('-');
        return `${MONTHS[parseInt(m,10)-1]} ${y}`;
      });
      renderSummaryTable(box, rows, 'Month');
    } else if(summaryFilters.mode==='year'){
      const rows = groupSum(filteredVouchers(catFilter), v=>v.date.slice(0,4));
      renderSummaryTable(box, rows, 'Year');
    } else {
      const f = Object.assign({}, catFilter, {fromDate:summaryFilters.fromDate, toDate:summaryFilters.toDate});
      const results = filteredVouchers(f);
      const total = results.reduce((s,v)=>s+v.amount,0);
      box.appendChild(el(`<div class="computed total"><span class="lbl">${escapeHtml(COA.find(c=>c.key===summaryFilters.catKey).label)} total for this range</span><span>${money(total)}</span></div>`));
      if(results.length===0){
        box.appendChild(el(`<p class="empty">No vouchers in this range.</p>`));
      } else {
        box.appendChild(el(`<p class="subnote" style="margin-top:8px;">${results.length} voucher${results.length===1?'':'s'}:</p>`));
        results.forEach(v=>{
          box.appendChild(el(`<div class="computed"><span class="lbl">${dayLabelFull(v.date)} ${v.date.slice(0,4)} &middot; ${escapeHtml(v.voucher)}${v.desc?' &mdash; '+escapeHtml(v.desc):''}</span><span>${money(v.amount)}</span></div>`));
        });
      }
    }
  }
  function renderSummaryTable(box, rows, groupLabel){
    if(rows.length===0){ box.appendChild(el(`<p class="empty">No data for this category yet.</p>`)); return; }
    const grand = rows.reduce((s,r)=>s+r.total,0);
    const table = el(`
      <div style="overflow-x:auto; margin-top:10px;">
        <table style="width:100%; border-collapse:collapse; font-size:13px;">
          <thead><tr style="text-align:left; border-bottom:2px solid var(--line);">
            <th style="padding:6px 8px;">${groupLabel}</th>
            <th style="padding:6px 8px; text-align:right;">Total</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    `);
    const tbody = table.querySelector('tbody');
    rows.slice().reverse().forEach(r=>{
      tbody.appendChild(el(`<tr style="border-bottom:1px solid var(--line-soft);"><td style="padding:6px 8px;">${escapeHtml(r.label)}</td><td style="padding:6px 8px; text-align:right;" class="mono">${money(r.total)}</td></tr>`));
    });
    box.appendChild(table);
    box.appendChild(el(`<div class="computed total" style="margin-top:10px;"><span class="lbl">Grand total</span><span>${money(grand)}</span></div>`));
  }
  drawResults();
  card.querySelector('#sum-cat').onchange = (e)=>{ summaryFilters.catKey = e.target.value; drawResults(); };
  card.querySelector('#sum-mode').onchange = (e)=>{ summaryFilters.mode = e.target.value; render(); };
  const yearSel = card.querySelector('#sum-year');
  if(yearSel) yearSel.onchange = (e)=>{ summaryFilters.year = e.target.value; drawResults(); };
  const fromInp = card.querySelector('#sum-from');
  const toInp = card.querySelector('#sum-to');
  if(fromInp) fromInp.onchange = (e)=>{ summaryFilters.fromDate = e.target.value; drawResults(); };
  if(toInp) toInp.onchange = (e)=>{ summaryFilters.toDate = e.target.value; drawResults(); };
  return card;
}

  const card = el(`

        </div>
      </div>
      <button type="button" id="tpl-add">+ Save template</button>
      <div class="divider"></div>
      <div id="tpl-list"></div>
    </div>
  `);
  let tplAmt = 0;
  wireAmountInput(card.querySelector('#tpl-amt'), (num)=>{ tplAmt = num; });
  function drawList(){
    const box = card.querySelector('#tpl-list');
    box.innerHTML = '';
    if(state.templates.length===0){ box.appendChild(el(`<p class="empty">No templates saved yet.</p>`)); return; }
    state.templates.forEach(tpl=>{
      const cat = COA.find(c=>c.key===tpl.catKey);
      const row = el(`
        <div class="line-item">
          <div class="voucher-badge mono">${escapeHtml(cat?cat.short:tpl.catKey)}</div>
          <div class="field desc" style="margin-bottom:0;"><label>Description</label><div class="mono" style="padding:8px 0;">${escapeHtml(tpl.desc)||'<span class=\"empty\">(blank)</span>'}</div></div>
          <div class="field amt" style="margin-bottom:0;"><label>Amount</label><div class="mono" style="padding:8px 0;">${tpl.amount?money(tpl.amount):'<span class=\"empty\">(set each time)</span>'}</div></div>
          <button class="danger small" type="button" data-action="remove-template" data-item="${tpl.id}" title="Remove template">&times;</button>
        </div>
      `);
      box.appendChild(row);
    });
  }
  drawList();
  card.querySelector('#tpl-add').onclick = ()=>{
    const catKey = card.querySelector('#tpl-cat').value;
    const desc = card.querySelector('#tpl-desc').value.trim();
    if(!desc){ showAlert('Give the template a description.'); return; }
    state.templates.push({id:uid(), catKey, desc, amount:tplAmt});
    saveState();
    card.querySelector('#tpl-desc').value = '';
    card.querySelector('#tpl-amt').value = '';
    tplAmt = 0;
    drawList();
  };
  return card;
}

/* Every description ever typed for a given CoA category, so the browser's
   native autocomplete can suggest it again - e.g. type "b" in Transport
   and "Bank conveyance bill" shows up if it's been used before. */
function descriptionSuggestions(catKey){
  const seen = new Set();
  allVouchers().forEach(v=>{
    if(v.catKey===catKey && v.desc && v.desc.trim()){
      const raw = v.desc.trim();
      if(raw.includes(',')){
        raw.split(',').forEach(part=>{ const t = part.trim(); if(t) seen.add(t); });
      } else {
        seen.add(raw);
      }
    }
  });
  return Array.from(seen).sort((a,b)=>a.localeCompare(b));
}
function iouDescSuggestions(){
  const seen = new Set();
  (state.iouRegistry||[]).forEach(i=>{ if(i.desc && i.desc.trim()) seen.add(i.desc.trim()); });
  return Array.from(seen).sort((a,b)=>a.localeCompare(b));
}
function transferNoteSuggestions(field){
  const seen = new Set();
  allDaysEverywhere().forEach(day=>{
    (day[field]||[]).forEach(item=>{ if(item.note && item.note.trim()) seen.add(item.note.trim()); });
  });
  return Array.from(seen).sort((a,b)=>a.localeCompare(b));
}

/* Adds a new blank voucher line to a category and returns it - shared by
   the "+ Add voucher" button and Enter-key quick entry so numbering stays
   consistent between both paths. */
/* Draft -> Reviewed -> Approved review workflow for CoA vouchers. Purely
   a personal checklist (this tool is single-user) - no sign-off identity
   is attached, just a quick visual cue for what's been double-checked
   before a day gets locked. */
const STATUS_ORDER = ['draft','reviewed','approved'];
const STATUS_LABELS = {draft:'Draft', reviewed:'Reviewed', approved:'Approved'};
function statusLabel(s){ return STATUS_LABELS[s] || STATUS_LABELS.draft; }
function nextStatus(s){
  const i = STATUS_ORDER.indexOf(s);
  return STATUS_ORDER[(i+1) % STATUS_ORDER.length] || 'draft';
}

function addCoaVoucher(day, catKey){
  const cat = COA.find(c=>c.key===catKey);
  state.voucherCounters[catKey] += 1;
  const yearShort = String(state.year).slice(-2);
  const monthNum = MONTHS.indexOf(state.month)+1;
  const voucher = `${cat.short}${state.voucherCounters[catKey]}/${monthNum}/${yearShort}`;
  const item = {id:uid(), voucher, desc:'', note:'', amount:0, status:'draft', sections:[{id:uid(), desc:'', amount:0}]};
  day.coa[catKey].push(item);
  return item;
}
/* Keeps item.desc/item.amount (used everywhere - totals, exports, search)
   in sync with item.sections. One section behaves exactly like the plain
   desc/amount of old; 2+ sections becomes a numbered multi-line list with
   the combined total, e.g. "1. Toner purchase\n2. Travel fare". */
function syncCoaItemFromSections(item){
  if(!item.sections || item.sections.length===0) item.sections = [{id:uid(), desc:item.desc||'', amount:item.amount||0}];
  if(item.sections.length===1){
    item.desc = item.sections[0].desc||'';
    item.amount = Number(item.sections[0].amount)||0;
  } else {
    item.desc = item.sections.map((s,i)=>`${i+1}. ${s.desc||''}`).join('\n');
    item.amount = item.sections.reduce((sum,s)=>sum+(Number(s.amount)||0),0);
  }
}

/* Miscellaneous Collection: occasional cash income collected under a
   head other than Service Revenue (e.g. a Tailor fee paid in cash on a
   day that isn't a formal deposit). Modeled exactly like a Cash
   Disbursed voucher's sections: empty by default; the first entry
   added behaves like a plain single line; a second+ becomes a
   numbered list ("1. ...", "2. ...") under one voucher, with the
   amounts summed into day.miscCollection, which feeds Cash In Hand
   and the day's Excel export the same way Service Revenue does. */
function ensureMiscCollectionSections(day){
  if(!day.miscCollectionSections) day.miscCollectionSections = [];
  return day.miscCollectionSections;
}
function syncMiscCollectionFromSections(day){
  const sections = ensureMiscCollectionSections(day);
  day.miscCollection = sections.reduce((sum,s)=>sum+(Number(s.amount)||0),0);
}
function miscCollectionDescText(day){
  const sections = ensureMiscCollectionSections(day);
  if(sections.length===0) return '';
  if(sections.length===1) return sections[0].desc||'';
  /* Multiple sections all fold into ONE export line: descriptions
     comma-separated, amount is the combined total (not one row per
     section) - e.g. "Tailor fees, Transport fees" with total 560. */
  return sections.map(s=>s.desc||'').filter(Boolean).join(', ');
}

          <div class="field desc" style="margin-bottom:0;"><label>Section description</label><input type="text" class="desc-input" list="${datalistId}" value="${escapeHtml(sec.desc)}" placeholder="Second item under this same voucher"></div>
          <div class="field amt" style="margin-bottom:0;"><label>Amount</label><input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(sec.amount)}"></div>
          <button class="danger small" type="button" data-action="remove-coa-section" data-day="${day.id}" data-cat="${catKey}" data-item="${item.id}" data-section="${sec.id}" title="Remove this section">&times;</button>
        </div>
      `);
      secRow.querySelector('.desc-input').oninput = (e)=>{ sec.desc = e.target.value; syncCoaItemFromSections(item); saveState(); };
      wireAmountInput(secRow.querySelector('.amt-input'), (num)=>{ sec.amount = num; syncCoaItemFromSections(item); refreshComputedOnly(); setText('coa-sections-total-'+item.id, money(item.amount)); });
      extraWrap.appendChild(secRow);
    });
    const addSecBtn = el(`<button class="secondary small" type="button" style="margin-left:22px;" data-action="add-coa-section" data-day="${day.id}" data-cat="${catKey}" data-item="${item.id}">+ Add section (another item, same voucher)</button>`);
    const sectionsTotal = el(`<div class="computed" id="coa-sections-total-${item.id}" style="margin:4px 0 4px 22px;${item.sections.length>1?'':'display:none;'}"><span class="lbl">Total (this voucher)</span><span>${money(item.amount)}</span></div>`);
    const noteRow = el(`
      <div class="coa-note-row" style="margin:-4px 0 10px 0;">
        <input type="text" class="note-input" style="width:100%;font-size:12.5px;padding:5px 8px;border:1px dashed var(--line-soft);border-radius:6px;background:#FBFBF7;" value="${escapeHtml(item.note||'')}" placeholder="ঐচ্ছিক অভ্যন্তরীণ নোট (বাংলা) — প্রিন্টে আসবে না, শুধু সার্চে পাওয়া যাবে">
      </div>
    `);
    const descInp = row.querySelector('.desc-input');
    const amtInp = row.querySelector('.amt-input');
    descInp.oninput = ()=>{ sec0.desc = descInp.value; syncCoaItemFromSections(item); saveState(); };
    wireLockableTextInput(descInp);
    wireAmountInput(amtInp, (num)=>{ sec0.amount = num; syncCoaItemFromSections(item); refreshComputedOnly(); setText('coa-sections-total-'+item.id, money(item.amount)); }, ()=>{
      /* Fires only once the amount box already held a plain resolved
         number when Enter was pressed - i.e. the user is really done
         with this line, not just finishing a calculation. */
      if(day.locked) return;
      addCoaVoucher(day, catKey);
      saveState();
      render();
      const freshContainer = document.getElementById('coa-list-'+catKey);
      if(freshContainer){
        const descInputs = freshContainer.querySelectorAll('.desc-input');
        const last = descInputs[descInputs.length-1];
        if(last) last.focus();
      }
    });
    amtInp.addEventListener('blur', ()=>{
      const msg = checkDuplicateAmount(day, item.amount, item.id);
      if(msg) showDuplicateWarning(msg);
    });
    /* Keyboard quick entry: Enter in Description jumps to Amount. */
    descInp.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); amtInp.focus(); amtInp.select(); }
    });
    const syncDescRequired = ()=>{ descInp.classList.toggle('input-missing', !descInp.value.trim()); };
    syncDescRequired();
    descInp.addEventListener('blur', syncDescRequired);
    descInp.addEventListener('input', syncDescRequired);
    container.appendChild(row);
    container.appendChild(extraWrap);
    container.appendChild(addSecBtn);
    container.appendChild(sectionsTotal);
    const noteInp = noteRow.querySelector('.note-input');
    noteInp.oninput = ()=>{ item.note = noteInp.value; saveState(); };
    wireLockableTextInput(noteInp);
    container.appendChild(noteRow);
  });
}

function drawIouList(container, day){
  const arr = activeIousForDay(day.date);
  container.innerHTML = '';
  if(arr.length===0){ container.appendChild(el(`<p class="empty">No IOUs today.</p>`)); return; }
  const suggestions = iouDescSuggestions();
  container.appendChild(el(`<datalist id="iou-desc-suggest">${suggestions.map(s=>`<option value="${escapeHtml(s)}"></option>`).join('')}</datalist>`));
  arr.forEach((item)=>{
    const carried = item.fromDate < day.date;
    const row = el(`
      <div class="line-item">
        <div class="field desc" style="margin-bottom:0;">
          <label>Description <span style="color:var(--danger);">*</span> ${carried?`<span class="tag">carried from ${dayLabel(item.fromDate)}</span>`:''}</label>
          <input type="text" class="desc-input" list="iou-desc-suggest" value="${escapeHtml(item.desc)}" placeholder="e.g. Electricity meter load" required>
        </div>
        <div class="field amt" style="margin-bottom:0;"><label>Amount</label><input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(item.amount)}"></div>
        <button class="secondary small" type="button" data-action="open-settle-iou" data-day="${day.id}" data-item="${item.id}" title="Record a receipt/repayment against this IOU">Settle</button>
        <button class="danger small" type="button" data-action="remove-iou" data-day="${day.id}" data-item="${item.id}" title="Remove (stops it carrying forward)">&times;</button>
      </div>
    `);
    const descInp = row.querySelector('.desc-input');
    const amtInp = row.querySelector('.amt-input');
    descInp.oninput = ()=>{ item.desc = descInp.value; saveState(); };
    wireLockableTextInput(descInp);
    const syncDescRequired = ()=>{ descInp.classList.toggle('input-missing', !descInp.value.trim()); };
    syncDescRequired();
    descInp.addEventListener('blur', syncDescRequired);
    descInp.addEventListener('input', syncDescRequired);
    wireAmountInput(amtInp, (num)=>{ item.amount = num; refreshComputedOnly(); });
    container.appendChild(row);
  });
}

/* Payables mirror the IOU list UI, but represent the reverse direction
   (institution owes a person). "Paid" just removes/closes it here -
   the actual cash payout still needs its own voucher entered under the
   relevant category, same as any other disbursement. */
function drawPayableList(container, day){
  const arr = activePayablesForDay(day.date);
  container.innerHTML = '';
  if(arr.length===0){ container.appendChild(el(`<p class="empty">Nothing owed to anyone right now.</p>`)); return; }
  arr.forEach((item)=>{
    const carried = item.fromDate < day.date;
    const row = el(`
      <div class="line-item">
        <div class="field desc" style="margin-bottom:0;">
          <label>Description ${carried?`<span class="tag">carried from ${dayLabel(item.fromDate)}</span>`:''}</label>
          <input type="text" class="desc-input" value="${escapeHtml(item.desc)}" placeholder="e.g. Khairul - extra fronted">
        </div>
        <div class="field amt" style="margin-bottom:0;"><label>Amount owed</label><input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(item.amount)}"></div>
        <button class="secondary small" type="button" data-action="pay-payable" data-day="${day.id}" data-item="${item.id}" title="Mark as paid out (remember to also enter the cash voucher)">Paid</button>
      </div>
    `);
    const descInp = row.querySelector('.desc-input');
    const amtInp = row.querySelector('.amt-input');
    descInp.oninput = ()=>{ item.desc = descInp.value; saveState(); };
    wireLockableTextInput(descInp);
    wireAmountInput(amtInp, (num)=>{ item.amount = num; refreshComputedOnly(); });
    container.appendChild(row);
  });
}

/* ======================================================================
   ONE delegated listener for every button in the app.
   Buttons never get per-render onclick rebinding, so there is no way
   for a stale handler to fire on the wrong row.
   ====================================================================== */
function wireDelegation(){
  document.getElementById('app').addEventListener('click', (e)=>{
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    const dayId = t.dataset.day;
    const day = dayId ? findDay(dayId) : null;

    if(action==='toggle-password-form'){ passwordFormOpen = !passwordFormOpen; render(); return; }
    if(action==='toggle-daylock-password-form'){ dayLockPasswordFormOpen = !dayLockPasswordFormOpen; render(); return; }
    if(action==='lock-now'){
      if(!state.lockPasswordHash){ showAlert('Set a password first.'); return; }
      locked = true; lockError = ''; render();
      return;
    }
    if(action==='export-backup'){ exportBackupJson(); return; }
    if(action==='import-backup'){ document.getElementById('import-file-input').click(); return; }
    if(action==='connect-file'){ connectToFile(); return; }
    if(action==='create-file'){ createNewFile(); return; }
    if(action==='disconnect-file'){ disconnectFile(); return; }
    if(action==='install-app'){
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(()=>{ deferredInstallPrompt = null; render(); });
      return;
    }
    if(action==='edit-setup'){ state.setupDone=false; render(); return; }
    if(action==='toggle-search'){ searchOpen = !searchOpen; render(); return; }
    if(action==='toggle-summary'){ summaryOpen = !summaryOpen; render(); return; }
    if(action==='toggle-templates'){ templatesOpen = !templatesOpen; render(); return; }
    if(action==='toggle-dashboard'){ dashboardOpen = !dashboardOpen; render(); return; }
    if(action==='toggle-monthly-ledger'){
      monthlyLedgerOpen = true;
      monthlyLedgerMinimized = false;
      if(!monthlyLedgerViewKey) monthlyLedgerViewKey = monthKeyFor(state.month, state.year);
      render(); return;
    }
    if(action==='toggle-ml-settings'){
      mlSettingsOpen = !mlSettingsOpen;
      render(); return;
    }
    if(action==='ml-toggle-beginning'){
      mlBeginningOpen = !mlBeginningOpen;
      renderMonthlyLedgerWindowInPlace();
      return;
    }
    if(action==='minimize-monthly-ledger'){
      monthlyLedgerMinimized = !monthlyLedgerMinimized;
      render(); return;
    }
    if(action==='close-monthly-ledger'){
      monthlyLedgerOpen = false;
      render(); return;
    }
    if(action==='delete-withdraw-log'){
      const id = t.dataset.id;
      state.withdrawNotesheetLog = (state.withdrawNotesheetLog||[]).filter(l=>l.id!==id);
      saveState(); render(); return;
    }
    if(action==='toggle-recon-detail'){
      const bankId = t.dataset.bank;
      reconDetailOpen[bankId] = !reconDetailOpen[bankId];
      render(); return;
    }
    if(action==='delete-deposit-log'){
      const id = t.dataset.id;
      state.depositNotesheetLog = (state.depositNotesheetLog||[]).filter(l=>l.id!==id);
      Object.values(state.monthlyLedger.months).forEach(rec=>{
        rec.revenueEntries = rec.revenueEntries.filter(e=>e.id!==id);
      });
      saveState(); render(); return;
    }
    if(action==='ml-add-month'){
      showMlAddMonthModal();
      return;
    }
    if(action==='ml-delete-month'){
      const keyToDelete = monthlyLedgerViewKey;
      if(!keyToDelete || !state.monthlyLedger.months[keyToDelete]){ return; }
      showConfirm(`Delete ${monthKeyLabel(keyToDelete)} from the Monthly Ledger? This can't be undone.`, ()=>{
        delete state.monthlyLedger.months[keyToDelete];
        const remaining = Object.keys(state.monthlyLedger.months).sort();
        monthlyLedgerViewKey = remaining.length ? remaining[remaining.length-1] : null;
        saveState(); render();
      });
      return;
    }
    if(action==='ml-add-revenue'){
      const rec = getMonthlyLedgerMonth(monthlyLedgerViewKey);
      const entry = {id:uid(), date:'', desc:''};
      REVENUE_CATS.forEach(c=>{ entry[c.key] = 0; });
      rec.revenueEntries.push(entry);
      saveState(); renderMonthlyLedgerWindowInPlace();
      const newRow = document.getElementById('ml-rev-entry-'+entry.id);
      if(newRow) newRow.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    if(action==='ml-remove-revenue'){
      const rec = getMonthlyLedgerMonth(monthlyLedgerViewKey);
      const idx = rec.revenueEntries.findIndex(x=>x.id===t.dataset.item);
      const removed = rec.revenueEntries[idx];
      rec.revenueEntries = rec.revenueEntries.filter(x=>x.id!==t.dataset.item);
      pushUndo('Revenue entry removed.', ()=>{ rec.revenueEntries.splice(idx,0,removed); });
      saveState(); render();
      return;
    }
    if(action==='ml-add-expcol'){
      showMlAddColumnModal(true);
      return;
    }
    if(action==='ml-add-expcol-manual'){
      showMlAddColumnModal(false);
      return;
    }
    if(action==='ml-remove-expcol'){
      const rec = getMonthlyLedgerMonth(monthlyLedgerViewKey);
      const idx = rec.expenditureColumns.findIndex(x=>x.id===t.dataset.item);
      const removed = rec.expenditureColumns[idx];
      rec.expenditureColumns = rec.expenditureColumns.filter(x=>x.id!==t.dataset.item);
      pushUndo('Expenditure column removed.', ()=>{ rec.expenditureColumns.splice(idx,0,removed); });
      saveState(); render();
      return;
    }
    if(action==='ml-add-debt'){
      const rec = getMonthlyLedgerMonth(monthlyLedgerViewKey);
      rec.balanceSheet.debtItems.push({id:uid(), label:'', amount:0});
      saveState(); render();
      return;
    }
    if(action==='ml-remove-debt'){
      const rec = getMonthlyLedgerMonth(monthlyLedgerViewKey);
      const idx = rec.balanceSheet.debtItems.findIndex(x=>x.id===t.dataset.item);
      const removed = rec.balanceSheet.debtItems[idx];
      rec.balanceSheet.debtItems = rec.balanceSheet.debtItems.filter(x=>x.id!==t.dataset.item);
      pushUndo('Liability removed.', ()=>{ rec.balanceSheet.debtItems.splice(idx,0,removed); });
      saveState(); render();
      return;
    }
    if(action==='ml-set-seed'){
      showMlSeedModal();
      return;
    }
    if(action==='ml-import'){
      document.getElementById('ml-import-input').click();
      return;
    }
    if(action==='ml-export'){
      exportMonthlyLedger(monthlyLedgerViewKey);
      return;
    }
    if(action==='ml-preview'){
      exportMonthlyLedger(monthlyLedgerViewKey, true);
      return;
    }
    if(action==='remove-template'){
      const idx = state.templates.findIndex(x=>x.id===t.dataset.item);
      const removed = state.templates[idx];
      state.templates = state.templates.filter(x=>x.id!==t.dataset.item);
      pushUndo('Template "'+removed.desc+'" removed.', ()=>{ state.templates.splice(idx,0,removed); });
      saveState(); render();
      return;
    }

    if(action==='add-bank'){
      state.banks.push({id:uid(), name:'', opening:0});
      const setupCard = t.closest('.card');
      if(setupCard && setupCard._drawBankRows) setupCard._drawBankRows();
      saveState();
      return;
    }
    if(action==='finish-setup'){
      if(!state.month || !state.year){ showAlert('Please choose a month and year.'); return; }
      if(state.banks.length===0){ showAlert('Add at least one bank account.'); return; }
      if(state.banks.some(b=>!b.name.trim())){ showAlert('Every bank account needs a name.'); return; }
      state.setupDone = true;
      saveState(); render();
      return;
    }

    if(action==='select-day'){ selectedDayId = t.dataset.day; render(); return; }
    if(action==='add-day'){
      const lastDate = state.days.length ? state.days[state.days.length-1].date : null;
      let next = new Date();
      if(lastDate){ next = new Date(lastDate+'T00:00:00'); next.setDate(next.getDate()+1); }
      const d = newDay(next.toISOString().slice(0,10));
      state.days.push(d);
      selectedDayId = d.id;
      saveState(); render();
      return;
    }
    if(action==='delete-day'){
      if(day.locked){ showAlert('This day is locked. Unlock it first to delete it.'); return; }
      showConfirm('Delete '+dayLabel(day.date)+'?', ()=>{
        const i = state.days.findIndex(d=>d.id===dayId);
        const removedDay = state.days[i];
        state.days.splice(i,1);
        selectedDayId = state.days.length ? state.days[Math.max(0,i-1)].id : null;
        pushUndo(dayLabel(removedDay.date)+' deleted.', ()=>{
          state.days.splice(i,0,removedDay);
          selectedDayId = removedDay.id;
        });
        saveState(); render();
      });
      return;
    }
    if(action==='lock-day'){
      const pending = COA.reduce((n,cat)=> n + (day.coa[cat.key]||[]).filter(it=>(it.status||'draft')!=='approved' && Number(it.amount)>0).length, 0);
      const note = pending>0 ? ` Note: ${pending} voucher${pending>1?'s are':' is'} not yet marked Approved.` : '';
      showConfirm('Lock '+dayLabel(day.date)+'? Its entries can\'t be edited again until you unlock it.'+note, ()=>{
        day.locked = true; saveState(); render();
      }, 'Lock this day');
      return;
    }
    if(action==='unlock-day'){
      const gateHash = state.dayLockPasswordHash || state.lockPasswordHash;
      showPasswordPrompt('Enter password to unlock '+dayLabel(day.date)+' for editing.', ()=>{
        day.locked = false; saveState(); render();
      }, 'Unlock', gateHash);
      return;
    }
    if(action==='perform-undo'){ performUndo(); return; }
    if(action==='cycle-status'){
      if(day.locked) return;
      const catKey = t.dataset.cat;
      const item = (day.coa[catKey]||[]).find(x=>x.id===t.dataset.item);
      if(item){ item.status = nextStatus(item.status||'draft'); saveState(); render(); }
      return;
    }
    if(action==='dismiss-dup-warning'){ if(duplicateWarningTimer) clearTimeout(duplicateWarningTimer); duplicateWarning=null; render(); return; }

    if(!day && action!=='dl-day' && action!=='dl-month'){ return; }

    if(action==='add-withdraw'){ if(day.locked) return; day.withdrawals.push({id:uid(), amount:0, bankId:state.banks[0].id, note:''}); render(); return; }
    if(action==='remove-withdraw'){
      if(day.locked) return;
      const idx = day.withdrawals.findIndex(x=>x.id===t.dataset.item);
      const removed = day.withdrawals[idx];
      day.withdrawals = day.withdrawals.filter(x=>x.id!==t.dataset.item);
      pushUndo('Withdrawal removed.', ()=>{ day.withdrawals.splice(idx,0,removed); });
      saveState(); render(); return;
    }
    if(action==='add-deposit'){ if(day.locked) return; day.deposits.push({id:uid(), amount:0, bankId:state.banks[0].id, note:''}); render(); return; }
    if(action==='remove-deposit'){
      if(day.locked) return;
      const idx = day.deposits.findIndex(x=>x.id===t.dataset.item);
      const removed = day.deposits[idx];
      day.deposits = day.deposits.filter(x=>x.id!==t.dataset.item);
      pushUndo('Deposit removed.', ()=>{ day.deposits.splice(idx,0,removed); });
      saveState(); render(); return;
    }
    if(action==='add-iou'){ if(day.locked) return; state.iouRegistry.push({id:uid(), desc:'', amount:0, fromDate:day.date, toDate:null}); render(); return; }
    if(action==='open-settle-iou'){
      if(day.locked) return;
      const item = state.iouRegistry.find(x=>x.id===t.dataset.item);
      if(item) showSettleIouModal(day, item);
      return;
    }
    if(action==='remove-iou'){
      if(day.locked) return;
      const item = state.iouRegistry.find(x=>x.id===t.dataset.item);
      if(item){
        if(item.fromDate===day.date){
          const idx = state.iouRegistry.findIndex(x=>x.id===item.id);
          state.iouRegistry = state.iouRegistry.filter(x=>x.id!==item.id);
          pushUndo('IOU removed.', ()=>{ state.iouRegistry.splice(idx,0,item); });
        } else {
          const prevToDate = item.toDate;
          item.toDate = addDaysStr(day.date, -1);
          pushUndo('IOU stopped carrying forward.', ()=>{ item.toDate = prevToDate; });
        }
      }
      saveState(); render();
      return;
    }
    if(action==='add-payable'){
      if(day.locked) return;
      state.payableRegistry.push({id:uid(), desc:'', amount:0, fromDate:day.date, toDate:null});
      render();
      return;
    }
    if(action==='pay-payable'){
      if(day.locked) return;
      const item = state.payableRegistry.find(x=>x.id===t.dataset.item);
      if(item){
        if(item.fromDate===day.date){
          const idx = state.payableRegistry.findIndex(x=>x.id===item.id);
          state.payableRegistry = state.payableRegistry.filter(x=>x.id!==item.id);
          pushUndo('Payable marked paid.', ()=>{ state.payableRegistry.splice(idx,0,item); });
        } else {
          const prevToDate = item.toDate;
          item.toDate = addDaysStr(day.date, -1);
          pushUndo('Payable marked paid.', ()=>{ item.toDate = prevToDate; });
        }
      }
      saveState(); render();
      return;
    }
    if(action==='add-bank-transfer'){
      if(day.locked) return;
      if(state.banks.length<2){ showAlert('Add at least two bank accounts to make a transfer.'); return; }
      if(!day.bankTransfers) day.bankTransfers = [];
      const from = state.banks[0], to = state.banks[1];
      day.bankTransfers.push({id:uid(), fromBankId:from.id, toBankId:to.id, amount:0});
      render();
      return;
    }
    if(action==='remove-bank-transfer'){
      if(day.locked) return;
      const idx = (day.bankTransfers||[]).findIndex(x=>x.id===t.dataset.item);
      const removed = day.bankTransfers[idx];
      day.bankTransfers = (day.bankTransfers||[]).filter(x=>x.id!==t.dataset.item);
      pushUndo('Bank transfer removed.', ()=>{ day.bankTransfers.splice(idx,0,removed); });
      saveState(); render();
      return;
    }

    if(action==='add-coa'){
      if(day.locked) return;
      addCoaVoucher(day, t.dataset.cat);
      render();
      return;
    }
    if(action==='add-coa-from-template'){
      if(day.locked) return;
      const tpl = state.templates.find(x=>x.id===t.dataset.tpl);
      if(!tpl) return;
      const cat = COA.find(c=>c.key===tpl.catKey);
      state.voucherCounters[tpl.catKey] += 1;
      const yearShort = String(state.year).slice(-2);
      const monthNum = MONTHS.indexOf(state.month)+1;
      const voucher = `${cat.short}${state.voucherCounters[tpl.catKey]}/${monthNum}/${yearShort}`;
      day.coa[tpl.catKey].push({id:uid(), voucher, desc:tpl.desc, amount:tpl.amount, status:'draft'});
      render();
      return;
    }
    if(action==='print-day-sheet'){
      printDaySheet(day, computeAll()[day.id]);
      return;
    }
    if(action==='print-all-vouchers'){
      printAllVouchersForDay(day);
      return;
    }
    if(action==='print-coa-voucher'){
      const cat = COA.find(c=>c.key===t.dataset.cat);
      const item = (day.coa[t.dataset.cat]||[]).find(x=>x.id===t.dataset.item);
      if(cat && item) printDebitVoucher(day, cat, item);
      return;
    }
    if(action==='upload-bank-statement'){
      const inp = document.getElementById('bank-statement-input-'+t.dataset.bank);
      if(inp) inp.click();
      return;
    }
    if(action==='add-misc-collection-section'){
      if(day.locked) return;
      ensureMiscCollectionSections(day).push({id:uid(), desc:'', amount:0});
      syncMiscCollectionFromSections(day);
      saveState(); render();
      return;
    }
    if(action==='remove-misc-collection-section'){
      if(day.locked) return;
      const sections = ensureMiscCollectionSections(day);
      day.miscCollectionSections = sections.filter(s=>s.id!==t.dataset.section);
      syncMiscCollectionFromSections(day);
      saveState(); render();
      return;
    }
    if(action==='add-coa-section'){
      const catKey = t.dataset.cat;
      const item = (day.coa[catKey]||[]).find(x=>x.id===t.dataset.item);
      if(item){
        if(!item.sections) item.sections = [{id:uid(), desc:item.desc||'', amount:item.amount||0}];
        item.sections.push({id:uid(), desc:'', amount:0});
        syncCoaItemFromSections(item);
        saveState(); render();
      }
      return;
    }
    if(action==='remove-coa-section'){
      const catKey = t.dataset.cat;
      const item = (day.coa[catKey]||[]).find(x=>x.id===t.dataset.item);
      if(item && item.sections && item.sections.length>1){
        item.sections = item.sections.filter(s=>s.id!==t.dataset.section);
        syncCoaItemFromSections(item);
        saveState(); render();
      }
      return;
    }
    if(action==='remove-coa'){
      if(day.locked) return;
      const catKey = t.dataset.cat;
      const idx = day.coa[catKey].findIndex(x=>x.id===t.dataset.item);
      const removed = day.coa[catKey][idx];
      day.coa[catKey] = day.coa[catKey].filter(x=>x.id!==t.dataset.item);
      pushUndo((removed.desc||catKey+' voucher')+' removed.', ()=>{ day.coa[catKey].splice(idx,0,removed); });
      saveState(); render();
      return;
    }
    if(action==='open-move-coa'){
      if(day.locked) return;
      const catKey = t.dataset.cat;
      const item = day.coa[catKey].find(x=>x.id===t.dataset.item);
      if(item) showMoveVoucherModal(day, catKey, item);
      return;
    }

    if(action==='dl-day'){ exportDay(selectedDayId); return; }
    if(action==='dl-month'){ exportMonth(); return; }
  });
}



/* ======================================================================
   Excel export (ExcelJS) — mirrors the original workbook's layout:
   Times New Roman throughout, bold section/total rows, thin borders on
   every used cell, and live =SUM(...) / cross-sheet formulas instead of
   hard-coded numbers, so the file behaves exactly like the hand-built
   sample once opened in Excel.
   ====================================================================== */
const EXCELJS_URLS = [
  'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js',
  'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js',
  'https://unpkg.com/exceljs@4.4.0/dist/exceljs.min.js'
];
let excelJsLoadPromise = null;
/* --- Bank Statement upload & cross-check -------------------------------
   Reads an uploaded Excel export of the real bank statement (Date,
   Deposit/Credit, Withdrawal/Debit, Balance columns - header names vary
   by bank, so we match by keyword) and stores the parsed rows. On
   upload, every day already recorded in the app whose date appears in
   the statement gets its Bank Reconciliation "statement balance" field
   auto-filled, which drives the existing per-day mismatch breakdown
   further down. A summary (matched/mismatched day counts + a table of
   exactly which dates and amounts differ) is shown separately so a
   mismatch doesn't require opening every day one at a time. */
function excelSerialToDateStr(n){
  // Excel's day-0 is 1899-12-30 in the (incorrect, but universal) 1900 date system.
  const ms = Math.round((Number(n)-25569)*86400*1000);
  const d = new Date(ms);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function parseStatementDateCell(v){
  if(v==null || v==='') return null;
  if(v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  if(typeof v==='number') return excelSerialToDateStr(v);
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){
    let [,, a, b, y] = [null, ...m]; // a=day-or-month, b=month-or-day, y=year
    let day = m[1], mon = m[2], yr = m[3];
    if(yr.length===2) yr = (Number(yr)<70?'20':'19')+yr;
    if(Number(mon)>12){ const t=day; day=mon; mon=t; } // swap if the "month" is >12, it must be the day
    return `${yr}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }
  m = s.match(/^(\d{1,2})[\s\-]([A-Za-z]{3,})[\s\-](\d{2,4})/);
  if(m){
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const mi = months.indexOf(m[2].slice(0,3).toLowerCase());
    if(mi>=0){ let yr=m[3]; if(yr.length===2) yr=(Number(yr)<70?'20':'19')+yr; return `${yr}-${String(mi+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
  }
  return null;
}
function parseStatementAmountCell(v){
  if(v==null || v==='') return 0;
  if(typeof v==='number') return v;
  const s = String(v).replace(/[,\s৳]/g,'').replace(/^Tk\.?/i,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
async function parseBankStatementFile(bankId, file){
  await loadExcelJS();
  const buf = await file.arrayBuffer();
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(buf);
  const ws = wb.worksheets[0];
  if(!ws) throw new Error('No sheet found in that file.');
  let headerRow = null, cols = {};
  for(let r=1; r<=Math.min(15, ws.rowCount); r++){
    const row = ws.getRow(r);
    const found = {};
    row.eachCell({includeEmpty:false}, (cell, c)=>{
      const t = String(cell.value||'').trim().toLowerCase();
      if(!t) return;
      if(/date/.test(t) && found.date===undefined) found.date = c;
      else if(/(deposit|credit)/.test(t) && found.deposit===undefined) found.deposit = c;
      else if(/(withdraw|debit)/.test(t) && found.withdrawal===undefined) found.withdrawal = c;
      else if(/balance/.test(t) && found.balance===undefined) found.balance = c;
    });
    if(found.date!==undefined && found.balance!==undefined){ headerRow = r; cols = found; break; }
  }
  if(headerRow===null) throw new Error('Could not find Date/Balance column headers in the first 15 rows - check the file has a header row like "Date, Deposit, Withdrawal, Balance".');
  const rows = [];
  for(let r=headerRow+1; r<=ws.rowCount; r++){
    const row = ws.getRow(r);
    const dateCell = row.getCell(cols.date).value;
    const date = parseStatementDateCell(dateCell);
    if(!date) continue;
    rows.push({
      date,
      deposit: cols.deposit!==undefined ? parseStatementAmountCell(row.getCell(cols.deposit).value) : 0,
      withdrawal: cols.withdrawal!==undefined ? parseStatementAmountCell(row.getCell(cols.withdrawal).value) : 0,
      balance: parseStatementAmountCell(row.getCell(cols.balance).value)
    });
  }
  if(rows.length===0) throw new Error('Found the header row but no data rows under it.');
  return rows;
}
/* Fills bd.reconciledBalance for every day (current + archived) whose
   date matches a row in the uploaded statement, so the existing mismatch
   breakdown (further down the bank card) reflects the real statement
   without retyping each closing balance by hand. Only overwrites values
   that were previously auto-filled or empty - a manually typed note
   survives, and a manually typed balance the person clearly entered on
   purpose is left alone unless it now conflicts with the statement (in
   which case the statement wins, since that's the source of truth). */
function applyBankStatementToDays(bankId){
  const stmt = state.bankStatements[bankId];
  if(!stmt) return;
  const byDate = {};
  stmt.rows.forEach(r=>{ byDate[r.date] = r; });
  const applyToDayList = (days)=>{
    days.forEach(day=>{
      const row = byDate[day.date];
      if(!row) return;
      const bd = ensureBankDaily(day, bankId);
      bd.reconciledBalance = row.balance;
      bd.reconcileNote = `Auto from statement: ${stmt.fileName}`;
    });
  };
  applyToDayList(state.days||[]);
  (state.archive||[]).forEach(m=>applyToDayList(m.days||[]));
}
/* Cross-check summary for a bank + date range (typically the days
   currently loaded for the live month): matched/mismatched counts,
   totals, and the list of mismatched dates with both figures. */
function bankStatementCrossCheck(bankId, days, computed){
  const stmt = state.bankStatements[bankId];
  if(!stmt) return null;
  const byDate = {};
  stmt.rows.forEach(r=>{ byDate[r.date] = r; });
  let matched=0, mismatched=0, stmtDepositTotal=0, stmtWithdrawTotal=0, appDepositTotal=0, appWithdrawTotal=0;
  const diffs = [];
  days.forEach(day=>{
    const row = byDate[day.date];
    const bc = computed[day.id] && computed[day.id].banks[bankId];
    if(row){
      stmtDepositTotal += row.deposit; stmtWithdrawTotal += row.withdrawal;
    }
    if(bc){
      appDepositTotal += bc.sslDeposit + bc.transferIn + bc.bankXferIn;
      appWithdrawTotal += bc.fees + bc.salaryAccount + bc.salaryCash + bc.transferOut + bc.bankXferOut;
    }
    if(row && bc){
      const diff = Math.round((bc.closing - row.balance)*100)/100;
      if(diff===0) matched++;
      else { mismatched++; diffs.push({date:day.date, appClosing:bc.closing, stmtBalance:row.balance, diff}); }
    }
  });
  return {fileName:stmt.fileName, uploadedAt:stmt.uploadedAt, rowCount:stmt.rows.length, matched, mismatched,
          stmtDepositTotal, stmtWithdrawTotal, appDepositTotal, appWithdrawTotal, diffs};
}

function loadExcelJS(){
  if(typeof ExcelJS !== 'undefined') return Promise.resolve();
  if(excelJsLoadPromise) return excelJsLoadPromise;
  excelJsLoadPromise = (async ()=>{
    for(const url of EXCELJS_URLS){
      try{
        await new Promise((resolve, reject)=>{
          const s = document.createElement('script');
          s.src = url;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
        if(typeof ExcelJS !== 'undefined') return;
      }catch(e){ /* try next source */ }
    }
    throw new Error('Could not load the Excel export library from any source.');
  })();
  return excelJsLoadPromise;
}

function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}
