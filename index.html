<style>
  :root{
    --paper:#EEF0E6;
    --card:#FBFAF5;
    --ink:#1F2A23;
    --ink-soft:#5B6459;
    --primary:#1B4B43;
    --primary-dark:#0F332C;
    --primary-tint:#DCE8E2;
    --accent:#B8863B;
    --accent-deep:#8C6423;
    --accent-soft:#EADFC5;
    --danger:#A23B2E;
    --danger-soft:#F3DFDA;
    --line:#D7D2C0;
    --line-soft:#E6E2D3;
    --radius:12px;
    --ease:cubic-bezier(.19,.85,.32,1.05);
    --shadow-sm:0 1px 2px rgba(15,51,44,.05), 0 1px 1px rgba(15,51,44,.04);
    --shadow-md:0 4px 14px rgba(15,51,44,.07), 0 1px 3px rgba(15,51,44,.05);
    --shadow-lg:0 14px 34px rgba(15,51,44,.14), 0 3px 10px rgba(15,51,44,.08);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
  body{
    padding:32px 18px 90px;
    background:
      radial-gradient(1100px 520px at 12% -8%, rgba(184,134,59,.07), transparent 55%),
      radial-gradient(900px 480px at 100% 0%, rgba(27,75,67,.06), transparent 50%),
      var(--paper);
    min-height:100vh;
  }
  body::before{
    content:'';position:fixed;top:0;left:0;right:0;height:3px;z-index:999;
    background:linear-gradient(90deg, var(--primary) 0%, var(--accent) 52%, var(--primary) 100%);
    background-size:200% 100%;
    animation:sheen 9s linear infinite;
  }
  @keyframes sheen{0%{background-position:0% 0;}100%{background-position:200% 0;}}
  .wrap{max-width:980px;margin:0 auto;}

  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;margin:0;color:var(--primary-dark);letter-spacing:-.01em;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);font-weight:600;display:inline-flex;align-items:center;gap:7px;}
  .eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}

  header.top{display:flex;flex-direction:column;gap:14px;margin-bottom:26px;padding-bottom:18px;position:relative;animation:fadeDown .5s var(--ease) both;}
  header.top::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg, var(--primary-dark) 0%, var(--line) 65%, transparent 100%);}
  .top-title h1{font-size:27px;margin-top:3px;}
  .top-title p{margin:5px 0 0;color:var(--ink-soft);font-size:13.5px;}

  .toolbar{display:flex;align-items:center;gap:2px;flex-wrap:wrap;background:#fff;border:1px solid var(--line-soft);border-radius:12px;padding:6px;box-shadow:var(--shadow-sm);width:fit-content;max-width:100%;}
  .toolbar-group{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
  .toolbar-divider{width:1px;align-self:stretch;background:var(--line-soft);margin:4px 6px;}
  .toolbar button{padding:7px 12px;font-size:12.5px;border-radius:7px;}
  .toolbar button.secondary{border-color:transparent;background:transparent;box-shadow:none;}
  .toolbar button.secondary:hover{background:var(--paper);border-color:var(--line-soft);box-shadow:none;transform:none;}
  .toolbar .tag{margin-left:2px;}
  @media (max-width:640px){ .toolbar{width:100%;} }

  button{font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;border-radius:8px;border:1px solid var(--primary-dark);padding:8px 14px;cursor:pointer;background:var(--primary);color:#fff;transition:transform .16s var(--ease), background-color .18s ease, box-shadow .18s ease, border-color .18s ease;box-shadow:var(--shadow-sm);}
  button:hover{background:var(--primary-dark);box-shadow:var(--shadow-md);transform:translateY(-1px);}
  button:active{transform:translateY(0) scale(.97);box-shadow:var(--shadow-sm);}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  button.secondary{background:var(--card);color:var(--primary-dark);border-color:var(--line);}
  button.secondary:hover{background:#fff;border-color:var(--primary);}
  button.danger{background:var(--card);color:var(--danger);border-color:var(--danger-soft);}
  button.danger:hover{background:var(--danger-soft);border-color:var(--danger);}
  button.small{padding:5px 10px;font-size:12px;border-radius:6px;}
  button:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

  .card{scroll-margin-top:16px;
    background:var(--card);
    border:1px solid var(--line);
    border-left:3px solid var(--accent-soft);
    border-radius:var(--radius);
    padding:20px 22px;
    margin-bottom:16px;
    box-shadow:var(--shadow-sm);
    animation:cardRise .5s var(--ease) both;
    transition:box-shadow .25s ease, border-left-color .25s ease;
  }
  .card:hover{box-shadow:var(--shadow-md);border-left-color:var(--accent);}
  @keyframes cardRise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .card > h3{font-size:16.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .card > h3 .num{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent-deep);border:1px solid var(--accent-soft);background:var(--accent-soft);border-radius:5px;padding:2px 7px;}
  .subnote{font-size:12px;color:var(--ink-soft);margin:-6px 0 12px;line-height:1.5;}

  label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;letter-spacing:.01em;}
  input[type=text], input[type=number], input[type=date], input[type=password], select{
    width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;background:#fff;color:var(--ink);
    transition:border-color .16s ease, box-shadow .16s ease, background-color .16s ease;
  }
  input[type=number]{font-family:'IBM Plex Mono',monospace;}
  input:hover, select:hover{border-color:#c3bda6;}
  input:focus, select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint);background:#fff;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:140px;}

  .field{margin-bottom:10px;}

  .line-item{display:flex;gap:8px;align-items:flex-end;background:#fff;border:1px solid var(--line-soft);border-radius:8px;padding:9px 10px;margin-bottom:8px;transition:box-shadow .18s ease, border-color .18s ease;animation:rowIn .3s var(--ease) both;}
  .line-item:hover{box-shadow:var(--shadow-sm);border-color:var(--line);}
  @keyframes rowIn{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:translateX(0);}}
  .line-item .voucher-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--primary-dark);color:#fff;border-radius:5px;padding:5px 8px;white-space:nowrap;align-self:center;}
  .status-badge{font-size:10.5px;font-weight:600;border-radius:20px;padding:5px 10px;white-space:nowrap;align-self:center;border:1px solid transparent;cursor:pointer;transition:background .15s var(--ease),transform .1s var(--ease);letter-spacing:.02em;}
  .status-badge:active{transform:scale(.95);}
  .status-badge:disabled{cursor:not-allowed;opacity:.6;}
  .status-badge.status-draft{background:#EDEEF1;color:#5B6270;border-color:#DADDE3;}
  .status-badge.status-reviewed{background:#DCEBFB;color:#1D5FA8;border-color:#BBDAF5;}
  .status-badge.status-approved{background:#DDEEE3;color:var(--primary-dark);border-color:#BFE0CC;}
  input.locked-text{background:var(--card-alt,#F7F8F4);cursor:default;color:var(--ink-soft);}

  .section-nav{position:fixed;right:10px;top:50%;transform:translateY(-50%);z-index:420;display:flex;flex-direction:column;gap:12px;align-items:flex-end;}
  .desc-input.input-missing{border-color:var(--danger,#B3261E);box-shadow:0 0 0 1px var(--danger,#B3261E) inset;}
  .pw-wrap{position:relative;display:block;}
  .pw-wrap input{width:100%;padding-right:34px;box-sizing:border-box;}
  .pw-toggle-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px 6px;font-size:15px;line-height:1;color:var(--ink-soft,#666);}
  .pw-toggle-btn:hover{color:var(--ink,#222);}
  .xlsx-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:3vh 3vw;}
  .xlsx-preview-modal{background:#fff;border-radius:10px;width:100%;height:100%;max-width:1200px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .xlsx-preview-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line-soft);}
  .xlsx-preview-head h4{margin:0;font-size:15px;}
  .xlsx-preview-tabs{display:flex;gap:4px;padding:8px 14px 0;background:#F1F2EC;overflow-x:auto;flex:0 0 auto;}
  .xlsx-preview-tabs button{border:1px solid var(--line-soft);border-bottom:none;background:#E4E6DC;padding:6px 14px;font-size:12.5px;border-radius:6px 6px 0 0;cursor:pointer;white-space:nowrap;}
  .xlsx-preview-tabs button.active{background:#fff;font-weight:700;}
  .xlsx-preview-body{flex:1 1 auto;overflow:auto;background:#fff;padding:14px;}
  table.xlsx-preview-table{border-collapse:collapse;font-size:12.5px;font-family:Calibri,Arial,sans-serif;}
  table.xlsx-preview-table td{border:1px solid #D6D6D6;padding:3px 6px;white-space:pre-wrap;vertical-align:middle;min-width:24px;}
  .doc-preview{max-width:640px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:10px 6px;}
  .doc-row{display:flex;align-items:baseline;gap:10px;padding:9px 16px;border-radius:8px;transition:background .15s ease;}
  .doc-row:hover{background:var(--paper);}
  .doc-row--title{justify-content:center;text-align:center;font-family:'Fraunces',serif;font-weight:600;font-size:17px;color:var(--primary-dark);padding-top:14px;padding-bottom:6px;}
  .doc-row--note{justify-content:center;text-align:center;font-size:13px;color:var(--ink-soft);line-height:1.55;padding:6px 22px;}
  .doc-row--caption{justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:.03em;color:var(--accent-deep);text-transform:uppercase;padding-top:16px;}
  .doc-row--line{justify-content:space-between;border-bottom:1px dashed var(--line-soft);font-size:13.5px;}
  .doc-row--line:last-of-type{border-bottom:none;}
  .doc-row--total{font-weight:700;background:var(--primary-tint);border-radius:8px;border-bottom:none;margin-top:4px;font-size:14.5px;}
  .doc-desc{flex:1 1 auto;color:var(--ink);}
  .doc-sep{color:var(--line);margin:0 2px;}
  .doc-amt{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;color:var(--primary-dark);white-space:nowrap;font-weight:600;}
  .doc-row--total .doc-amt{color:var(--accent-deep);}
  .doc-editable{outline:none;border-radius:4px;padding:1px 3px;margin:-1px -3px;cursor:text;}
  .doc-editable:hover{background:var(--accent-soft);}
  .doc-editable:focus{background:#fff;box-shadow:0 0 0 2px var(--primary-tint);}
  .floating-window{
    position:fixed;top:6vh;right:2vw;width:min(880px,60vw);height:88vh;
    min-width:340px;min-height:220px;max-width:96vw;max-height:94vh;
    background:var(--card,#fff);border:1px solid var(--border,#D8DED2);border-radius:10px;
    box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:500;display:flex;flex-direction:column;
    resize:both;overflow:hidden;
  }
  .floating-window-header{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 12px;background:var(--card-alt,#F7F8F4);border-bottom:1px solid var(--border,#D8DED2);
    cursor:move;user-select:none;border-radius:10px 10px 0 0;flex:0 0 auto;
  }
  .floating-window-title{font-weight:700;font-size:14px;}
  .floating-window-controls{display:flex;gap:6px;}
  .floating-window-controls button{padding:2px 10px;min-width:0;line-height:1.6;}
  .floating-window-body{flex:1 1 auto;overflow:auto;padding:4px 10px 14px;}
  .floating-window-body .card{box-shadow:none;border:none;margin:0;padding:6px 0 0;}
  @media (max-width:900px){
    .floating-window{top:2vh;right:1vw;left:1vw;width:auto;height:96vh;}
  }
  .section-nav-item{position:relative;}
  .section-nav-dot{
    height:64px;min-width:64px;border-radius:32px;
    background:var(--primary-dark);color:#fff;border:3px solid #fff;
    font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:600;
    display:flex;align-items:center;justify-content:flex-start;gap:8px;
    box-shadow:var(--shadow-md,0 2px 8px rgba(0,0,0,.18));
    cursor:pointer;opacity:.88;transition:opacity .15s var(--ease),transform .12s var(--ease);
    padding:0 20px;white-space:nowrap;
  }
  .section-nav-dot .num{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;opacity:.85;}
  .section-nav-dot:hover, .section-nav-item.open .section-nav-dot{opacity:1;transform:scale(1.04);}
  .section-nav-flyout{
    display:none;position:absolute;right:calc(100% + 10px);top:50%;transform:translateY(-50%);
    background:#fff;border:1px solid var(--line-soft);border-radius:10px;
    box-shadow:var(--shadow-lg);padding:6px;min-width:220px;max-height:65vh;overflow-y:auto;
  }
  .section-nav-item.open .section-nav-flyout{display:block;}
  .section-nav-flyout-title{font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;padding:5px 10px 7px;}
  .section-nav-flyout-item{
    display:block;width:100%;text-align:left;background:none;border:none;
    font-size:14px;padding:10px 10px;border-radius:7px;cursor:pointer;color:var(--ink);
  }
  .section-nav-flyout-item:hover{background:var(--card-alt,#F7F8F4);}
  @media (max-width: 480px){
    .section-nav-dot{height:56px;min-width:56px;font-size:13px;padding:0 16px;}
    .section-nav-dot .num{font-size:13px;}
    .section-nav{right:6px;gap:10px;}
  }
  .day-panel.locked{position:relative;}
  .day-panel.locked::after{
    content:'\1F512';
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-18deg);
    font-size:min(30vw,320px);
    opacity:.035;
    pointer-events:none;
    z-index:0;
    filter:grayscale(1);
  }
  .day-panel.locked > .card{position:relative;z-index:1;}
  .line-item .desc{flex:3;}
  .line-item .amt{flex:1;min-width:100px;}
  .line-item .bank-sel{flex:1.4;min-width:120px;}

  .computed{background:var(--accent-soft);border:1px dashed var(--accent);border-radius:7px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--primary-dark);display:flex;justify-content:space-between;margin-top:4px;transition:background-color .2s ease;}
  .computed .lbl{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:12.5px;color:var(--ink-soft);}
  .computed.total{background:var(--primary);color:#fff;border:none;box-shadow:var(--shadow-sm);}
  .computed.total .lbl{color:#e7efe9;}
  .value-pop{display:inline-block;animation:valuePop .38s var(--ease);}
  @keyframes valuePop{0%{transform:scale(1.1);color:var(--accent-deep);}100%{transform:scale(1);}}

  .tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;background:var(--line-soft);color:var(--ink-soft);border-radius:4px;padding:2px 6px;margin-left:6px;}
  mark.search-hit{background:var(--accent-soft);color:var(--accent-deep);padding:0 2px;border-radius:3px;font-weight:700;}
  .locked-day{position:relative;pointer-events:none;opacity:.55;user-select:none;}
  .locked-day::after{content:'\1F512 Locked';position:absolute;top:12px;right:14px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--danger);background:var(--danger-soft);padding:2px 8px;border-radius:5px;}

  .day-tabs{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 8px;margin-bottom:16px;scrollbar-width:thin;}
  .day-tabs::-webkit-scrollbar{height:6px;}
  .day-tabs::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .day-tabs::-webkit-scrollbar-track{background:transparent;}
  .day-tab{flex:none;padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12.5px;white-space:nowrap;color:var(--ink-soft);transition:all .16s var(--ease);}
  .day-tab:hover{border-color:var(--primary);color:var(--primary-dark);transform:translateY(-1px);}
  .day-tab.active{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff;box-shadow:var(--shadow-sm);}

  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;}

<script>
/* Bumped by hand whenever a meaningfully new copy of this file is shipped.

const APP_BUILD = '2026-07-15.1';
const APP_UPDATED_LABEL = 'Jul 15, 2026';

/* ======================================================================
   Chart of Accounts
   ====================================================================== */
const COA = [
  {key:'Trans',   short:'Trans',    label:'Transport',                 desc:'Microbus-related expenses: gas/octane, servicing, parts',                       notesheetLabel:'Transport',                  expensePhrase:'Transport',                     summaryLabel:'Transport Expense'},
  {key:'Tailor',  short:'Tailor',   label:'Tailor',                    desc:'Student uniform / dress making',                                                 notesheetLabel:'Tailor',                     expensePhrase:'Tailor/Uniform',                summaryLabel:'Tailor/Uniform Expense'},

/* Order categories appear in on the Withdraw Summary sheet & notesheet generation pass */
const SUMMARY_ORDER = ['Misc','Trans','Tailor','Utility','BooksSty','Hons','EduAssist','PayAllce','Loan','Event'];

/* ======================================================================

   ====================================================================== */
/* Revenue-side categories - this is a completely separate chart from the

const REVENUE_CATS = [

/* Known expenditure-side label variants seen across the institution's
   past workbooks, for matching when importing an older file (2025

   column appeared in a given slot from month to month). Not tied to a
   fixed position - matched by name wherever it turns up.
   "MT" = Monthly Test (a recurring exam - held 4x/year, plus half-yearly
   and yearly exams) - a real, recurring cost, distinct from Transport,
   even though the two have occupied the same column slot in different
   periods. Construction/demolition-type columns are one-off exceptions
   (only seen Dec 2025 - Jan 2026) and are deliberately NOT in this list -
   those should stay as ad-hoc manual columns added for just that month,
   not something the tool expects to see regularly. */
const EXPENDITURE_LABEL_ALIASES = {
  PayAllce: ['pay & allce','pay and allce'],
  Trans:    ['transport'],
  BooksSty: ['books & sty','books and sty'],
  Misc:     ['misc','miscelleneous','miscellaneous'],
  Tailor:   ['tailor'],
  Utility:  ['utility bill','utility'],
  EduAssist:['education & assistant','education assistant'],
  Event:    ['event'],
  Hons:     ['honorarium','honourarium'],
  Loan:     ['loan','loan paid','loan refunded'],

const RECURRING_EXAM_COLUMN = {label:'MT (Monthly Test)', aliases:['mt','monthly test','half yearly','half-yearly','yearly exam']};
/* Default expenditure columns for a new month - the 8 that map straight
   onto a Daily Ledger CoA category (auto-totalled from that month's
   vouchers) plus Bank Charge, which the Daily Ledger doesn't track as
   its own category. Fully editable per month: add, rename, remove, or
   point any column at a different CoA category (e.g. add a Honourarium
   or Loan column only for a month that actually had one, or add a
   one-off manual column like "Eng Arif Construction"). */
function defaultExpenditureColumns(){
  return [
    {id:uid(), label:'Pay & Allce',            source:'coa', coaKey:'PayAllce'},
    {id:uid(), label:'Transport',              source:'coa', coaKey:'Trans'},
    {id:uid(), label:'Books & Sty',            source:'coa', coaKey:'BooksSty'},
    {id:uid(), label:'Misc',                   source:'coa', coaKey:'Misc'},
    {id:uid(), label:'Tailor',                 source:'coa', coaKey:'Tailor'},
    {id:uid(), label:'Utility Bill',           source:'coa', coaKey:'Utility'},
    {id:uid(), label:'Bank Charge',            source:'manual', amount:0},
    {id:uid(), label:'Education & Assistant',  source:'coa', coaKey:'EduAssist'},
    {id:uid(), label:'Event',                  source:'coa', coaKey:'Event'},
  ];
}
function monthKeyFor(month, year){
  const idx = MONTHS.indexOf(month);
  return idx>=0 ? `${year}-${String(idx+1).padStart(2,'0')}` : null;
}
function monthKeyLabel(key){
  const [y,m] = key.split('-');

}
/* Gets (creating if needed) the persistent record for one month - never
   deleted by Daily Ledger month switches, unlike state.days. */
function getMonthlyLedgerMonth(key){
  if(!state.monthlyLedger.months[key]){
    state.monthlyLedger.months[key] = {
      revenueEntries:[],
      revenueTotalDue:Object.fromEntries(REVENUE_CATS.map(c=>[c.key,0])),
      revenueTransfer:Object.fromEntries(REVENUE_CATS.map(c=>[c.key,0])),
      beginningRevenue:Object.fromEntries(REVENUE_CATS.map(c=>[c.key,0])),
      beginningExpenditure:Object.fromEntries(COA.map(c=>[c.key,0])),
      beginningBankBalance:0,
      expenditureColumns:defaultExpenditureColumns(),
      balanceSheet:{ cashInHandOverride:null, advancePayment:0, debtItems:[],
        bankBalanceOverride:null, bankBreakdown:{},
        otherAsset:{label:'Debt to III Assets Ltd', amount:250000} },
    };
  }
  return state.monthlyLedger.months[key];
}
/* Revenue category totals actually earned in one month (sums entries). */
function monthRevenueTotals(monthRec){
  const totals = Object.fromEntries(REVENUE_CATS.map(c=>[c.key,0]));
  monthRec.revenueEntries.forEach(e=>{ REVENUE_CATS.forEach(c=>{ totals[c.key] += Number(e[c.key])||0; }); });
  return totals;
}
/* "Yearly Running Total from Previous Month": the seed (if any, for
   whatever predates this tool) plus every tracked month of the same
   calendar year strictly before this one, summed live - no separate
   running counter to keep in sync by hand. */
function yearlyRunningTotalBefore(key){
  const [yearStr, monStr] = key.split('-');
  const totals = Object.fromEntries(REVENUE_CATS.map(c=>[c.key,0]));
  const seed = state.monthlyLedger.seed;
  if(seed && seed.year===yearStr) REVENUE_CATS.forEach(c=>{ totals[c.key] += Number(seed.revenue[c.key])||0; });
  Object.keys(state.monthlyLedger.months).forEach(k=>{
    const [ky,km] = k.split('-');
    if(ky===yearStr && Number(km) < Number(monStr)){
      const rec = state.monthlyLedger.months[k];
      const monthTotals = monthRevenueTotals(rec);
      REVENUE_CATS.forEach(c=>{
        totals[c.key] += monthTotals[c.key] + (Number(rec.revenueTransfer[c.key])||0);
      });
    }
  });
  return totals;
}
/* Live per-category totals for the Daily Ledger's CoA vouchers in a
   given month, so 'coa'-sourced Monthly Ledger expenditure columns can
   auto-total without retyping anything. Only works for the month
   currently loaded in the Daily Ledger (state.days) - other months'
   'coa' columns fall back to 0 with a note, since their day-by-day data
   isn't in memory (it's in state.archive, month-scoped, not itemised by
   category there).
   NOTE: relies on the CURRENT Daily Ledger state (state.month/year,
   state.days) matching the requested month - callers should check
   monthKeyFor(state.month, state.year) === key first for an accurate
   result. */
/* Returns the effective (possibly user-overridden) text for a COA
   category field, so Settings-panel edits apply everywhere the field is
   used without touching every call site's data. */
function coaText(cat, field){
  const ov = state.settings && state.settings.coaOverrides && state.settings.coaOverrides[cat.key];
  return (ov && ov[field]!==undefined && ov[field]!=='') ? ov[field] : cat[field];
}
function revenueLabel(catKey){
  const ov = state.settings && state.settings.revenueLabelOverrides;
  return (ov && ov[catKey]) ? ov[catKey] : (REVENUE_CATS.find(c=>c.key===catKey)||{}).label;
}
function currentDailyLedgerCoaTotals(){
  const totals = {};
  COA.forEach(c=>{ totals[c.key] = 0; });
  state.days.forEach(day=>{
    COA.forEach(cat=>{ (day.coa[cat.key]||[]).forEach(item=>{ totals[cat.key] += Number(item.amount)||0; }); });
  });
  return totals;
}
/* Per-category expenditure totals for a given month, pulled from the
   saved Withdraw Notesheet history (state.withdrawNotesheetLog) instead
   of the live Daily Ledger - this is the actual source of truth for
   "what left the bank and which khat it was withdrawn for", and (unlike
   currentDailyLedgerCoaTotals) works for any month, not just whichever
   one is currently loaded in the Daily Ledger. A notesheet run is
   attributed to the month of its End Date. Matched by comparing each
   saved category's label against COA.summaryLabel, the same label the
   notesheet-generation step wrote it with. */
function monthWithdrawCoaTotals(key){
  const totals = {};
  COA.forEach(c=>{ totals[c.key] = 0; });
  (state.withdrawNotesheetLog||[]).forEach(log=>{
    if(!log.endDate) return;
    const [y, m] = log.endDate.split('-');
    const monthName = MONTHS[parseInt(m,10)-1];
    if(monthKeyFor(monthName, y) !== key) return;
    (log.categories||[]).forEach(cat=>{
      const coa = COA.find(c=>coaText(c,'summaryLabel')===cat.label || c.summaryLabel===cat.label);
      if(coa) totals[coa.key] += Number(cat.total)||0;
    });
  });
  return totals;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ======================================================================
   State
   ====================================================================== */
let state = null;
let selectedDayId = null;
let notesheetRange = null; // {start, end} - lazily defaulted to the full recorded month
let notesheetSettingsOpen = false;
let reconDetailOpen = {};
let voucherCounterSettingsOpen = false;
let searchOpen = false;
let searchFilters = { catKey:'', year:'', month:'', fromDate:'', toDate:'', text:'', minAmt:'', maxAmt:'' };
let summaryOpen = false;
let summaryFilters = { catKey:'', mode:'month', year:'', fromDate:'', toDate:'' };
let templatesOpen = false;
let dashboardOpen = false;
let monthlyLedgerOpen = false;
let mlSettingsOpen = false;
let monthlyLedgerMinimized = false;
let monthlyLedgerViewKey = null; // "YYYY-MM" currently being edited/viewed - defaults to state.month/year
let mlBeginningOpen = false;
let locked = false;            // true = show the lock screen instead of the app
let deferredInstallPrompt = null; // captured 'beforeinstallprompt' event, if the browser offers one
let lastUndo = null;      // {label, restore} - the most recent undoable delete
let lastUndoTimer = null;
let duplicateWarning = null;   // string message, or null - shown as a dismissible toast
let duplicateWarningTimer = null; // auto-clears the undo offer after a short window
let passwordFormOpen = false;  // true = show the set/change-password mini form
let dayLockPasswordFormOpen = false; // true = show the set/change day-lock-password mini form
let lockError = '';            // error text shown on a failed unlock attempt

function defaultState(){
  const coaEmpty = {};
  const counters = {};
  COA.forEach(c=>{coaEmpty[c.key]=[]; counters[c.key]=0;});
  const notesheetCounters = {Misc:71, Trans:64, Tailor:38, Utility:59, BooksSty:0, Hons:0, EduAssist:0, PayAllce:0, Loan:0, Event:0};
  return {
    setupDone:false,
    month:'', year:'',
    banks:[],
    voucherCounters:counters,
    notesheetCounters,
    summaryCounterYear:'26',
    summaryCounterNum:13,
    nextDepositNotesheetNo:117,
    signatories:{
      accountant:'Mulham Haider Chowdhury', accountantRole:'Accountant',
      adminManager:'Sgt Helal Uddin Sarker(Retd)', adminManagerRole:'Admin Manager',
      principal:'Brig Gen Md Abu Naser(Retd)', principalRole:'Principal'
    },
    days:[],
    iouRegistry:[],
    payableRegistry:[],
    lockPasswordHash:null,
    dayLockPasswordHash:null,
    archive:[],
    templates:[],
    /* User-editable "data link" and "export formatting" knobs, so small
       fixes (a deposit description that should map to a different
       revenue category, or an export border/row-height that looks off)
       can be corrected directly in the Settings panel - no prompting
       Claude needed, and the fix persists in state from then on. */
    settings:{
      depositRevenueMap:{
        'Tuition Fees & Late Fine': 'tuitionFee',
        'Admission fee & Form': 'admissionFee',
        'Session Fees': 'sessionFee',
        'Muqaddam': 'mqmFee',
        'Books & Sty': 'booksSty',
        'Transport': 'transportFee',
        'Uniform': 'uniform',
        'Event Fee': 'eventFee',
        'Exam Fee': 'misc',
      },
      coaOverrides:{},          // key -> {label?, notesheetLabel?, expensePhrase?, summaryLabel?}
      revenueLabelOverrides:{}, // key -> label
      exportFormat:{
        borderStyle:'thin',        // thin | medium | thick | double
        wordsRowHeight:60,          // Withdraw Summary: taka-in-words row height
        sigRowHeight:50,            // signature block row height

    /* Monthly Ledger (Revenue/Expenditure/Balance Sheet workbook) - keyed
       by "YYYY-MM" so it persists independently of state.days, which
       resets/archives whenever the Daily Ledger's active month changes.
       `seed` is a one-time manual/imported starting point for the
       Yearly Running Total columns, covering whatever months predate
       this tool being used (before that, everything is derived live by
       summing each tracked month's revenue entries for the same year). */
    monthlyLedger:{ months:{}, seed:null },
    /* Uploaded bank statements, keyed by bank id. Each holds the parsed

}
function newDay(dateStr){
  const coaEmpty = {};
  COA.forEach(c=>{coaEmpty[c.key]=[];});
  return {

function uid(){ return Math.random().toString(36).slice(2,10); }
function todayDateStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function ordinal(n){ const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function dayLabel(dateStr){
  if(!dateStr) return 'Untitled day';
  const d = new Date(dateStr+'T00:00:00');
  return ordinal(d.getDate())+' '+MONTHS[d.getMonth()].slice(0,3);
}
function dayLabelFull(dateStr){
  const d = new Date(dateStr+'T00:00:00');

}
function money(n){
  n = Number(n)||0;
  const neg = n<0;
  const abs = Math.abs(n).toLocaleString('en-IN',{maximumFractionDigits:2});
  return (neg?'(':'')+abs+(neg?')':'');
}

/* --- Asian/Indian comma grouping (12,34,567 instead of 1,234,567) for the
   amount input boxes themselves, formatted live as the person types. --- */
function asianGroupDigits(intDigits){
  if(intDigits.length<=3) return intDigits;
  const lastThree = intDigits.slice(-3);
  let other = intDigits.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  return other + ',' + lastThree;
}
function formatAsianAmount(value){
  if(value===''||value===null||value===undefined) return '';
  const s = String(value);
  const neg = s.trim().startsWith('-');
  const cleaned = s.replace(/[^0-9.]/g,'');
  if(cleaned===''||cleaned==='.') return '';
  const dotIdx = cleaned.indexOf('.');
  let intPart = dotIdx===-1 ? cleaned : cleaned.slice(0,dotIdx);
  let decPart = dotIdx===-1 ? '' : cleaned.slice(dotIdx);
  intPart = intPart.replace(/^0+(?=\d)/,'');
  if(intPart==='') intPart='0';
  return (neg?'-':'') + asianGroupDigits(intPart) + decPart;
}
function parseAmountInput(displayValue){
  const num = parseFloat(String(displayValue||'').replace(/,/g,''));
  return isNaN(num) ? 0 : num;
}
/* Lets someone type a quick sum right into an amount box, e.g. "1500-500"
   resolves to 1000 the moment they leave the field (blur/Enter) - handy
   for things like "IOU was 1500, 500 came back, net 1000" without needing
   a calculator on the side. Only digits, spaces, a decimal point, and
   + - * / ( ) are ever accepted; anything else is stripped as typed. */
function looksLikePlainNumber(s){ return /^-?\d*\.?\d*$/.test(s); }
function evalAmountExpression(expr){
  const cleaned = String(expr||'').replace(/,/g,'').trim();
  if(!cleaned) return null;
  if(!/^[\d\s+\-*/().]+$/.test(cleaned)) return null; // reject anything not a plain arithmetic expression
  if(!/\d/.test(cleaned)) return null; // must contain at least one digit
  try{
    const result = Function('"use strict"; return (' + cleaned + ')')();
    return (typeof result==='number' && isFinite(result)) ? result : null;
  }catch(e){ return null; }
}
function resolveAmountField(inputEl, onChange, fallbackValue){
  const raw = inputEl.value.replace(/,/g,'').trim();
  if(raw===''){ inputEl.value=''; onChange(0); return; }
  if(looksLikePlainNumber(raw)) return; // already a plain number - nothing to resolve
  const result = evalAmountExpression(raw);
  if(result===null){
    const m = raw.match(/^-?\d+(\.\d+)?/);
    const num = m ? parseFloat(m[0]) : (fallbackValue||0);
    inputEl.value = formatAsianAmount(num);
    onChange(num);
    return;
  }
  inputEl.value = formatAsianAmount(result);
  onChange(result);
}
/* Wires a text input to live-format with Asian comma grouping as the
   person types a plain number, preserving caret position, and reports
   the parsed numeric value back via onChange on every edit. If what's
   typed looks like an arithmetic expression instead (has a +, *, /, or a
   non-leading -), it's left as raw text while typing and only resolved
   into a final number on blur or Enter. */
function wireAmountInput(inputEl, onChange, onPlainEnter){
  const fallbackValue = parseAmountInput(inputEl.value);
  inputEl.addEventListener('input', ()=>{
    const raw = inputEl.value.replace(/,/g,'');
    if(looksLikePlainNumber(raw)){
      const digitsBeforeCursor = inputEl.value.slice(0, inputEl.selectionStart).replace(/[^0-9.]/g,'').length;
      let clean = raw.replace(/[^0-9.]/g,'');
      const firstDot = clean.indexOf('.');
      if(firstDot!==-1){ clean = clean.slice(0,firstDot+1) + clean.slice(firstDot+1).replace(/\./g,''); }
      const num = (clean===''||clean==='.') ? 0 : parseFloat(clean);
      const formatted = formatAsianAmount(clean);
      inputEl.value = formatted;
      let seen = 0, pos = 0;
      for(; pos<formatted.length; pos++){
        if(/[0-9.]/.test(formatted[pos])) seen++;
        if(seen>=digitsBeforeCursor){ pos++; break; }
      }
      inputEl.setSelectionRange(pos, pos);
      onChange(isNaN(num)?0:num);
    } else {
      const pos = inputEl.selectionStart;
      const sanitized = inputEl.value.replace(/[^0-9+\-*/(). ]/g,'');
      if(sanitized !== inputEl.value){
        inputEl.value = sanitized;
        inputEl.setSelectionRange(pos, pos);
      }
      // a math expression is mid-typing - wait for blur/Enter to resolve it
    }
  });
  inputEl.addEventListener('blur', ()=>{ resolveAmountField(inputEl, onChange, fallbackValue); });
  inputEl.addEventListener('keydown', (e)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      /* If this Enter still has an unresolved expression (e.g. "1500-500"),
         use it just to resolve/compute the result - don't also treat it as
         "move to a new line" yet. A second Enter, once the box already
         shows a plain resolved number, is what actually advances. This
         stops "compute the total" and "start a new entry" from colliding
         on the same keypress. */
      const rawBefore = inputEl.value.replace(/,/g,'').trim();
      const wasAlreadyPlain = looksLikePlainNumber(rawBefore) && rawBefore!=='';
      resolveAmountField(inputEl, onChange, fallbackValue);
      if(wasAlreadyPlain){
        inputEl.blur();
        if(onPlainEnter) onPlainEnter();
      }
      // else: expression just got resolved into a plain number and stays
      // focused/selected so the very next Enter (on the now-plain value)
      // can advance, without having silently skipped a line in between.
      else { inputEl.select(); }
    }
  });
}

/* --- Soft-delete / Undo -------------------------------------------------
   Every delete action calls pushUndo() with a closure that restores
   exactly what was removed. A small toast offers "Undo" for a short
   window (10s) or until another delete replaces it. */
function pushUndo(label, restoreFn){
  lastUndo = {label, restore: restoreFn};
  if(lastUndoTimer) clearTimeout(lastUndoTimer);
  lastUndoTimer = setTimeout(()=>{ lastUndo = null; render(); }, 10000);
}
function performUndo(){
  if(!lastUndo) return;
  lastUndo.restore();
  if(lastUndoTimer) clearTimeout(lastUndoTimer);
  lastUndo = null;
  saveState();
  render();
}

/* --- Duplicate-amount warning ------------------------------------------
   A gentle heads-up (not a block) when the same amount shows up more than
   once in the same day - catches accidental double entry without getting
   in the way of legitimate repeats (e.g. two genuinely equal payments). */
function checkDuplicateAmount(day, amount, excludeItemId){
  if(!amount || amount<=0) return null;
  const matches = [];
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(it=>{
      if(it.id!==excludeItemId && Number(it.amount)===Number(amount)){
        matches.push({label: cat.label, desc: it.desc||'', voucher: it.voucher});
      }
    });
  });
  if(matches.length===0) return null;
  const m = matches[0];
  const where = m.desc ? `"${m.desc}" (${m.label}, ${m.voucher})` : `${m.label} (${m.voucher})`;
  return `Heads up: ${formatAsianAmount(amount)} was already entered today under ${where}${matches.length>1?` and ${matches.length-1} more`:''}. Might be a duplicate - or just two genuine entries.`;
}
function showDuplicateWarning(message){
  duplicateWarning = message;
  if(duplicateWarningTimer) clearTimeout(duplicateWarningTimer);
  duplicateWarningTimer = setTimeout(()=>{ duplicateWarning = null; render(); }, 7000);
  render();
}
function renderDuplicateWarningToast(){
  return el(`
    <div style="position:fixed;left:50%;bottom:${lastUndo?'78px':'22px'};transform:translateX(-50%);background:#7A5B12;color:#fff;padding:10px 16px;border-radius:10px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:14px;z-index:500;font-size:13px;animation:modalIn .25s var(--ease);max-width:92vw;">
      <span>&#9888; ${escapeHtml(duplicateWarning)}</span>

    </div>
  `);
}

/* Every day ever recorded, current month + everything archived by past
   "Refresh - new month" clears, so Search and Category Summary can see
   the full history rather than just what's currently loaded. */
function allDaysEverywhere(){
  const archived = (state.archive||[]).flatMap(m=>m.days||[]);
  return archived.concat(state.days);
}

/* Flattens every Cash Disbursed (CoA) voucher across every recorded day
   into one list of {date, cat, voucher, desc, amount}, for Search and
   Category Summary to filter and group. */
function allVouchers(){
  const out = [];
  allDaysEverywhere().forEach(day=>{
    COA.forEach(cat=>{
      (day.coa[cat.key]||[]).forEach(item=>{
        const amt = Number(item.amount)||0;
        if(amt>0) out.push({date:day.date, cat, catKey:cat.key, voucher:item.voucher, desc:item.desc||'', note:item.note||'', amount:amt});
      });
    });
  });
  out.sort((a,b)=>a.date.localeCompare(b.date));
  return out;
}
function voucherYearsPresent(){
  const years = new Set(allVouchers().map(v=>v.date.slice(0,4)));
  return Array.from(years).sort().reverse();
}
function filteredVouchers(f){
  return allVouchers().filter(v=>{
    if(f.catKey && v.catKey!==f.catKey) return false;
    if(f.year && v.date.slice(0,4)!==f.year) return false;
    if(f.month && v.date.slice(5,7)!==f.month) return false;
    if(f.fromDate && v.date<f.fromDate) return false;
    if(f.toDate && v.date>f.toDate) return false;
    if(f.text){
      const q = f.text.toLowerCase();
      if(!v.desc.toLowerCase().includes(q) && !v.voucher.toLowerCase().includes(q) && !(v.note||'').toLowerCase().includes(q)) return false;
    }
    if(f.minAmt!=='' && f.minAmt!==undefined && v.amount<Number(f.minAmt)) return false;
    if(f.maxAmt!=='' && f.maxAmt!==undefined && v.amount>Number(f.maxAmt)) return false;
    return true;
  });
}
function groupSum(vouchers, keyFn, labelFn){
  const map = new Map();
  vouchers.forEach(v=>{
    const k = keyFn(v);
    map.set(k, (map.get(k)||0) + v.amount);
  });
  return Array.from(map.entries())
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([k,total])=>({key:k, label:labelFn?labelFn(k):k, total}));
}

/* --- Simple password lock screen -------------------------------------
   This only gates the on-screen view; the underlying data in browser
   storage is NOT encrypted, so it isn't real protection against someone
   who opens dev tools - it's a screen lock, not a vault. We hash the
   password (SHA-256) rather than store it in plain text, purely so it
   isn't sitting in the open in state. */
async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function addDaysStr(dateStr, delta){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+delta);
  return d.toISOString().slice(0,10);
}
/* An IOU carries forward automatically from the day it's added until it's
   removed - "removed" just closes off its toDate so it stops appearing on
   later days, without touching the days it already appeared on. */
function activeIousForDay(dateStr){
  return state.iouRegistry.filter(r => r.fromDate<=dateStr && (r.toDate===null || dateStr<=r.toDate));
}
/* Payables are the reverse of an IOU: money the institution owes a
   person (e.g. they fronted more than their advance covered). Tracked
   separately so it's visible and doesn't get forgotten, but - unlike an
   IOU - it is NOT subtracted from cash in hand, since it isn't cash
   currently held; it's a future obligation to pay out. */
function activePayablesForDay(dateStr){
  return state.payableRegistry.filter(r => r.fromDate<=dateStr && (r.toDate===null || dateStr<=r.toDate));
}

/* Bangladeshi (Indian numbering: Crore/Lakh/Thousand) taka-in-words formatter */
const NUM_ONES = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
  'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const NUM_TENS = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function twoDigitWords(n){
  if(n<20) return NUM_ONES[n];
  const t=Math.floor(n/10), o=n%10;
  return NUM_TENS[t] + (o? ' '+NUM_ONES[o] : '');
}
function threeDigitWords(n){
  const h=Math.floor(n/100), r=n%100;
  const parts=[];
  if(h) parts.push(NUM_ONES[h]+' Hundred');
  if(r) parts.push(twoDigitWords(r));
  return parts.join(' ');
}
function takaInWords(amount){
  let n = Math.round(Number(amount)||0);
  if(n===0) return 'Zero Taka Only';
  const neg = n<0; n = Math.abs(n);
  const crore = Math.floor(n/10000000); n%=10000000;
  const lakh = Math.floor(n/100000); n%=100000;
  const thousand = Math.floor(n/1000); n%=1000;
  const rest = n;
  const parts=[];
  if(crore) parts.push(threeDigitWords(crore)+' Crore');
  if(lakh) parts.push(twoDigitWords(lakh)+' Lakh');
  if(thousand) parts.push(twoDigitWords(thousand)+' Thousand');
  if(rest) parts.push(threeDigitWords(rest));
  return (neg?'Minus ':'')+parts.join(' ')+' Taka Only';
}
function monthYearAbbr(){
  return (state.month||'').slice(0,3)+' '+String(state.year||'').slice(-2);
}

/* ======================================================================
   Notesheet / Withdraw Summary generation
   Gathers every CoA voucher across a chosen date range, grouped by
   category (skipping categories with no expense in that range), so it
   can be exported as one notesheet per category plus a Withdraw Summary,
   in the same voucher-code, date-range and signature-block style used in
   Rafsan's existing hand-built notesheets.
   ====================================================================== */
function collectNotesheetRange(startDate, endDate){
  const days = state.days.filter(d=>d.date>=startDate && d.date<=endDate).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const cats = [];
  SUMMARY_ORDER.forEach(key=>{
    const cat = COA.find(c=>c.key===key);
    const items = [];
    days.forEach(day=>{
      (day.coa[key]||[]).forEach(it=>{
        const amt = Number(it.amount)||0;
        if(amt>0){ items.push({voucher:it.voucher, desc:it.desc||cat.label, amount:amt, date:day.date}); }
      });
    });
    if(items.length===0) return;
    const total = items.reduce((s,it)=>s+it.amount,0);
    cats.push({key, cat, items, total, firstDate:items[0].date, lastDate:items[items.length-1].date});
  });
  const grandTotal = cats.reduce((s,c)=>s+c.total,0);
  return {cats, grandTotal};
}

   Storage
   ====================================================================== */
/* window.storage only exists inside Claude.ai. When this file is opened
   directly in a browser (downloaded, double-clicked, or self-hosted),
   window.storage isn't there at all, so we fall back to the browser's own
   localStorage - which works fine in a normal tab - so data still
   survives reloads. Claude.ai is always tried first so nothing changes
   for artifact use. */
const LOCAL_STORAGE_KEY = 'daily_cash_bank_ledger_state_v1';

/* --- File System Access API: optional direct-to-disk auto-save ---------
   Chrome/Edge only (Firefox/Safari don't implement it - the feature just
   hides itself there and window.storage/localStorage remain the only
   record). Lets the person link this tool to one real file on their
   computer; every change then writes straight to that file, so the data
   survives PC restarts and isn't tied to any one browser profile. The
   FileSystemFileHandle itself is remembered in IndexedDB (localStorage
   can't hold a handle object) so we can try to silently reconnect on the
   next page load - though the browser may still require a fresh click to
   re-grant permission, by design. */
let fsFileHandle = null;
let fsFileName = '';
function fsApiSupported(){
  return typeof window!=='undefined' && typeof window.showOpenFilePicker==='function' && typeof window.showSaveFilePicker==='function';
}
function idbGet(key){
  return new Promise((resolve)=>{
    try{
      const req = indexedDB.open('ledger-fs-links', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readonly');
        const g = tx.objectStore('handles').get(key);
        g.onsuccess = ()=>resolve(g.result||null);
        g.onerror = ()=>resolve(null);
      };
      req.onerror = ()=>resolve(null);
    }catch(e){ resolve(null); }
  });
}
function idbSet(key, value){
  return new Promise((resolve)=>{
    try{
      const req = indexedDB.open('ledger-fs-links', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readwrite');
        tx.objectStore('handles').put(value, key);
        tx.oncomplete = ()=>resolve(true);
        tx.onerror = ()=>resolve(false);
      };
      req.onerror = ()=>resolve(false);
    }catch(e){ resolve(false); }
  });
}
function idbDelete(key){
  return new Promise((resolve)=>{
    try{
      const req = indexedDB.open('ledger-fs-links', 1);
      req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readwrite');
        tx.objectStore('handles').delete(key);
        tx.oncomplete = ()=>resolve(true);
        tx.onerror = ()=>resolve(false);
      };
      req.onerror = ()=>resolve(false);
    }catch(e){ resolve(false); }
  });
}
async function writeStateToConnectedFile(){
  if(!fsFileHandle) return;
  try{
    const perm = await fsFileHandle.queryPermission({mode:'readwrite'});
    if(perm!=='granted') return; // don't block saving elsewhere; UI offers "Reconnect"
    const writable = await fsFileHandle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
  }catch(e){ /* disk write failed - window.storage/localStorage still has the data */ }
}
async function connectToFile(){
  if(!fsApiSupported()){
    showAlert("This browser can't connect directly to a file (needs Chrome or Edge). Use Export/Import backup instead.");
    return;
  }
  let handle;
  try{
    [handle] = await window.showOpenFilePicker({
      types:[{description:'Ledger backup', accept:{'application/json':['.json']}}]
    });
  }catch(e){
    return; // person cancelled the picker
  }
  try{
    const perm = await handle.requestPermission({mode:'readwrite'});
    if(perm!=='granted'){ showAlert('Permission to read/write that file was not granted.'); return; }
    const file = await handle.getFile();
    const text = await file.text();
    if(text && text.trim()){
      let parsed;
      try{ parsed = JSON.parse(text); }catch(e){ parsed = null; }
      if(!parsed || typeof parsed!=='object' || !Array.isArray(parsed.days)){
        showAlert("That file isn't a ledger backup. Pick an empty/new file, or one exported from this tool.");
        return;
      }
      showConfirm(`"${handle.name}" already has ledger data in it. Load that data now (replacing what's currently shown here)?`, async ()=>{
        state = parsed;
        migrateState();
        selectedDayId = null;
        locked = !!state.lockPasswordHash;
        fsFileHandle = handle; fsFileName = handle.name;
        await idbSet('lastHandle', handle);
        await saveState();
        render();
      }, 'Load from file');
    } else {
      fsFileHandle = handle; fsFileName = handle.name;
      await idbSet('lastHandle', handle);
      await writeStateToConnectedFile();
      render();
    }
  }catch(e){ showAlert('Could not connect to that file.'); }
}
async function createNewFile(){
  if(!fsApiSupported()){
    showAlert("This browser can't connect directly to a file (needs Chrome or Edge). Use Export/Import backup instead.");
    return;
  }
  let handle;
  try{
    handle = await window.showSaveFilePicker({
      suggestedName: (state.month&&state.year?`Ledger_${state.month}${state.year}`:'Ledger_Data')+'.json',
      types:[{description:'Ledger backup', accept:{'application/json':['.json']}}]
    });
  }catch(e){
    return; // person cancelled the picker
  }
  try{
    const perm = await handle.requestPermission({mode:'readwrite'});
    if(perm!=='granted'){ showAlert('Permission to write that file was not granted.'); return; }
    fsFileHandle = handle; fsFileName = handle.name;
    await idbSet('lastHandle', handle);
    await writeStateToConnectedFile();
    render();
  }catch(e){ showAlert('Could not create that file.'); }
}
async function disconnectFile(){
  fsFileHandle = null;
  fsFileName = '';
  await idbDelete('lastHandle');
  render();
}
async function tryReconnectFile(){
  if(!fsApiSupported()) return;
  const handle = await idbGet('lastHandle');
  if(!handle) return;
  try{
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm==='granted'){ fsFileHandle = handle; fsFileName = handle.name; }
    // if not granted, leave fsFileHandle null - the header offers a
    // "Reconnect" button, since browsers require a fresh click to re-grant
  }catch(e){ /* handle may be stale (file moved/deleted) */ }
}

async function saveState(){
  const json = JSON.stringify(state);
  let savedToCloud = false;
  try{
    const res = await window.storage.set('state', json);
    if(res) savedToCloud = true;
  }catch(e){ /* window.storage not available here */ }
  if(!savedToCloud){
    try{ localStorage.setItem(LOCAL_STORAGE_KEY, json); }
    catch(e){ /* localStorage blocked too (e.g. private browsing) */ }
  }
  writeStateToConnectedFile();
}
function migrateState(){
  const d = defaultState();
  if(!state.notesheetCounters) state.notesheetCounters = d.notesheetCounters;
  else COA.forEach(c=>{ if(!(c.key in state.notesheetCounters)) state.notesheetCounters[c.key] = 0; });
  if(state.summaryCounterYear===undefined) state.summaryCounterYear = d.summaryCounterYear;
  if(state.summaryCounterNum===undefined) state.summaryCounterNum = d.summaryCounterNum;
  if(!state.signatories) state.signatories = d.signatories;
  if(!state.iouRegistry){
    /* Older saves kept IOUs as a plain per-day list with no carry-forward.
       Bring each of those in as a single-day entry so historical Cash In
       Hand figures for already-recorded days don't silently change. */
    state.iouRegistry = [];
    (state.days||[]).forEach(day=>{
      (day.ious||[]).forEach(i=>{
        state.iouRegistry.push({id:i.id||uid(), desc:i.desc, amount:i.amount, fromDate:day.date, toDate:day.date});
      });
      delete day.ious;
    });
  }
  (state.days||[]).forEach(day=>{ if(!day.bankTransfers) day.bankTransfers = []; });
  (state.days||[]).forEach(day=>{ ensureMiscCollectionSections(day); });
  (state.archive||[]).forEach(m=>{ (m.days||[]).forEach(day=>{ ensureMiscCollectionSections(day); }); });
  if(state.lockPasswordHash===undefined) state.lockPasswordHash = null;
  if(state.dayLockPasswordHash===undefined) state.dayLockPasswordHash = null;
  if(state.payableRegistry===undefined) state.payableRegistry = [];
  if(state.monthlyLedger===undefined) state.monthlyLedger = { months:{}, seed:null };
  if(state.settings===undefined) state.settings = defaultState().settings;
  if(state.settings.depositRevenueMap===undefined) state.settings.depositRevenueMap = defaultState().settings.depositRevenueMap;
  if(state.settings.exportFormat===undefined) state.settings.exportFormat = defaultState().settings.exportFormat;
  if(state.settings.coaOverrides===undefined) state.settings.coaOverrides = {};
  if(state.settings.revenueLabelOverrides===undefined) state.settings.revenueLabelOverrides = {};
  if(!state.archive) state.archive = [];
  if(!state.templates) state.templates = [];
  if(!state.bankStatements) state.bankStatements = {};
  Object.values((state.monthlyLedger&&state.monthlyLedger.months)||{}).forEach(rec=>{
    if(!rec.balanceSheet) rec.balanceSheet = { cashInHandOverride:null, advancePayment:0, debtItems:[] };
    if(rec.balanceSheet.bankBalanceOverride===undefined) rec.balanceSheet.bankBalanceOverride = null;
    if(rec.balanceSheet.bankBreakdown===undefined) rec.balanceSheet.bankBreakdown = {};
    if(rec.balanceSheet.otherAsset===undefined) rec.balanceSheet.otherAsset = {label:'Debt to III Assets Ltd', amount:250000};
    if(!rec.beginningRevenue) rec.beginningRevenue = Object.fromEntries(REVENUE_CATS.map(c=>[c.key,0]));
    if(!rec.beginningExpenditure) rec.beginningExpenditure = Object.fromEntries(COA.map(c=>[c.key,0]));
  });
  (state.days||[]).forEach(day=>{ if(day.locked===undefined) day.locked = false; });
  const stampStatus = (day)=>{
    COA.forEach(cat=>{ (day.coa[cat.key]||[]).forEach(it=>{ if(it.status===undefined) it.status = 'draft'; }); });
  };
  (state.days||[]).forEach(stampStatus);
  (state.archive||[]).forEach(m=>{ (m.days||[]).forEach(stampStatus); });
}
async function loadState(){
  try{
    const res = await window.storage.get('state');
    if(res && res.value){ state = JSON.parse(res.value); migrateState(); return; }
  }catch(e){ /* window.storage not available here */ }
  try{
    const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
    if(raw){ state = JSON.parse(raw); migrateState(); return; }
  }catch(e){ /* localStorage not available either */ }
  state = defaultState();
}

/* --- Portable JSON backup ---------------------------------------------
   window.storage and localStorage are both tied to one Claude.ai chat or
   one browser/file location. A downloaded backup file is the only copy
   that survives a deleted chat, a different browser, or a different
   computer - the person carries it themselves and re-imports it wherever
   they open this tool next. */
function exportBackupJson(){
  const label = (state.month && state.year) ? `${state.month}${state.year}` : 'backup';
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Ledger_Backup_${label}_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importBackupJson(file){
  showConfirm('Importing a backup replaces all data currently in this ledger (in this browser/chat) with what\'s in the file. Continue?', ()=>{
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed || typeof parsed!=='object' || !Array.isArray(parsed.days)){ throw new Error('not a ledger backup'); }
        state = parsed;
        migrateState();
        selectedDayId = null;
        notesheetRange = null;
        locked = !!state.lockPasswordHash;
        await saveState();
        render();
        showAlert('Backup imported successfully.');
      }catch(e){
        showAlert('That file could not be read as a valid Daily Cash & Bank Ledger backup.');
      }
    };
    reader.readAsText(file);
  }, 'Import & replace');
}

/* ======================================================================
   Computation engine (single source of truth for every number shown
   on screen AND every number written into the exported spreadsheets)
   ====================================================================== */
function computeAll(){
  const results = {};
  let prevCash = null;
  let prevBankClose = {};
  state.banks.forEach(b=>{ prevBankClose[b.id] = b.opening||0; });

  state.days.forEach((day, idx)=>{
    const openingCash = idx===0 ? (Number(day.openingCashManual)||0) : prevCash;
    const withdrawTotal = day.withdrawals.reduce((s,w)=>s+(Number(w.amount)||0),0);
    const cashCollected = (Number(day.serviceRevenue)||0) + (Number(day.miscCollection)||0) + withdrawTotal;
    const totalAmountCash = openingCash + cashCollected;

    let coaTotal = 0;
    const coaTotals = {};
    COA.forEach(c=>{
      const t = (day.coa[c.key]||[]).reduce((s,l)=>s+(Number(l.amount)||0),0);
      coaTotals[c.key]=t; coaTotal += t;
    });
    const depositTotal = day.deposits.reduce((s,d)=>s+(Number(d.amount)||0),0);
    const totalCashDisbursed = coaTotal + depositTotal;
    const closingAmount = totalAmountCash - totalCashDisbursed;
    const iouTotal = activeIousForDay(day.date).reduce((s,i)=>s+(Number(i.amount)||0),0);
    const cashInHand = closingAmount - iouTotal;

    const banks = {};
    state.banks.forEach(b=>{
      const bd = day.banksDaily[b.id] || {sslDeposit:0,fees:0,salaryAccount:0,salaryCash:0};
      const opening = prevBankClose[b.id];
      const transferIn = day.deposits.filter(d=>d.bankId===b.id).reduce((s,d)=>s+(Number(d.amount)||0),0);
      const transferOut = day.withdrawals.filter(w=>w.bankId===b.id).reduce((s,w)=>s+(Number(w.amount)||0),0);
      const bankXfers = (day.bankTransfers||[]).filter(t=>t.fromBankId!==t.toBankId);
      const bankXferIn = bankXfers.filter(t=>t.toBankId===b.id).reduce((s,t)=>s+(Number(t.amount)||0),0);
      const bankXferOut = bankXfers.filter(t=>t.fromBankId===b.id).reduce((s,t)=>s+(Number(t.amount)||0),0);
      const totalIn = opening + (Number(bd.sslDeposit)||0) + transferIn + bankXferIn;
      const totalOut = (Number(bd.fees)||0) + (Number(bd.salaryAccount)||0) + (Number(bd.salaryCash)||0) + transferOut + bankXferOut;
      const closing = totalIn - totalOut;
      banks[b.id] = {opening, sslDeposit:Number(bd.sslDeposit)||0, transferIn, bankXferIn, totalIn,
                      fees:Number(bd.fees)||0, salaryAccount:Number(bd.salaryAccount)||0, salaryCash:Number(bd.salaryCash)||0,
                      transferOut, bankXferOut, totalOut, closing};
      prevBankClose[b.id] = closing;
    });

    const grandTotal = closingAmount + Object.values(banks).reduce((s,b)=>s+b.closing,0);

    results[day.id] = {openingCash, withdrawTotal, cashCollected, totalAmountCash, coaTotals, coaTotal,
                        depositTotal, totalCashDisbursed, closingAmount, iouTotal, cashInHand, banks, grandTotal};
    prevCash = closingAmount;
  });
  return results;
}

/* ======================================================================
   Small DOM helper
   ====================================================================== */
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }

/* Description/note boxes: if a box already has text, it opens locked
   (read-only) so a stray click while scrolling/selecting can't nudge the
   wording - double-click to actually edit it. An empty box stays open
   for typing right away, no double-click needed. Re-locks on blur once
   there's text in it again. */
/* Adds a show/hide "eye" toggle button to a <input type="password">,
   wrapping it in a positioned container so the button sits inside
   the field on the right - lets the user confirm what they typed. */
function wirePasswordToggle(inputEl){
  if(!inputEl || inputEl.dataset.pwToggled) return;
  inputEl.dataset.pwToggled = '1';
  const wrap = document.createElement('div');
  wrap.className = 'pw-wrap';
  inputEl.parentNode.insertBefore(wrap, inputEl);
  wrap.appendChild(inputEl);
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'pw-toggle-btn';
  btn.textContent = '\u{1F441}';
  btn.title = 'Show/hide password';
  btn.tabIndex = -1;
  btn.onmousedown = (e)=> e.preventDefault(); // don't steal focus from the input
  btn.onclick = ()=>{
    inputEl.type = inputEl.type==='password' ? 'text' : 'password';
    btn.textContent = inputEl.type==='password' ? '\u{1F441}' : '\u{1F576}';
  };
  wrap.appendChild(btn);
}

function wireLockableTextInput(inputEl){
  const syncLock = ()=>{
    const hasText = !!inputEl.value.trim();
    inputEl.readOnly = hasText;
    inputEl.title = hasText ? 'Double-click to edit' : '';
    inputEl.classList.toggle('locked-text', hasText);
  };
  syncLock();
  // Unlock on the *mousedown* of a double/triple click (before the browser
  // applies its native selection for that click), so the field is already
  // editable when selection happens. This lets native behavior take over:
  // double-click selects the word under the cursor, triple-click selects
  // the whole field's text.
  inputEl.addEventListener('mousedown', (e)=>{
    if(e.detail >= 2 && inputEl.readOnly){
      inputEl.readOnly = false;
      inputEl.classList.remove('locked-text');
      inputEl.title = '';
    }
  });
  inputEl.addEventListener('blur', syncLock);
}
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
/* Wraps every case-insensitive occurrence of query in <mark>, escaping
   everything safely (matching is done on the raw text, then each segment
   is escaped separately, so this never breaks on &, <, > etc. in text). */
function highlightMatches(text, query){
  const raw = (text||'').toString();
  if(!query) return escapeHtml(raw);
  const q = query.toLowerCase();
  const lower = raw.toLowerCase();
  let out = '', i = 0;
  while(i < raw.length){
    const idx = lower.indexOf(q, i);
    if(idx===-1){ out += escapeHtml(raw.slice(i)); break; }
    out += escapeHtml(raw.slice(i, idx));
    out += '<mark class="search-hit">' + escapeHtml(raw.slice(idx, idx+q.length)) + '</mark>';
    i = idx + q.length;
  }
  return out;
}

/* Closes a modal overlay on backdrop click - but only a genuine click.
   Selecting text inside the box (e.g. dragging right-to-left over a
   description field) can end the drag with the mouse outside the box,
   which used to look like a backdrop click and closed the modal
   mid-selection. Requiring mousedown AND mouseup to both land on the
   backdrop itself fixes that without losing click-outside-to-close. */
function wireBackdropClose(overlay){
  let downOnBackdrop = false;
  overlay.addEventListener('mousedown', (e)=>{ downOnBackdrop = (e.target===overlay); });
  overlay.addEventListener('mouseup', (e)=>{
    if(downOnBackdrop && e.target===overlay) overlay.remove();
    downOnBackdrop = false;
  });
}

/* Moves a voucher that was entered under the wrong category to the
   correct one. Gets a fresh voucher number in the destination category
   (so its code always matches where it's actually filed) but keeps the
   description, amount and review status. */
function showMoveVoucherModal(day, fromCatKey, item){
  const fromLabel = COA.find(c=>c.key===fromCatKey).label;
  const catOptions = COA.filter(c=>c.key!==fromCatKey).map(c=>`<option value="${c.key}">${escapeHtml(c.label)}</option>`).join('');
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal-box">
        <p><strong>Move voucher</strong><br>
        <span style="color:var(--ink-soft);font-size:12.5px;">${escapeHtml(item.voucher)} &mdash; ${escapeHtml(item.desc||'(no description)')} &mdash; ${money(item.amount)}<br>Currently under: ${escapeHtml(fromLabel)}</span></p>
        <label style="font-size:12.5px;color:var(--ink-soft);">Move to</label>
        <select id="move-cat-select" style="margin:2px 0 10px;">
          <option value="" selected>-- Select a category --</option>
          ${catOptions}
        </select>
        <div id="move-error" style="color:var(--danger); font-size:12.5px; margin:-2px 0 8px; min-height:1em;"></div>
        <div class="modal-actions">
          <button class="secondary" type="button">Cancel</button>
          <button class="danger" type="button">Move</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  const catSelect = overlay.querySelector('#move-cat-select');
  const errBox = overlay.querySelector('#move-error');
  const buttons = overlay.querySelectorAll('.modal-actions button');
  const cancelBtn = buttons[0], confirmBtn = buttons[1];
  const doMove = ()=>{
    const toCatKey = catSelect.value;
    if(!toCatKey){ errBox.textContent = 'Select a destination category.'; catSelect.focus(); return; }
    day.coa[fromCatKey] = day.coa[fromCatKey].filter(x=>x.id!==item.id);
    const newVoucher = addCoaVoucher(day, toCatKey);
    newVoucher.desc = item.desc;
    newVoucher.amount = item.amount;
    newVoucher.status = item.status;
    pushUndo(`Voucher moved to ${COA.find(c=>c.key===toCatKey).label} - undone.`, ()=>{
      day.coa[toCatKey] = day.coa[toCatKey].filter(x=>x.id!==newVoucher.id);
      day.coa[fromCatKey].push(item);
    });
    saveState();
    overlay.remove();
    render();
  };
  confirmBtn.onclick = doMove;
  cancelBtn.onclick = ()=> overlay.remove();
  wireBackdropClose(overlay);
  setTimeout(()=>catSelect.focus(), 30);
}

/* Native confirm()/alert() are often blocked inside a sandboxed artifact
   iframe (they silently no-op). These custom modals work everywhere. */
function showModal({message, confirmText='OK', cancelText=null, danger=false, onConfirm, onCancel}){
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal-box">
        <p>${escapeHtml(message)}</p>
        <div class="modal-actions">
          ${cancelText ? `<button class="secondary" type="button">${escapeHtml(cancelText)}</button>` : ''}
          <button class="${danger?'danger':''}" type="button">${escapeHtml(confirmText)}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);
  const buttons = overlay.querySelectorAll('.modal-actions button');
  const confirmBtn = buttons[buttons.length-1];
  const cancelBtn = buttons.length>1 ? buttons[0] : null;
  confirmBtn.onclick = ()=>{ overlay.remove(); if(onConfirm) onConfirm(); };
  if(cancelBtn) cancelBtn.onclick = ()=>{ overlay.remove(); if(onCancel) onCancel(); };
  wireBackdropClose(overlay);
}
function showAlert(message){ showModal({message, confirmText:'OK'}); }

/* Prints every Cash Disbursed voucher for the day, one after another,

function printAllVouchersForDay(day){
