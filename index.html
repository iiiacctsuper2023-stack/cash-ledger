/* Every description ever typed for a given CoA category, so the browser's
   native autocomplete can suggest it again - e.g. type "b" in Transport
   and "Bank conveyance bill" shows up if it's been used before. */
function descriptionSuggestions(catKey){
  const seen = new Set();
  allVouchers().forEach(v=>{
    if(v.catKey===catKey && v.desc && v.desc.trim()) seen.add(v.desc.trim());
  });
  return Array.from(seen).sort((a,b)=>a.localeCompare(b));
}
function iouDescSuggestions(){
  const seen = new Set();
  (state.iouRegistry||[]).forEach(i=>{ if(i.desc && i.desc.trim()) seen.add(i.desc.trim()); });
  return Array.from(seen).sort((a,b)=>a.localeCompare(b));
}
function transferNoteSuggestions(field){
  const seen = new Set();
  allDaysEverywhere().forEach(day=>{
    (day[field]||[]).forEach(item=>{ if(item.note && item.note.trim()) seen.add(item.note.trim()); });
  });
  return Array.from(seen).sort((a,b)=>a.localeCompare(b));
}

/* Adds a new blank voucher line to a category and returns it - shared by
   the "+ Add voucher" button and Enter-key quick entry so numbering stays
   consistent between both paths. */
/* Draft -> Reviewed -> Approved review workflow for CoA vouchers. Purely
   a personal checklist (this tool is single-user) - no sign-off identity
   is attached, just a quick visual cue for what's been double-checked
   before a day gets locked. */
const STATUS_ORDER = ['draft','reviewed','approved'];
const STATUS_LABELS = {draft:'Draft', reviewed:'Reviewed', approved:'Approved'};
function statusLabel(s){ return STATUS_LABELS[s] || STATUS_LABELS.draft; }
function nextStatus(s){
  const i = STATUS_ORDER.indexOf(s);
  return STATUS_ORDER[(i+1) % STATUS_ORDER.length] || 'draft';
}

function addCoaVoucher(day, catKey){
  const cat = COA.find(c=>c.key===catKey);
  state.voucherCounters[catKey] += 1;
  const yearShort = String(state.year).slice(-2);
  const monthNum = MONTHS.indexOf(state.month)+1;
  const voucher = `${cat.short}${state.voucherCounters[catKey]}/${monthNum}/${yearShort}`;
  const item = {id:uid(), voucher, desc:'', amount:0, status:'draft'};
  day.coa[catKey].push(item);
  return item;
}

function drawCoaList(container, day, catKey, arr){
  container.innerHTML = '';
  if(arr.length===0){ container.appendChild(el(`<p class="empty">No vouchers yet.</p>`)); return; }
  const suggestions = descriptionSuggestions(catKey);
  const datalistId = `desc-suggest-${catKey}`;
  container.appendChild(el(`<datalist id="${datalistId}">${suggestions.map(s=>`<option value="${escapeHtml(s)}"></option>`).join('')}</datalist>`));
  arr.forEach((item)=>{
    const row = el(`
      <div class="line-item">
        <div class="voucher-badge mono">${item.voucher}</div>
        <button type="button" class="status-badge status-${item.status}" data-action="cycle-status" data-day="${day.id}" data-cat="${catKey}" data-item="${item.id}" title="Click to change review status" ${day.locked?'disabled':''}>${statusLabel(item.status)}</button>
        <div class="field desc" style="margin-bottom:0;"><label>Description</label><input type="text" class="desc-input" list="${datalistId}" value="${escapeHtml(item.desc)}" placeholder="What was this voucher for?"></div>
        <div class="field amt" style="margin-bottom:0;"><label>Amount</label><input type="text" inputmode="decimal" class="amt-input" value="${formatAsianAmount(item.amount)}"></div>
        <button class="danger small" type="button" data-action="remove-coa" data-day="${day.id}" data-cat="${catKey}" data-item="${item.id}" title="Remove">&times;</button>
      </div>
    `);
    const descInp = row.querySelector('.desc-input');
    const amtInp = row.querySelector('.amt-input');
    descInp.oninput = ()=>{ item.desc = descInp.value; saveState(); };
    wireAmountInput(amtInp, (num)=>{ item.amount = num; refreshComputedOnly(); }, ()=>{
      /* Fires only once the amount box already held a plain resolved
         number when Enter was pressed - i.e. the user is really done
         with this line, not just finishing a calculation. */
      if(day.locked) return;
      addCoaVoucher(day, catKey);
      saveState();
      render();
      const freshContainer = document.getElementById('coa-list-'+catKey);
      if(freshContainer){
        const descInputs = freshContainer.querySelectorAll('.desc-input');
        const last = descInputs[descInputs.length-1];
        if(last) last.focus();
      }
    });
    amtInp.addEventListener('blur', ()=>{
      const msg = checkDuplicateAmount(day, item.amount, item.id);
      if(msg) showDuplicateWarning(msg);
    });
    /* Keyboard quick entry: Enter in Description jumps to Amount. */
    descInp.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); amtInp.focus(); amtInp.select(); }
    });
    container.appendChild(row);
  });
}

/* ======================================================================
   ONE delegated listener for every button in the app.
   Buttons never get per-render onclick rebinding, so there is no way
   for a stale handler to fire on the wrong row.
   ====================================================================== */
function wireDelegation(){
  document.getElementById('app').addEventListener('click', (e)=>{
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;
    const dayId = t.dataset.day;
    const day = dayId ? findDay(dayId) : null;

    if(action==='toggle-password-form'){ passwordFormOpen = !passwordFormOpen; render(); return; }
    if(action==='toggle-daylock-password-form'){ dayLockPasswordFormOpen = !dayLockPasswordFormOpen; render(); return; }
    if(action==='lock-now'){
      if(!state.lockPasswordHash){ showAlert('Set a password first.'); return; }
      locked = true; lockError = ''; render();
      return;
    }
    if(action==='export-backup'){ exportBackupJson(); return; }
    if(action==='import-backup'){ document.getElementById('import-file-input').click(); return; }
    if(action==='connect-file'){ connectToFile(); return; }
    if(action==='create-file'){ createNewFile(); return; }
    if(action==='disconnect-file'){ disconnectFile(); return; }
    if(action==='install-app'){
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.finally(()=>{ deferredInstallPrompt = null; render(); });
      return;
    }
    if(action==='edit-setup'){ state.setupDone=false; render(); return; }
    if(action==='toggle-search'){ searchOpen = !searchOpen; render(); return; }
    if(action==='toggle-summary'){ summaryOpen = !summaryOpen; render(); return; }
    if(action==='toggle-templates'){ templatesOpen = !templatesOpen; render(); return; }
    if(action==='toggle-dashboard'){ dashboardOpen = !dashboardOpen; render(); return; }
    if(action==='remove-template'){
      const idx = state.templates.findIndex(x=>x.id===t.dataset.item);
      const removed = state.templates[idx];
      state.templates = state.templates.filter(x=>x.id!==t.dataset.item);
      pushUndo('Template "'+removed.desc+'" removed.', ()=>{ state.templates.splice(idx,0,removed); });
      saveState(); render();
      return;
    }

    if(action==='add-bank'){
      state.banks.push({id:uid(), name:'', opening:0});
      const setupCard = t.closest('.card');
      if(setupCard && setupCard._drawBankRows) setupCard._drawBankRows();
      saveState();
      return;
    }
    if(action==='finish-setup'){
      if(!state.month || !state.year){ showAlert('Please choose a month and year.'); return; }
      if(state.banks.length===0){ showAlert('Add at least one bank account.'); return; }
      if(state.banks.some(b=>!b.name.trim())){ showAlert('Every bank account needs a name.'); return; }
      state.setupDone = true;
      saveState(); render();
      return;
    }

    if(action==='select-day'){ selectedDayId = t.dataset.day; render(); return; }
    if(action==='add-day'){
      const lastDate = state.days.length ? state.days[state.days.length-1].date : null;
      let next = new Date();
      if(lastDate){ next = new Date(lastDate+'T00:00:00'); next.setDate(next.getDate()+1); }
      const d = newDay(next.toISOString().slice(0,10));
      state.days.push(d);
      selectedDayId = d.id;
      saveState(); render();
      return;
    }
    if(action==='delete-day'){
      if(day.locked){ showAlert('This day is locked. Unlock it first to delete it.'); return; }
      showConfirm('Delete '+dayLabel(day.date)+'?', ()=>{
        const i = state.days.findIndex(d=>d.id===dayId);
        const removedDay = state.days[i];
        state.days.splice(i,1);
        selectedDayId = state.days.length ? state.days[Math.max(0,i-1)].id : null;
        pushUndo(dayLabel(removedDay.date)+' deleted.', ()=>{
          state.days.splice(i,0,removedDay);
          selectedDayId = removedDay.id;
        });
        saveState(); render();
      });
      return;
    }
    if(action==='lock-day'){
      const pending = COA.reduce((n,cat)=> n + (day.coa[cat.key]||[]).filter(it=>(it.status||'draft')!=='approved' && Number(it.amount)>0).length, 0);
      const note = pending>0 ? ` Note: ${pending} voucher${pending>1?'s are':' is'} not yet marked Approved.` : '';
      showConfirm('Lock '+dayLabel(day.date)+'? Its entries can\'t be edited again until you unlock it.'+note, ()=>{
        day.locked = true; saveState(); render();
      }, 'Lock this day');
      return;
    }
    if(action==='unlock-day'){
      const gateHash = state.dayLockPasswordHash || state.lockPasswordHash;
      showPasswordPrompt('Enter password to unlock '+dayLabel(day.date)+' for editing.', ()=>{
        day.locked = false; saveState(); render();
      }, 'Unlock', gateHash);
      return;
    }
    if(action==='perform-undo'){ performUndo(); return; }
    if(action==='cycle-status'){
      if(day.locked) return;
      const catKey = t.dataset.cat;
      const item = (day.coa[catKey]||[]).find(x=>x.id===t.dataset.item);
      if(item){ item.status = nextStatus(item.status||'draft'); saveState(); render(); }
      return;
    }
    if(action==='dismiss-dup-warning'){ if(duplicateWarningTimer) clearTimeout(duplicateWarningTimer); duplicateWarning=null; render(); return; }

    if(!day && action!=='dl-day' && action!=='dl-month'){ return; }

    if(action==='add-withdraw'){ if(day.locked) return; day.withdrawals.push({id:uid(), amount:0, bankId:state.banks[0].id, note:''}); render(); return; }
    if(action==='remove-withdraw'){
      if(day.locked) return;
      const idx = day.withdrawals.findIndex(x=>x.id===t.dataset.item);
      const removed = day.withdrawals[idx];
      day.withdrawals = day.withdrawals.filter(x=>x.id!==t.dataset.item);
      pushUndo('Withdrawal removed.', ()=>{ day.withdrawals.splice(idx,0,removed); });
      saveState(); render(); return;
    }
    if(action==='add-deposit'){ if(day.locked) return; day.deposits.push({id:uid(), amount:0, bankId:state.banks[0].id, note:''}); render(); return; }
    if(action==='remove-deposit'){
      if(day.locked) return;
      const idx = day.deposits.findIndex(x=>x.id===t.dataset.item);
      const removed = day.deposits[idx];
      day.deposits = day.deposits.filter(x=>x.id!==t.dataset.item);
      pushUndo('Deposit removed.', ()=>{ day.deposits.splice(idx,0,removed); });
      saveState(); render(); return;
    }
    if(action==='add-iou'){ if(day.locked) return; state.iouRegistry.push({id:uid(), desc:'', amount:0, fromDate:day.date, toDate:null}); render(); return; }
    if(action==='open-settle-iou'){
      if(day.locked) return;
      const item = state.iouRegistry.find(x=>x.id===t.dataset.item);
      if(item) showSettleIouModal(day, item);
      return;
    }
    if(action==='remove-iou'){
      if(day.locked) return;
      const item = state.iouRegistry.find(x=>x.id===t.dataset.item);
      if(item){
        if(item.fromDate===day.date){
          const idx = state.iouRegistry.findIndex(x=>x.id===item.id);
          state.iouRegistry = state.iouRegistry.filter(x=>x.id!==item.id);
          pushUndo('IOU removed.', ()=>{ state.iouRegistry.splice(idx,0,item); });
        } else {
          const prevToDate = item.toDate;
          item.toDate = addDaysStr(day.date, -1);
          pushUndo('IOU stopped carrying forward.', ()=>{ item.toDate = prevToDate; });
        }
      }
      saveState(); render();
      return;
    }
    if(action==='add-payable'){
      if(day.locked) return;
      state.payableRegistry.push({id:uid(), desc:'', amount:0, fromDate:day.date, toDate:null});
      render();
      return;
    }
    if(action==='pay-payable'){
      if(day.locked) return;
      const item = state.payableRegistry.find(x=>x.id===t.dataset.item);
      if(item){
        if(item.fromDate===day.date){
          const idx = state.payableRegistry.findIndex(x=>x.id===item.id);
          state.payableRegistry = state.payableRegistry.filter(x=>x.id!==item.id);
          pushUndo('Payable marked paid.', ()=>{ state.payableRegistry.splice(idx,0,item); });
        } else {
          const prevToDate = item.toDate;
          item.toDate = addDaysStr(day.date, -1);
          pushUndo('Payable marked paid.', ()=>{ item.toDate = prevToDate; });
        }
      }
      saveState(); render();
      return;
    }
    if(action==='add-bank-transfer'){
      if(day.locked) return;
      if(state.banks.length<2){ showAlert('Add at least two bank accounts to make a transfer.'); return; }
      if(!day.bankTransfers) day.bankTransfers = [];
      const from = state.banks[0], to = state.banks[1];
      day.bankTransfers.push({id:uid(), fromBankId:from.id, toBankId:to.id, amount:0});
      render();
      return;
    }
    if(action==='remove-bank-transfer'){
      if(day.locked) return;
      const idx = (day.bankTransfers||[]).findIndex(x=>x.id===t.dataset.item);
      const removed = day.bankTransfers[idx];
      day.bankTransfers = (day.bankTransfers||[]).filter(x=>x.id!==t.dataset.item);
      pushUndo('Bank transfer removed.', ()=>{ day.bankTransfers.splice(idx,0,removed); });
      saveState(); render();
      return;
    }

    if(action==='add-coa'){
      if(day.locked) return;
      addCoaVoucher(day, t.dataset.cat);
      render();
      return;
    }
    if(action==='add-coa-from-template'){
      if(day.locked) return;
      const tpl = state.templates.find(x=>x.id===t.dataset.tpl);
      if(!tpl) return;
      const cat = COA.find(c=>c.key===tpl.catKey);
      state.voucherCounters[tpl.catKey] += 1;
      const yearShort = String(state.year).slice(-2);
      const monthNum = MONTHS.indexOf(state.month)+1;
      const voucher = `${cat.short}${state.voucherCounters[tpl.catKey]}/${monthNum}/${yearShort}`;
      day.coa[tpl.catKey].push({id:uid(), voucher, desc:tpl.desc, amount:tpl.amount, status:'draft'});
      render();
      return;
    }
    if(action==='remove-coa'){
      if(day.locked) return;
      const catKey = t.dataset.cat;
      const idx = day.coa[catKey].findIndex(x=>x.id===t.dataset.item);
      const removed = day.coa[catKey][idx];
      day.coa[catKey] = day.coa[catKey].filter(x=>x.id!==t.dataset.item);
      pushUndo((removed.desc||catKey+' voucher')+' removed.', ()=>{ day.coa[catKey].splice(idx,0,removed); });
      saveState(); render();
      return;
    }

    if(action==='dl-day'){ exportDay(selectedDayId); return; }
    if(action==='dl-month'){ exportMonth(); return; }
  });
}



/* ======================================================================
   Excel export (ExcelJS) — mirrors the original workbook's layout:
   Times New Roman throughout, bold section/total rows, thin borders on
   every used cell, and live =SUM(...) / cross-sheet formulas instead of
   hard-coded numbers, so the file behaves exactly like the hand-built
   sample once opened in Excel.
   ====================================================================== */
const EXCELJS_URLS = [
  'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js',
  'https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js',
  'https://unpkg.com/exceljs@4.4.0/dist/exceljs.min.js'
];
let excelJsLoadPromise = null;
function loadExcelJS(){
  if(typeof ExcelJS !== 'undefined') return Promise.resolve();
  if(excelJsLoadPromise) return excelJsLoadPromise;
  excelJsLoadPromise = (async ()=>{
    for(const url of EXCELJS_URLS){
      try{
        await new Promise((resolve, reject)=>{
          const s = document.createElement('script');
          s.src = url;
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });
        if(typeof ExcelJS !== 'undefined') return;
      }catch(e){ /* try next source */ }
    }
    throw new Error('Could not load the Excel export library from any source.');
  })();
  return excelJsLoadPromise;
}

function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

let debitVoucherTemplatePromise = null;
function loadDebitVoucherTemplate(){
  if(debitVoucherTemplatePromise) return debitVoucherTemplatePromise;
  debitVoucherTemplatePromise = (async ()=>{
    const buf = base64ToArrayBuffer(DEBIT_VOUCHER_TEMPLATE_B64);
    const tmplWb = new ExcelJS.Workbook();
    await tmplWb.xlsx.load(buf);
    return tmplWb.worksheets[0];
  })();
  return debitVoucherTemplatePromise;
}

/* Clones a worksheet cell-for-cell (values, styles, merges, column widths,
   row heights, page setup/margins/print area) into destWb under a new name,
   so the source template's exact formatting is preserved. */
function cloneTemplateSheet(destWb, srcWs, name){
  const ws = destWb.addWorksheet(name);
  for(let c=1;c<=srcWs.columnCount;c++){ ws.getColumn(c).width = srcWs.getColumn(c).width; }
  for(let r=1;r<=srcWs.rowCount;r++){
    ws.getRow(r).height = srcWs.getRow(r).height;
    for(let c=1;c<=srcWs.columnCount;c++){
      const sCell = srcWs.getCell(r,c);
      const dCell = ws.getCell(r,c);
      dCell.value = sCell.value;
      dCell.style = JSON.parse(JSON.stringify(sCell.style));
    }
  }
  (srcWs.model.merges||[]).forEach(rng=>{ try{ ws.mergeCells(rng); }catch(e){ /* already covered */ } });
  ws.pageSetup = JSON.parse(JSON.stringify(srcWs.pageSetup));
  return ws;
}

/* "=1234-" / "=1234.50-" style amount box, matching the template's convention */
function formatTakaBox(amount){
  const n = Math.round((Number(amount)||0)*100)/100;
  const s = (n % 1 === 0) ? String(n) : n.toFixed(2);
  return '=' + formatAsianAmount(s) + '/-';
}

/* Splits a numbered multi-item description like "1. A 2. B 3. C" onto
   separate lines - line 1 keeps item 1, then every next "N." / "N)" marker
   (2 onward) starts a fresh line, so the Debit Voucher's Description box
   prints each item on its own line instead of one run-on sentence. */
function formatMultiItemDescription(text){
  if(!text) return text;
  return text.replace(/\s+(\d{1,3}[.\)]\s)/g, '\n$1').trim();
}

/* Adds one Debit Voucher sheet per Cash Disbursed (CoA) entry for the day,
   skipping blank-amount vouchers. `used` is the sheet-name set shared with
   the day's summary sheet so names never collide. */
async function appendDebitVoucherSheets(wb, day, used){
  const entries = [];
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(item=>{
      const amt = Number(item.amount)||0;
      if(amt>0) entries.push({cat, item, amt});
    });
  });
  if(entries.length===0) return;
  let srcWs;
  try{ srcWs = await loadDebitVoucherTemplate(); }
  catch(e){ return; } // if the template can't load, skip vouchers rather than block the whole export
  entries.forEach(({cat, item, amt})=>{
    const label = (item.desc && item.desc.trim()) ? item.desc.trim() : cat.label;
    const sheetName = uniqueSheetName(label.replace(/[\\/\?\*\[\]:]/g,''), used);
    const ws = cloneTemplateSheet(wb, srcWs, sheetName);
    ws.getCell('C9').value = item.voucher;

const FONT = 'Times New Roman';
const THIN = {style:'thin'};
const BORDER_ALL = {top:THIN,left:THIN,bottom:THIN,right:THIN};

/* Excel custom format for Asian/Indian comma grouping: last 3 digits,
   then groups of 2 (e.g. 12,34,567) - matches the on-screen inputs. */
const ASIAN_NUMFMT = '#,##,##0.00';
function setCell(ws, addr, {value, formula, size=11, bold=false, center=false, numFmt}={}){
  const cell = ws.getCell(addr);
  if(formula!==undefined) cell.value = {formula};
  else cell.value = (value===undefined?'':value);
  cell.font = {name:FONT, size, bold};
  cell.border = BORDER_ALL;
  cell.alignment = center ? {horizontal:'center', vertical:'center', wrapText:true} : {vertical:'center'};
  if(numFmt) cell.numFmt = numFmt;
  return cell;
}

/* Writes one ledger row: A = voucher (blank+bordered if none), B = centered
   label, and the amount goes in EITHER C or D depending on valueCol - the
   other of the two is left as a blank bordered filler (valueCol='D') or left
   completely untouched with no border (valueCol='C'), exactly like the sample. */
/* Excel doesn't auto-fit a row's height once we set one explicitly - even
   with wrap text turned on - so a long description just gets visually
   clipped until someone manually double-clicks the row border. We
   estimate how many wrapped lines the text needs (given the column's
   character width and font size) and size the row for that ourselves. */
function estimateWrappedRowHeight(text, colWidthChars, fontSize=11, minHeight=18.75){
  if(!text) return minHeight;
  const charsPerLine = Math.max(6, Math.round((colWidthChars*0.85) * (11/Math.max(fontSize,8))));
  const paragraphs = String(text).split('\n');
  let lines = 0;
  paragraphs.forEach(p=>{ lines += Math.max(1, Math.ceil(p.length / charsPerLine)); });
  const lineHeight = 15 * (fontSize/11);
  const height = lines*lineHeight + 6;
  return Math.max(minHeight, Math.ceil(height*1.15)); // 15% safety margin against estimation error
}

function writeRow(ws, r, {voucher='', label='', size=11, bold=false, valueCol='C', value, formula}={}){
  setCell(ws, `A${r}`, {value:voucher, size:11, bold:false});
  setCell(ws, `B${r}`, {value:label, size, bold, center:true});
  if(valueCol==='D'){
    setCell(ws, `C${r}`, {value:'', size, bold});
    setCell(ws, `D${r}`, {value, formula, size, bold, numFmt:ASIAN_NUMFMT});
  } else {
    setCell(ws, `C${r}`, {value, formula, size, bold, numFmt:ASIAN_NUMFMT});
  }
  ws.getRow(r).height = estimateWrappedRowHeight(label, 58, size);
  return r;
}

function writeDaySheet(ws, day, cmp, beginRefs){
  ws.getColumn(1).width = 13;
  ws.getColumn(2).width = 58;
  ws.getColumn(3).width = 18;
  ws.getColumn(4).width = 16;

  let r = 1;
  ws.mergeCells(`A${r}:C${r}`);
  setCell(ws, `A${r}`, {value:`Daily Cash & Bank Account Summary - ${dayLabelFull(day.date)} ${state.year}`, size:16, bold:true, center:true});
  // Match the sample's exact merged-title border pattern: outer box only, no internal dividers.
  ws.getCell(`A${r}`).border = {left:THIN, top:THIN, bottom:THIN};
  ws.getCell(`B${r}`).border = {top:THIN, bottom:THIN};
  ws.getCell(`C${r}`).border = {top:THIN, bottom:THIN, right:THIN};
  ws.getRow(r).height = 26;
  r++;

  // Beginning balance cash -> column D
  const beginCashRow = r;
  writeRow(ws, r, {label:'Beginning Balance Cash', size:14, bold:true, valueCol:'D', ...beginRefs.cash});
  r++;

  const revenueStart = r;
  writeRow(ws, r, {label:'Service revenue collected', value:Number(day.serviceRevenue)||0}); r++;
  day.withdrawals.forEach(w=>{
    const bank = state.banks.find(b=>b.id===w.bankId);
    writeRow(ws, r, {label:'Cash withdrawn from '+(bank?bank.name:'bank')+(w.note?' - '+w.note:''), value:Number(w.amount)||0});
    r++;
  });
  const revenueEnd = r-1;

  const totalCollectedRow = r;
  writeRow(ws, r, {label:'Total cash collected', size:12, bold:true, formula:`SUM(C${revenueStart}:C${revenueEnd})`}); r++;

  const totalAmountCashRow = r;
  writeRow(ws, r, {label:'Total Amount Cash', size:14, bold:true, valueCol:'D', formula:`D${beginCashRow}+C${totalCollectedRow}`}); r++;

  writeRow(ws, r, {label:'Cash Disbursed Summary', size:11, bold:true, value:''}); r++;

  const disbStart = r;
  COA.forEach(cat=>{
    (day.coa[cat.key]||[]).forEach(item=>{
      writeRow(ws, r, {voucher:item.voucher, label:item.desc||cat.label, value:Number(item.amount)||0});
      r++;
    });
  });
  day.deposits.forEach(d=>{
    const bank = state.banks.find(b=>b.id===d.bankId);
    writeRow(ws, r, {label:'Cash deposited to '+(bank?bank.name:'bank')+(d.note?' - '+d.note:''), value:Number(d.amount)||0});
    r++;
  });
  let disbEnd = r-1;
  if(disbEnd < disbStart){ writeRow(ws, r, {label:'(no disbursements)', value:0}); disbEnd=r; r++; }

  const totalDisbursedRow = r;
  writeRow(ws, r, {label:'Total Cash Disbursed', size:12, bold:true, formula:`SUM(C${disbStart}:C${disbEnd})`}); r++;

  const closingAmountRow = r;
  writeRow(ws, r, {label:'Closing amount', size:12, bold:true, valueCol:'D', formula:`D${totalAmountCashRow}-C${totalDisbursedRow}`}); r++;

  const iouStart = r;
  activeIousForDay(day.date).forEach(i=>{ writeRow(ws, r, {label:i.desc||'IOU', value:Number(i.amount)||0}); r++; });
  let iouEnd = r-1;
  if(iouEnd < iouStart){ writeRow(ws, r, {label:'(no IOU)', value:0}); iouEnd=r; r++; }

  const totalIouRow = r;
  writeRow(ws, r, {label:'Total IOU', size:11, bold:true, formula:`SUM(C${iouStart}:C${iouEnd})`}); r++;

  const cashInHandRow = r;
  writeRow(ws, r, {label:'Cash In Hand', size:14, bold:true, formula:`D${closingAmountRow}-C${totalIouRow}`}); r++;

  const bankClosingAddr = {};
  state.banks.forEach(b=>{
    const bd = day.banksDaily[b.id] || {sslDeposit:0,fees:0,salaryAccount:0,salaryCash:0};
    const bankXfers = (day.bankTransfers||[]).filter(t=>t.fromBankId!==t.toBankId);
    const beginBankRow = r;
    const ref = beginRefs.banks[b.id] || {value:0};
    writeRow(ws, r, {label:`Beginning Balance - ${b.name}`, size:14, bold:true, ...ref}); r++;

    bankXfers.filter(t=>t.toBankId===b.id).forEach(t=>{
      const fromBank = state.banks.find(x=>x.id===t.fromBankId);
      writeRow(ws, r, {label:`Transferred from ${fromBank?fromBank.name:'bank'}`, value:Number(t.amount)||0});
      r++;
    });
    if(bd.sslDeposit){ writeRow(ws, r, {label:'Other deposit / SSL Commerz', value:Number(bd.sslDeposit)||0}); r++; }
    day.deposits.filter(d=>d.bankId===b.id).forEach(d=>{
      writeRow(ws, r, {label:'Cash deposited from ledger'+(d.note?' - '+d.note:''), value:Number(d.amount)||0});
      r++;
    });
    const depositEnd = Math.max(r-1, beginBankRow);

    const totalAmountBankRow = r;
    writeRow(ws, r, {label:`Total Amount - ${b.name}`, size:14, bold:true, formula:`SUM(C${beginBankRow}:C${depositEnd})`}); r++;

    const disburseStart = r;
    if(bd.fees){ writeRow(ws, r, {label:'Bank fees', value:Number(bd.fees)||0}); r++; }
    if(bd.salaryAccount){ writeRow(ws, r, {label:'Salary payment - by account', value:Number(bd.salaryAccount)||0}); r++; }
    if(bd.salaryCash){ writeRow(ws, r, {label:'Salary payment - by cash', value:Number(bd.salaryCash)||0}); r++; }
    bankXfers.filter(t=>t.fromBankId===b.id).forEach(t=>{
      const toBank = state.banks.find(x=>x.id===t.toBankId);
      writeRow(ws, r, {label:`Transferred to ${toBank?toBank.name:'bank'}`, value:Number(t.amount)||0});
      r++;
    });
    day.withdrawals.filter(w=>w.bankId===b.id).forEach(w=>{
      writeRow(ws, r, {label:'Cash withdrawn to ledger'+(w.note?' - '+w.note:''), value:Number(w.amount)||0});
      r++;
    });
    let disburseEnd = r-1;
    if(disburseEnd < disburseStart){ writeRow(ws, r, {label:'Bank fees', value:0}); disburseEnd=r; r++; }

    const totalDisbursedBankRow = r;
    writeRow(ws, r, {label:'Total Cash Disbursed', size:14, bold:true, formula:`SUM(C${disburseStart}:C${disburseEnd})`}); r++;

    const closingBankRow = r;
    writeRow(ws, r, {label:`Closing Balance - ${b.name}`, size:14, bold:true, valueCol:'D', formula:`C${totalAmountBankRow}-C${totalDisbursedBankRow}`}); r++;

    bankClosingAddr[b.id] = `D${closingBankRow}`;
  });

  const grandTotalRow = r;
  const terms = [`D${closingAmountRow}`, ...Object.values(bankClosingAddr)].join('+');
  writeRow(ws, r, {label:'Grand Total (Closing amount + all Bank Closing Balances)', size:15, bold:true, valueCol:'D', formula:terms});

  return {cashInHandAddr:`C${cashInHandRow}`, closingAmountAddr:`D${closingAmountRow}`, bankClosingAddr, grandTotalAddr:`D${grandTotalRow}`};
}

function uniqueSheetName(base, used){
  base = (base||'Sheet').slice(0,31);
  let name = base, n=2;
  while(used.has(name)){ name = (base+' '+n).slice(0,31); n++; }
  used.add(name);
  return name;
}

async function exportNotesheets(startDate, endDate){
  if(!startDate || !endDate){ showAlert('Pick a from and to date.'); return; }
  if(startDate > endDate){ showAlert('The "From date" must be before the "To date".'); return; }
  const {cats, grandTotal} = collectNotesheetRange(startDate, endDate);
  if(cats.length===0){ showAlert('No expenses were recorded in that date range.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }

  const wb = new ExcelJS.Workbook();
  const used = new Set();
  const summaryRows = [];

  cats.forEach(({key, cat, items, total, firstDate, lastDate})=>{
    const number = (state.notesheetCounters[key]||0) + 1;
    const ws = wb.addWorksheet(uniqueSheetName(`${cat.notesheetLabel} ${number}`.replace(/[\\\/\?\*\[\]:]/g,''), used));
    writeNotesheet(ws, cat, number, items, total, firstDate, lastDate);
    state.notesheetCounters[key] = number;
    summaryRows.push({label:cat.summaryLabel, total});
  });

  const summaryNum = (state.summaryCounterNum||0) + 1;
  const wsSummary = wb.addWorksheet(uniqueSheetName(`${state.summaryCounterYear}-${summaryNum}`, used));
  writeWithdrawSummary(wsSummary, summaryRows, grandTotal, state.summaryCounterYear, summaryNum);
  state.summaryCounterNum = summaryNum;

  await saveState();
  await downloadWorkbook(wb, `Notesheets_${startDate}_to_${endDate}.xlsx`);
  render();
}

async function downloadWorkbook(wb, filename){
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

async function exportMonth(){
  if(state.days.length===0){ showAlert('No days recorded yet.'); return; }
  try{ await loadExcelJS(); }catch(e){ showAlert('Could not reach the Excel export library. Check your internet connection and try again.'); return; }
  const computed = computeAll();
  const wb = new ExcelJS.Workbook();
  const used = new Set(['Overview']);

  const wsOverview = wb.addWorksheet('Overview');

  const dayRefs = {}; // dayId -> {sheetName, cashInHandAddr, bankClosingAddr, grandTotalAddr}
  state.days.forEach((day, idx)=>{
    const c = computed[day.id];
    const sheetName = sheetNameFor(day, used);
    const ws = wb.addWorksheet(sheetName);
    let beginRefs;
    if(idx===0){
      beginRefs = {
        cash: {value: c.openingCash},
        banks: Object.fromEntries(state.banks.map(b=>[b.id, {value:c.banks[b.id].opening}]))
      };
    } else {
      const prevDay = state.days[idx-1];
      const prevRef = dayRefs[prevDay.id];
      beginRefs = {
        cash: {formula: `'${prevRef.sheetName}'!${prevRef.closingAmountAddr}`},
        banks: Object.fromEntries(state.banks.map(b=>{
          if(prevRef.bankClosingAddr[b.id]) return [b.id, {formula:`'${prevRef.sheetName}'!${prevRef.bankClosingAddr[b.id]}`}];
          return [b.id, {value: c.banks[b.id].opening}];
        }))
      };
    }
    const refs = writeDaySheet(ws, day, c, beginRefs);
    dayRefs[day.id] = {sheetName, ...refs};
  });

  // Populate the Overview sheet (created first, above, so it stays the first tab)
  wsOverview.getColumn(1).width = 20;
  for(let i=2;i<=state.banks.length+3;i++) wsOverview.getColumn(i).width = 18;
  let r=1;
  wsOverview.mergeCells(`A${r}:${String.fromCharCode(65+2+state.banks.length)}${r}`);
  setCell(wsOverview, `A${r}`, {value:`Month Overview - ${state.month} ${state.year}`, size:16, bold:true, align:'center'});
  r++;
  const headerRow = r;
  setCell(wsOverview, `A${r}`, {value:'Date', size:11, bold:true});
  setCell(wsOverview, `B${r}`, {value:'Cash In Hand', size:11, bold:true});
  state.banks.forEach((b,i)=>{ setCell(wsOverview, `${String.fromCharCode(67+i)}${r}`, {value:b.name+' Closing', size:11, bold:true}); });
  setCell(wsOverview, `${String.fromCharCode(67+state.banks.length)}${r}`, {value:'Grand Total', size:11, bold:true});
  r++;
  state.days.forEach(day=>{
    const ref = dayRefs[day.id];
    setCell(wsOverview, `A${r}`, {value:dayLabel(day.date)});
    setCell(wsOverview, `B${r}`, {formula:`'${ref.sheetName}'!${ref.cashInHandAddr}`, numFmt:ASIAN_NUMFMT});
    state.banks.forEach((b,i)=>{
      const addr = ref.bankClosingAddr[b.id];
      setCell(wsOverview, `${String.fromCharCode(67+i)}${r}`, addr?{formula:`'${ref.sheetName}'!${addr}`, numFmt:ASIAN_NUMFMT}:{value:0, numFmt:ASIAN_NUMFMT});
    });
    setCell(wsOverview, `${String.fromCharCode(67+state.banks.length)}${r}`, {formula:`'${ref.sheetName}'!${ref.grandTotalAddr}`, numFmt:ASIAN_NUMFMT});
    r++;
  });
  r++;
  setCell(wsOverview, `A${r}`, {value:'CoA Category Totals - Whole Month', size:12, bold:true});
  r++;
  COA.forEach(cat=>{
    let total = 0;
    state.days.forEach(day=>{ total += computed[day.id].coaTotals[cat.key]||0; });
    setCell(wsOverview, `A${r}`, {value:cat.label});
    setCell(wsOverview, `B${r}`, {value:cat.short});
    setCell(wsOverview, `C${r}`, {value:total, numFmt:ASIAN_NUMFMT});
    r++;
  });

  await downloadWorkbook(wb, `${state.month}${state.year}_Full_Ledger.xlsx`);
}

/* ======================================================================
   Boot
   ====================================================================== */
/* --- PWA installability ------------------------------------------------
   The manifest link in <head> (with an embedded icon) is what lets the
   browser offer "Install" at all. This only matters when the file is
   hosted over https:// (or localhost) - a local file:// double-click and
   Claude.ai's sandboxed artifact iframe generally won't offer an install
   prompt no matter what, that's a browser platform restriction, not
   something fixable from inside the page. Where it IS available, capture
   the prompt so the header's "Install App" button can trigger it. */
if(typeof window!=='undefined' && typeof window.addEventListener==='function'){
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    if(state) render();
  });
}
if(typeof navigator!=='undefined' && 'serviceWorker' in navigator && typeof location!=='undefined' && (location.protocol==='https:' || location.hostname==='localhost')){
  try{
    const swCode = "self.addEventListener('fetch', function(){});";
    const swUrl = URL.createObjectURL(new Blob([swCode], {type:'application/javascript'}));
    navigator.serviceWorker.register(swUrl).catch(()=>{ /* best effort - some browsers block blob: service workers */ });
  }catch(e){ /* ignore - manifest alone is enough for installability in most current browsers */ }
}

(async function boot(){
  await loadState();
  locked = !!state.lockPasswordHash;
  await tryReconnectFile();
  wireDelegation();
  render();
  loadExcelJS().catch(()=>{});
})();
</script>
